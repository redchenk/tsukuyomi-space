<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>主舞台 | 月读空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{--sakura-pink:#ffb7c5;--dark-bg:#1a1025}
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;background:linear-gradient(180deg,#2d1f3d 0%,#1a1025 50%,#0f1724 100%);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden}
        nav{position:fixed;top:0;width:100%;padding:1.2rem 2rem;background:rgba(26,16,37,0.8);backdrop-filter:blur(10px);z-index:1000;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,107,157,0.15)}
        nav .logo{font-size:1.3rem;background:linear-gradient(135deg,#fff,#ffb7c5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
        nav .nav-right{display:flex;align-items:center;gap:1rem}
        nav a{color:rgba(255,183,197,0.7);text-decoration:none}
        nav a:hover,nav a.active{color:#ffb7c5}
        .lang-switcher{display:flex;gap:0.5rem;background:rgba(255,107,157,0.15);padding:0.3rem 0.8rem;border-radius:20px;border:1px solid rgba(255,107,157,0.3)}
        .lang-btn{padding:0.2rem 0.6rem;background:transparent;border:1px solid rgba(255,183,197,0.3);border-radius:15px;color:rgba(255,183,197,0.7);cursor:pointer;font-size:0.75rem}
        .lang-btn.active{background:rgba(255,107,157,0.3);color:#ffb7c5}
        .container{position:relative;z-index:10;min-height:100vh;padding:8rem 2rem 2rem;max-width:1000px;margin:0 auto}
        .header{text-align:center;margin-bottom:3rem}
        .title{font-size:2rem;background:linear-gradient(135deg,#fff,#ffb7c5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem}
        .subtitle{color:rgba(255,183,197,0.5);font-size:0.85rem}
        .controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;gap:1rem;flex-wrap:wrap}
        .search-box{flex:1;min-width:200px}
        .search-box input{width:100%;padding:0.7rem 1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,107,157,0.2);border-radius:6px;color:rgba(255,183,197,0.9)}
        .btn{padding:0.7rem 1.5rem;background:rgba(255,107,157,0.2);color:#ffb7c5;border:1px solid rgba(255,107,157,0.3);border-radius:6px;text-decoration:none}
        .filters{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem}
        .filter-btn{padding:0.5rem 1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,107,157,0.2);border-radius:20px;color:rgba(255,183,197,0.7);cursor:pointer}
        .filter-btn.active{background:rgba(255,107,157,0.2);color:#ffb7c5}
        .articles-list{display:flex;flex-direction:column;gap:1.5rem}
        .article-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,107,157,0.15);border-radius:8px;padding:1.5rem;text-decoration:none;transition:all 0.3s}
        .article-item:hover{transform:translateX(8px);border-color:rgba(255,107,157,0.3)}
        .article-meta{display:flex;gap:0.8rem;margin-bottom:0.8rem;flex-wrap:wrap}
        .tag{padding:0.25rem 0.7rem;background:rgba(255,107,157,0.15);border-radius:12px;font-size:0.75rem;color:rgba(255,183,197,0.9)}
        .article-title{font-size:1.3rem;color:rgba(255,183,197,0.95);margin-bottom:0.5rem}
        .article-excerpt{color:rgba(255,183,197,0.6);line-height:1.6;margin-bottom:1rem}
        .article-footer{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;border-top:1px solid rgba(255,107,157,0.1)}
        .read-time{font-size:0.8rem;color:rgba(255,183,197,0.5)}
        .arrow{color:rgba(255,107,157,0.4);transition:all 0.3s}
        .article-item:hover .arrow{color:rgba(255,107,157,0.8);transform:translateX(4px)}
        .footer{position:fixed;bottom:1rem;color:rgba(255,255,255,0.25);font-size:0.65rem;width:100%;text-align:center}
    </style>
</head>
<body>
    <nav>
        <a href="hub.html" class="logo">月读空间</a>
        <div class="nav-right">
            <a href="hub.html">中枢大厅</a>
            <a href="stage.html" class="active">主舞台</a>
            <a href="arena.html">竞技场</a>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh')">中文</button>
                <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja')">日本語</button>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="header">
            <h1 class="title">主舞台</h1>
            <p class="subtitle">演唱会场馆 | 博客文章</p>
        </div>
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文章...">
            </div>
            <a href="editor.html" class="btn">✏️ 新建投稿</a>
        </div>
        <div class="filters" id="filters">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="公告">公告</button>
            <button class="filter-btn" data-category="传说">传说</button>
            <button class="filter-btn" data-category="技术">技术</button>
            <button class="filter-btn" data-category="其他">其他</button>
        </div>
        <div class="articles-list" id="articlesList">
            <div style="text-align:center;padding:3rem;color:rgba(255,183,197,0.5);">加载中...</div>
        </div>
    </div>
    <div class="footer">© 超かぐや姫！風</div>
    <script src="i18n.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded',function(){initLanguage();});
        const API_BASE='http://47.97.0.122:3000/api';
        let allArticles=[];
        let currentCategory='all';
        let searchQuery='';
        async function loadArticles(){
            const list=document.getElementById('articlesList');
            try{
                const response=await fetch(API_BASE+'/articles');
                const result=await response.json();
                if(result.success){
                    allArticles=result.data;
                    renderArticles();
                }else{
                    list.innerHTML='<div style="text-align:center;padding:3rem;color:rgba(255,183,197,0.5);">加载失败</div>';
                }
            }catch(error){
                list.innerHTML='<div style="text-align:center;padding:3rem;color:rgba(255,183,197,0.5);">加载失败</div>';
            }
        }
        function renderArticles(){
            const list=document.getElementById('articlesList');
            let filtered=allArticles;
            if(currentCategory!=='all')filtered=filtered.filter(a=>a.category===currentCategory);
            if(searchQuery){
                const query=searchQuery.toLowerCase();
                filtered=filtered.filter(a=>a.title.toLowerCase().includes(query)||a.excerpt.toLowerCase().includes(query));
            }
            if(filtered.length===0){
                list.innerHTML='<div style="text-align:center;padding:3rem;color:rgba(255,183,197,0.5);">暂无文章</div>';
                return;
            }
            list.innerHTML=filtered.map(article=>`
                <a href="article.html?id=${article.id}" class="article-item">
                    <div class="article-meta">
                        <span class="tag">${article.category}</span>
                        <span class="tag" style="background:rgba(255,255,255,0.1)">👤 ${article.author_username||'admin'}</span>
                    </div>
                    <h3 class="article-title">${article.title}</h3>
                    <p class="article-excerpt">${article.excerpt}</p>
                    <div class="article-footer">
                        <span class="read-time">⏱️ ${article.read_time}</span>
                        <span class="arrow">→</span>
                    </div>
                </a>
            `).join('');
        }
        document.getElementById('filters').addEventListener('click',(e)=>{
            if(e.target.classList.contains('filter-btn')){
                document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory=e.target.dataset.category;
                renderArticles();
            }
        });
        document.getElementById('searchInput').addEventListener('input',(e)=>{
            searchQuery=e.target.value;
            renderArticles();
        });
        loadArticles();
    </script>
</body>
</html>
