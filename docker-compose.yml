services:
  tsukuyomi-space:
    build:
      context: .
      dockerfile: Dockerfile
    image: tsukuyomi-space:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      TRUST_PROXY: "true"
      ENABLE_FRONTEND_DIST: "true"
      DATA_DIR: /data
      DB_PATH: /data/tsukuyomi.db
    ports:
      - "3280:3000"
    volumes:
      - tsukuyomi-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  tsukuyomi-data:
