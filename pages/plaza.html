<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月读广场 | 月读空间</title>
    <style>
        :root {
            --sakura-pink: #ffb7c5;
            --deep-pink: #ff6b9d;
            --moon-gold: #f7d774;
            --night: #0d101a;
            --panel: rgba(18, 14, 29, 0.76);
            --panel-strong: rgba(24, 18, 38, 0.92);
            --line: rgba(255, 183, 197, 0.18);
            --text: rgba(255, 255, 255, 0.9);
            --muted: rgba(255, 225, 235, 0.58);
            --soft: rgba(255, 255, 255, 0.055);
            --ok: #7bf0b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { min-height: 100%; background: var(--night); }
        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
            background:
                linear-gradient(180deg, rgba(45,31,61,0.62) 0%, rgba(26,16,37,0.84) 42%, rgba(15,23,36,0.96) 100%),
                url('../assets/images/tsukuyomi-bg.png') center center / cover no-repeat fixed;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 183, 197, 0.16), transparent 26%),
                radial-gradient(circle at 82% 12%, rgba(247, 215, 116, 0.11), transparent 22%),
                radial-gradient(circle at 78% 82%, rgba(99, 213, 255, 0.1), transparent 24%);
            z-index: 0;
        }
        a { color: inherit; }
        button, textarea, input { font: inherit; }
        #sakuraContainer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .sakura {
            position: absolute;
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #ffccd7 0%, #ff6b9d 100%);
            border-radius: 50% 0 50% 0;
            opacity: 0.72;
            will-change: transform;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2rem;
            background: rgba(14, 10, 23, 0.92);
            backdrop-filter: blur(12px);
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,107,157,0.2);
        }
        nav .logo {
            font-size: 1.18rem;
            color: var(--sakura-pink);
            font-weight: 700;
            letter-spacing: 0.18rem;
            text-decoration: none;
            white-space: nowrap;
        }
        nav .nav-right { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; justify-content: flex-end; }
        nav a {
            color: rgba(255,225,235,0.78);
            text-decoration: none;
            font-size: 0.88rem;
            padding: 0.42rem 0.7rem;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }
        nav a:hover, nav a.active { color: #fff; background: rgba(255,107,157,0.16); }
        .page {
            position: relative;
            z-index: 5;
            max-width: 1280px;
            margin: 0 auto;
            padding: 7.4rem 1.4rem 3rem;
        }
        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 340px;
            gap: 1.4rem;
            align-items: stretch;
            margin-bottom: 1.4rem;
        }
        .hero-main, .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            backdrop-filter: blur(14px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.28);
        }
        .hero-main { padding: 1.8rem; min-height: 210px; display: flex; flex-direction: column; justify-content: center; }
        .eyebrow { color: var(--moon-gold); font-size: 0.78rem; letter-spacing: 0.22rem; text-transform: uppercase; margin-bottom: 0.7rem; }
        .plaza-title {
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1;
            letter-spacing: 0.18rem;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #fff 0%, #ffccd7 45%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .plaza-subtitle { color: var(--muted); line-height: 1.8; max-width: 62ch; }
        .status-panel { padding: 1.1rem; display: grid; gap: 0.8rem; }
        .status-line { display: flex; align-items: center; justify-content: space-between; gap: 1rem; color: var(--muted); font-size: 0.86rem; }
        .status-value { color: #fff; font-weight: 700; }
        .login-card {
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 8px;
        }
        .login-card strong { display: block; color: var(--sakura-pink); margin-bottom: 0.45rem; }
        .login-card p { color: var(--muted); font-size: 0.82rem; line-height: 1.7; }
        .primary-btn, .ghost-btn, .chip, .icon-btn {
            border: 1px solid rgba(255,183,197,0.28);
            background: rgba(255,107,157,0.18);
            color: var(--sakura-pink);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            text-decoration: none;
        }
        .primary-btn { padding: 0.72rem 1.1rem; font-weight: 700; }
        .ghost-btn { padding: 0.6rem 0.85rem; background: rgba(255,255,255,0.045); color: rgba(255,225,235,0.82); }
        .primary-btn:hover, .ghost-btn:hover, .chip:hover, .icon-btn:hover {
            border-color: rgba(255,183,197,0.52);
            background: rgba(255,107,157,0.26);
            transform: translateY(-1px);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 1rem;
            margin-bottom: 1.4rem;
        }
        .stat-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 1rem;
            min-height: 108px;
        }
        .stat-label { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.5rem; }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.1;
        }
        .stat-note { color: rgba(255,225,235,0.44); font-size: 0.72rem; margin-top: 0.45rem; }
        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 330px;
            gap: 1.4rem;
            align-items: start;
        }
        .wall { padding: 1.1rem; }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .section-title { color: #fff; font-size: 1.05rem; display: flex; align-items: center; gap: 0.55rem; }
        .section-title span { color: var(--sakura-pink); }
        .toolbar { display: flex; gap: 0.55rem; flex-wrap: wrap; align-items: center; }
        .search {
            min-width: min(260px, 100%);
            flex: 1;
            border: 1px solid rgba(255,183,197,0.18);
            background: rgba(255,255,255,0.055);
            color: #fff;
            border-radius: 6px;
            padding: 0.7rem 0.85rem;
            outline: none;
        }
        .search:focus { border-color: rgba(255,183,197,0.45); box-shadow: 0 0 0 3px rgba(255,107,157,0.08); }
        .filters { display: flex; gap: 0.45rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .chip { padding: 0.45rem 0.72rem; font-size: 0.8rem; background: rgba(255,255,255,0.045); }
        .chip.active { background: rgba(255,107,157,0.28); color: #fff; border-color: rgba(255,183,197,0.5); }
        .composer {
            background: rgba(255,255,255,0.045);
            border: 1px solid rgba(255,183,197,0.13);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .composer-top { display: flex; justify-content: space-between; gap: 1rem; color: var(--muted); font-size: 0.82rem; margin-bottom: 0.65rem; }
        .message-input, .reply-input {
            width: 100%;
            min-height: 92px;
            resize: vertical;
            border: 1px solid rgba(255,183,197,0.18);
            background: rgba(8, 8, 16, 0.52);
            color: #fff;
            border-radius: 6px;
            padding: 0.9rem;
            outline: none;
            line-height: 1.7;
        }
        .message-input:focus, .reply-input:focus { border-color: rgba(255,183,197,0.48); }
        .quick-moods { display: flex; gap: 0.45rem; flex-wrap: wrap; margin: 0.75rem 0; }
        .composer-actions { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .char-count { color: var(--muted); font-size: 0.78rem; }
        .messages-list { display: grid; gap: 0.8rem; min-height: 280px; }
        .message-card {
            background: rgba(255,255,255,0.043);
            border: 1px solid rgba(255,183,197,0.13);
            border-radius: 8px;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }
        .message-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--sakura-pink), transparent);
            opacity: 0.75;
        }
        .message-meta { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem; }
        .author { display: flex; align-items: center; gap: 0.65rem; min-width: 0; }
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            background: linear-gradient(135deg, rgba(255,183,197,0.9), rgba(255,107,157,0.85));
            color: #24101b;
            font-weight: 800;
        }
        .author-name { color: var(--sakura-pink); font-size: 0.9rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .message-date { color: rgba(255,225,235,0.42); font-size: 0.74rem; margin-top: 0.12rem; }
        .message-content { color: rgba(255,255,255,0.86); line-height: 1.8; white-space: pre-wrap; overflow-wrap: anywhere; margin-bottom: 0.8rem; }
        .message-footer { display: flex; gap: 0.55rem; align-items: center; flex-wrap: wrap; }
        .icon-btn {
            padding: 0.45rem 0.65rem;
            background: rgba(255,255,255,0.045);
            color: rgba(255,225,235,0.76);
            font-size: 0.78rem;
        }
        .icon-btn.liked { color: #fff; background: rgba(255,107,157,0.24); }
        .reply-form {
            display: none;
            margin-top: 0.9rem;
            padding-top: 0.9rem;
            border-top: 1px solid rgba(255,183,197,0.13);
        }
        .reply-form.show { display: block; }
        .reply-input { min-height: 66px; margin-bottom: 0.55rem; }
        .replies-list {
            display: grid;
            gap: 0.55rem;
            margin-top: 0.8rem;
            padding-left: 1rem;
            border-left: 2px solid rgba(255,183,197,0.14);
        }
        .reply-card {
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 0.78rem;
        }
        .empty-state, .loading-state {
            min-height: 220px;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--muted);
            border: 1px dashed rgba(255,183,197,0.18);
            border-radius: 8px;
            background: rgba(255,255,255,0.025);
            padding: 1.4rem;
        }
        .side { display: grid; gap: 1rem; }
        .side .panel { padding: 1rem; }
        .panel-title { color: #fff; font-size: 0.96rem; margin-bottom: 0.85rem; display: flex; justify-content: space-between; align-items: center; gap: 0.8rem; }
        .friend-list, .activity-list { display: grid; gap: 0.7rem; }
        .friend-card {
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr) auto;
            align-items: center;
            gap: 0.75rem;
            padding: 0.72rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.075);
            color: inherit;
            text-decoration: none;
        }
        .friend-card:hover { border-color: rgba(255,183,197,0.32); background: rgba(255,107,157,0.11); }
        .friend-avatar { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; background: rgba(255,183,197,0.16); color: var(--sakura-pink); font-weight: 800; }
        .friend-name { color: #fff; font-size: 0.86rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .friend-desc { color: var(--muted); font-size: 0.72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 0.14rem; }
        .activity-item {
            display: grid;
            grid-template-columns: 9px minmax(0, 1fr);
            gap: 0.65rem;
            color: var(--muted);
            font-size: 0.8rem;
            line-height: 1.55;
        }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--sakura-pink); margin-top: 0.38rem; box-shadow: 0 0 14px rgba(255,183,197,0.6); }
        .rules { display: grid; gap: 0.55rem; color: var(--muted); font-size: 0.82rem; line-height: 1.6; }
        .toast {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 90;
            min-width: 220px;
            max-width: min(360px, calc(100vw - 2rem));
            padding: 0.8rem 1rem;
            border-radius: 8px;
            background: rgba(18,14,29,0.94);
            border: 1px solid rgba(255,183,197,0.28);
            color: #fff;
            box-shadow: 0 14px 40px rgba(0,0,0,0.34);
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        @media (max-width: 980px) {
            nav { padding: 0.85rem 1rem; align-items: flex-start; }
            nav .nav-right { gap: 0.2rem; }
            nav a { font-size: 0.78rem; padding: 0.36rem 0.45rem; }
            .page { padding: 7rem 1rem 2rem; }
            .hero, .layout { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 560px) {
            body { overflow-x: hidden; }
            nav { position: sticky; }
            .page { padding-top: 1.2rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .section-head { align-items: flex-start; flex-direction: column; }
            .toolbar { width: 100%; }
            .search { width: 100%; }
            .plaza-title { letter-spacing: 0.08rem; }
            .hero-main { padding: 1.25rem; }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/site-theme.css">
</head>
<body>
    <div id="sakuraContainer"></div>
    <nav>
        <a href="hub" class="logo">月读空间</a>
        <div class="nav-right">
            <a href="hub">中枢大厅</a>
            <a href="stage">主舞台</a>
            <a href="arena">竞技场</a>
            <a href="room">私人居所</a>
            <a href="plaza" class="active">月读广场</a>
            <a href="terminal">数据终端</a>
        </div>
    </nav>

    <main class="page">
        <section class="hero">
            <div class="hero-main">
                <div class="eyebrow">Tsukuyomi Plaza</div>
                <h1 class="plaza-title">月读广场</h1>
                <p class="plaza-subtitle">访客、创作者和路过的观测者在这里交换留言。把它当作月读空间的公共频道：简短问候、友链申请、反馈和灵感都可以落在这里。</p>
            </div>
            <aside class="status-panel panel">
                <div class="status-line"><span>当前频道</span><span class="status-value">公共留言墙</span></div>
                <div class="status-line"><span>广场状态</span><span class="status-value" id="plazaStatus">同步中</span></div>
                <div class="login-card" id="loginCard"></div>
            </aside>
        </section>

        <section class="stats-grid">
            <div class="stat-card"><div class="stat-label">站内文章</div><div class="stat-value" id="articleCount">-</div><div class="stat-note">主舞台内容池</div></div>
            <div class="stat-card"><div class="stat-label">注册访客</div><div class="stat-value" id="userCount">-</div><div class="stat-note">已接入月读空间</div></div>
            <div class="stat-card"><div class="stat-label">广场留言</div><div class="stat-value" id="messageCount">-</div><div class="stat-note">包含回复与互动</div></div>
            <div class="stat-card"><div class="stat-label">服务运行</div><div class="stat-value" id="uptime">-</div><div class="stat-note">后端在线时长</div></div>
        </section>

        <section class="layout">
            <div class="panel wall">
                <div class="section-head">
                    <h2 class="section-title"><span>01</span> 留言墙</h2>
                    <div class="toolbar">
                        <input class="search" id="searchInput" type="search" placeholder="搜索作者或留言内容">
                        <button class="ghost-btn" id="refreshBtn" type="button">刷新</button>
                    </div>
                </div>

                <div class="filters" id="filters">
                    <button class="chip active" data-filter="latest" type="button">最新</button>
                    <button class="chip" data-filter="hot" type="button">高赞</button>
                    <button class="chip" data-filter="replied" type="button">有回复</button>
                    <button class="chip" data-filter="mine" type="button">我的</button>
                </div>

                <div class="composer" id="composer"></div>
                <div class="messages-list" id="messagesList"><div class="loading-state">正在连接广场频道...</div></div>
            </div>

            <aside class="side">
                <div class="panel">
                    <div class="panel-title">常驻访客 <span id="friendCount">4</span></div>
                    <div class="friend-list" id="friendsGrid"></div>
                </div>
                <div class="panel">
                    <div class="panel-title">广场动态</div>
                    <div class="activity-list" id="activityList"></div>
                </div>
                <div class="panel">
                    <div class="panel-title">留言约定</div>
                    <div class="rules">
                        <p>保持友好，避免刷屏和敏感信息。</p>
                        <p>友链申请请留下站点名、地址和简短介绍。</p>
                        <p>反馈问题时尽量写清页面、操作和现象。</p>
                    </div>
                </div>
            </aside>
        </section>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const state = {
            messages: [],
            stats: null,
            filter: 'latest',
            query: '',
            loading: false
        };

        const els = {
            loginCard: document.getElementById('loginCard'),
            composer: document.getElementById('composer'),
            messagesList: document.getElementById('messagesList'),
            searchInput: document.getElementById('searchInput'),
            filters: document.getElementById('filters'),
            refreshBtn: document.getElementById('refreshBtn'),
            friendsGrid: document.getElementById('friendsGrid'),
            friendCount: document.getElementById('friendCount'),
            activityList: document.getElementById('activityList'),
            plazaStatus: document.getElementById('plazaStatus'),
            articleCount: document.getElementById('articleCount'),
            userCount: document.getElementById('userCount'),
            messageCount: document.getElementById('messageCount'),
            uptime: document.getElementById('uptime'),
            toast: document.getElementById('toast')
        };

        const friends = [
            { name: '月读空间官方', desc: '项目仓库与更新记录', url: 'https://github.com/redchenk/tsukuyomi-space', avatar: '月' },
            { name: '辉夜姬博客', desc: '文章、公告与创作札记', url: 'stage', avatar: '文' },
            { name: 'KASSEN 竞技场', desc: '3v3 涨粉对抗原型', url: 'arena', avatar: '战' },
            { name: '友链申请', desc: '留下站点信息等待审核', url: 'terminal', avatar: '链' }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            initSakura();
            renderLoginState();
            renderComposer();
            renderFriends();
            bindEvents();
            recordView();
            refreshAll();
        });

        function bindEvents() {
            els.refreshBtn.addEventListener('click', refreshAll);
            els.searchInput.addEventListener('input', event => {
                state.query = event.target.value.trim().toLowerCase();
                renderMessages();
            });
            els.filters.addEventListener('click', event => {
                const btn = event.target.closest('[data-filter]');
                if (!btn) return;
                state.filter = btn.dataset.filter;
                els.filters.querySelectorAll('.chip').forEach(chip => chip.classList.toggle('active', chip === btn));
                renderMessages();
            });
        }

        function initSakura() {
            const container = document.getElementById('sakuraContainer');
            const petals = [];
            for (let i = 0; i < 38; i++) {
                const el = document.createElement('div');
                el.className = 'sakura';
                const size = 5 + Math.random() * 7;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.left = Math.random() * 100 + '%';
                container.appendChild(el);
                petals.push({
                    el,
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    spin: Math.random() * 360,
                    vx: -0.18 + Math.random() * 0.38,
                    vy: 0.22 + Math.random() * 0.55
                });
            }
            function tick() {
                petals.forEach(petal => {
                    petal.x += petal.vx;
                    petal.y += petal.vy;
                    petal.spin += 0.45;
                    if (petal.y > window.innerHeight + 24) {
                        petal.y = -24;
                        petal.x = Math.random() * window.innerWidth;
                    }
                    petal.el.style.transform = `translate(${petal.x}px, ${petal.y}px) rotate(${petal.spin}deg)`;
                });
                requestAnimationFrame(tick);
            }
            tick();
        }

        function getToken() {
            return localStorage.getItem('tsukuyomi_token') || localStorage.getItem('admin_token') || '';
        }

        function getUser() {
            const raw = localStorage.getItem('tsukuyomi_user') || localStorage.getItem('admin_user') || '{}';
            try { return JSON.parse(raw); } catch (_) { return {}; }
        }

        function isLoggedIn() {
            return Boolean(getToken() && getUser().username);
        }

        function renderLoginState() {
            const user = getUser();
            if (isLoggedIn()) {
                els.loginCard.innerHTML = `
                    <strong>${escapeHtml(user.username)}</strong>
                    <p>已接入广场频道。你可以发布留言、回复访客和为留言点赞。</p>
                `;
            } else {
                els.loginCard.innerHTML = `
                    <strong>访客模式</strong>
                    <p>当前可以浏览留言。登录后可发布、回复与点赞。</p>
                    <div style="margin-top:0.8rem;"><a class="primary-btn" href="login?redirect=plaza">去登录</a></div>
                `;
            }
        }

        function renderComposer() {
            if (!isLoggedIn()) {
                els.composer.innerHTML = `
                    <div class="empty-state" style="min-height:150px;">
                        <div>
                            <div style="font-weight:700;color:#fff;margin-bottom:0.45rem;">登录后开放留言终端</div>
                            <div style="margin-bottom:1rem;">发布问候、反馈或友链申请都会出现在广场留言墙。</div>
                            <a class="primary-btn" href="login?redirect=plaza">登录</a>
                        </div>
                    </div>
                `;
                return;
            }
            els.composer.innerHTML = `
                <div class="composer-top">
                    <span>发布一条新的广场留言</span>
                    <span class="char-count" id="charCount">0 / 300</span>
                </div>
                <textarea class="message-input" id="messageInput" maxlength="300" placeholder="写下你的留言..."></textarea>
                <div class="quick-moods">
                    <button class="chip" type="button" data-insert="【问候】">问候</button>
                    <button class="chip" type="button" data-insert="【反馈】">反馈</button>
                    <button class="chip" type="button" data-insert="【友链】">友链</button>
                    <button class="chip" type="button" data-insert="【灵感】">灵感</button>
                </div>
                <div class="composer-actions">
                    <span class="char-count">Enter 换行，发布后会同步到广场。</span>
                    <button class="primary-btn" id="submitMessageBtn" type="button">发布留言</button>
                </div>
            `;
            const input = document.getElementById('messageInput');
            const counter = document.getElementById('charCount');
            input.addEventListener('input', () => counter.textContent = `${input.value.length} / 300`);
            els.composer.querySelectorAll('[data-insert]').forEach(btn => {
                btn.addEventListener('click', () => {
                    input.value = `${btn.dataset.insert} ${input.value}`.slice(0, 300);
                    counter.textContent = `${input.value.length} / 300`;
                    input.focus();
                });
            });
            document.getElementById('submitMessageBtn').addEventListener('click', submitMessage);
        }

        function renderFriends() {
            els.friendCount.textContent = friends.length;
            els.friendsGrid.innerHTML = friends.map(friend => `
                <a class="friend-card" href="${escapeAttr(friend.url)}">
                    <div class="friend-avatar">${escapeHtml(friend.avatar)}</div>
                    <div>
                        <div class="friend-name">${escapeHtml(friend.name)}</div>
                        <div class="friend-desc">${escapeHtml(friend.desc)}</div>
                    </div>
                    <div style="color:rgba(255,225,235,0.42);">↗</div>
                </a>
            `).join('');
        }

        async function refreshAll() {
            els.plazaStatus.textContent = '同步中';
            state.loading = true;
            renderMessages();
            await Promise.all([loadStats(), loadMessages()]);
            state.loading = false;
            els.plazaStatus.textContent = '在线';
            renderMessages();
            renderActivity();
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const result = await res.json();
                if (!result.success) throw new Error(result.message || 'stats failed');
                state.stats = result.data || {};
                els.articleCount.textContent = formatNumber(state.stats.articles || 0);
                els.userCount.textContent = formatNumber(state.stats.users || 0);
                els.messageCount.textContent = formatNumber(state.stats.messages || 0);
                els.uptime.textContent = formatUptime(state.stats.uptime || 0);
            } catch (error) {
                console.error(error);
                els.plazaStatus.textContent = '统计不可用';
            }
        }

        async function loadMessages() {
            try {
                const res = await fetch('/api/messages');
                const result = await res.json();
                if (!result.success) throw new Error(result.message || 'messages failed');
                state.messages = Array.isArray(result.data) ? result.data : [];
            } catch (error) {
                console.error(error);
                showToast('留言加载失败，请稍后再试');
                state.messages = [];
            }
        }

        function getTopMessages() {
            const all = state.messages;
            const repliesByParent = new Map();
            all.forEach(item => {
                if (!item.parent_id) return;
                const list = repliesByParent.get(item.parent_id) || [];
                list.push(item);
                repliesByParent.set(item.parent_id, list);
            });
            let top = all.filter(item => !item.parent_id).map(item => ({
                ...item,
                replies: (repliesByParent.get(item.id) || []).sort((a, b) => new Date(a.created_at) - new Date(b.created_at))
            }));
            if (state.query) {
                top = top.filter(item => {
                    const haystack = `${item.author || ''} ${item.content || ''} ${item.replies.map(r => `${r.author || ''} ${r.content || ''}`).join(' ')}`.toLowerCase();
                    return haystack.includes(state.query);
                });
            }
            const currentUser = getUser().username;
            if (state.filter === 'hot') {
                top.sort((a, b) => (b.like_count || 0) - (a.like_count || 0) || new Date(b.created_at) - new Date(a.created_at));
            } else if (state.filter === 'replied') {
                top = top.filter(item => item.replies.length > 0);
                top.sort((a, b) => b.replies.length - a.replies.length || new Date(b.created_at) - new Date(a.created_at));
            } else if (state.filter === 'mine') {
                top = top.filter(item => currentUser && item.author === currentUser);
                top.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            } else {
                top.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            }
            return top;
        }

        function renderMessages() {
            if (state.loading) {
                els.messagesList.innerHTML = '<div class="loading-state">正在连接广场频道...</div>';
                return;
            }
            const messages = getTopMessages();
            if (messages.length === 0) {
                els.messagesList.innerHTML = `
                    <div class="empty-state">
                        <div>
                            <div style="font-weight:700;color:#fff;margin-bottom:0.45rem;">还没有匹配的留言</div>
                            <div>换个筛选条件，或者发布第一条广场消息。</div>
                        </div>
                    </div>
                `;
                return;
            }
            els.messagesList.innerHTML = messages.map(renderMessage).join('');
        }

        function renderMessage(msg) {
            const liked = localStorage.getItem('liked_' + msg.id) === '1';
            const replies = msg.replies || [];
            return `
                <article class="message-card" id="msg-${msg.id}">
                    <div class="message-meta">
                        <div class="author">
                            <div class="avatar">${escapeHtml(initialOf(msg.author))}</div>
                            <div>
                                <div class="author-name">${escapeHtml(msg.author || '匿名访客')}</div>
                                <div class="message-date">${formatDate(msg.created_at)}</div>
                            </div>
                        </div>
                        <div class="message-date">#${msg.id}</div>
                    </div>
                    <div class="message-content">${escapeHtml(msg.content || '')}</div>
                    <div class="message-footer">
                        <button class="icon-btn ${liked ? 'liked' : ''}" type="button" onclick="likeMessage(${msg.id})">喜欢 ${msg.like_count || 0}</button>
                        <button class="icon-btn" type="button" onclick="toggleReplyForm(${msg.id})">回复 ${replies.length}</button>
                        <button class="icon-btn" type="button" onclick="copyMessageLink(${msg.id})">复制链接</button>
                    </div>
                    <div class="reply-form" id="reply-form-${msg.id}">
                        <textarea class="reply-input" id="reply-input-${msg.id}" maxlength="220" placeholder="写下回复..."></textarea>
                        <div class="message-footer">
                            <button class="primary-btn" type="button" onclick="submitReply(${msg.id})">发布回复</button>
                            <button class="ghost-btn" type="button" onclick="toggleReplyForm(${msg.id})">取消</button>
                        </div>
                    </div>
                    ${replies.length ? `<div class="replies-list">${replies.map(renderReply).join('')}</div>` : ''}
                </article>
            `;
        }

        function renderReply(reply) {
            return `
                <div class="reply-card">
                    <div class="message-meta" style="margin-bottom:0.45rem;">
                        <div class="author">
                            <div class="avatar" style="width:30px;height:30px;font-size:0.78rem;">${escapeHtml(initialOf(reply.author))}</div>
                            <div>
                                <div class="author-name" style="font-size:0.82rem;">${escapeHtml(reply.author || '匿名访客')}</div>
                                <div class="message-date">${formatDate(reply.created_at)}</div>
                            </div>
                        </div>
                    </div>
                    <div class="message-content" style="margin-bottom:0;">${escapeHtml(reply.content || '')}</div>
                </div>
            `;
        }

        function renderActivity() {
            const top = [...state.messages]
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                .slice(0, 6);
            if (top.length === 0) {
                els.activityList.innerHTML = '<div class="activity-item"><span class="dot"></span><span>广场刚刚开放，等待第一条动态。</span></div>';
                return;
            }
            els.activityList.innerHTML = top.map(item => `
                <div class="activity-item">
                    <span class="dot"></span>
                    <span>${escapeHtml(item.author || '访客')} ${item.parent_id ? '回复了留言' : '发布了留言'} · ${formatRelative(item.created_at)}</span>
                </div>
            `).join('');
        }

        async function submitMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!isLoggedIn()) {
                window.location.href = 'login?redirect=plaza';
                return;
            }
            if (!content) {
                showToast('留言内容不能为空');
                return;
            }
            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ content })
                });
                const result = await res.json();
                if (!result.success) throw new Error(result.message || '发布失败');
                input.value = '';
                const counter = document.getElementById('charCount');
                if (counter) counter.textContent = '0 / 300';
                showToast('留言已发布');
                await refreshAll();
            } catch (error) {
                showToast(error.message || '发布失败');
            }
        }

        function toggleReplyForm(id) {
            if (!isLoggedIn()) {
                window.location.href = 'login?redirect=plaza';
                return;
            }
            const form = document.getElementById('reply-form-' + id);
            if (!form) return;
            form.classList.toggle('show');
            const input = document.getElementById('reply-input-' + id);
            if (form.classList.contains('show') && input) input.focus();
        }

        async function submitReply(id) {
            const input = document.getElementById('reply-input-' + id);
            const content = input.value.trim();
            if (!content) {
                showToast('回复内容不能为空');
                return;
            }
            try {
                const res = await fetch('/api/messages/' + id + '/reply', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ content })
                });
                const result = await res.json();
                if (!result.success) throw new Error(result.message || '回复失败');
                showToast('回复已发布');
                await refreshAll();
            } catch (error) {
                showToast(error.message || '回复失败');
            }
        }

        async function likeMessage(id) {
            if (!isLoggedIn()) {
                window.location.href = 'login?redirect=plaza';
                return;
            }
            if (localStorage.getItem('liked_' + id) === '1') {
                showToast('你已经喜欢过这条留言');
                return;
            }
            try {
                const res = await fetch('/api/messages/' + id + '/like', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const result = await res.json();
                if (!result.success) throw new Error(result.message || '点赞失败');
                localStorage.setItem('liked_' + id, '1');
                showToast('已点亮留言');
                await refreshAll();
            } catch (error) {
                showToast(error.message || '点赞失败');
            }
        }

        async function copyMessageLink(id) {
            const url = `${location.origin}${location.pathname}#msg-${id}`;
            try {
                await navigator.clipboard.writeText(url);
                showToast('留言链接已复制');
            } catch (_) {
                location.hash = 'msg-' + id;
                showToast('已定位到留言');
            }
        }

        async function recordView() {
            try {
                await fetch('/api/stats/view', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: location.pathname })
                });
            } catch (_) {}
        }

        function showToast(text) {
            els.toast.textContent = text;
            els.toast.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => els.toast.classList.remove('show'), 2200);
        }

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value == null ? '' : String(value);
            return div.innerHTML;
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/"/g, '&quot;');
        }

        function initialOf(name) {
            const text = String(name || '访客').trim();
            return text.slice(0, 1).toUpperCase();
        }

        function formatNumber(value) {
            return Number(value || 0).toLocaleString('zh-CN');
        }

        function formatDate(value) {
            if (!value) return '刚刚';
            return new Date(value).toLocaleString('zh-CN', { hour12: false });
        }

        function formatRelative(value) {
            const time = new Date(value).getTime();
            const diff = Math.max(0, Date.now() - time);
            const minute = Math.floor(diff / 60000);
            if (minute < 1) return '刚刚';
            if (minute < 60) return `${minute} 分钟前`;
            const hour = Math.floor(minute / 60);
            if (hour < 24) return `${hour} 小时前`;
            return `${Math.floor(hour / 24)} 天前`;
        }

        function formatUptime(seconds) {
            const total = Math.floor(Number(seconds || 0));
            const days = Math.floor(total / 86400);
            const hours = Math.floor((total % 86400) / 3600);
            if (days > 0) return `${days}天${hours}时`;
            return `${hours}时`;
        }
    </script>
</body>
</html>
