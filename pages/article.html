<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title data-i18n="article_title">文章详情 | 月读空间</title>
    <style>
        :root {
            --sakura-pink: #ffb7c5;
            --deep-pink: #ff6b9d;
            --purple: #c44569;
            --dark-bg: #1a1025;
            --night-blue: #0f1724;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, rgba(45,31,61,0.7) 0%, rgba(26,16,37,0.8) 40%, rgba(15,23,36,0.9) 100%),
                        url('../assets/images/tsukuyomi-bg.png') center center / cover no-repeat fixed;
            font-family: 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            padding-top: 80px;
        }

        #sakuraContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .sakura {
            position: absolute;
            background: linear-gradient(135deg, #ffb7c5 0%, #ff6b9d 100%);
            border-radius: 50% 0 50% 0;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.2rem 2rem;
            background: rgba(26,16,37,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,107,157,0.2);
        }
        nav .logo {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #fff, #ffb7c5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        nav .nav-right { display: flex; align-items: center; gap: 1rem; }
        nav .nav-right a {
            color: rgba(255,183,197,0.8);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        nav .nav-right a:hover { color: #ffb7c5; }

        .lang-switcher {
            display: flex;
            gap: 0.5rem;
            background: rgba(255,107,157,0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: 1px solid rgba(255,107,157,0.3);
        }
        .lang-btn {
            padding: 0.4rem 1rem;
            background: transparent;
            border: 1px solid rgba(255,183,197,0.3);
            border-radius: 20px;
            color: rgba(255,183,197,0.75);
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.3s;
        }
        .lang-btn.active {
            background: rgba(255,107,157,0.25);
            border-color: rgba(255,107,157,0.6);
            color: #ffb7c5;
            font-weight: 600;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 2rem;
            padding: 0.6rem 1.2rem;
            background: rgba(255,107,157,0.2);
            color: #ffb7c5;
            border: 1px solid rgba(255,107,157,0.3);
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,107,157,0.3);
            transform: translateX(-5px);
        }

        .article-header {
            margin-bottom: 2rem;
        }
        .article-header h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, #ffb7c5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            color: rgba(255,183,197,0.7);
            font-size: 0.85rem;
        }
        .tag {
            padding: 0.3rem 0.8rem;
            background: rgba(255,107,157,0.15);
            border: 1px solid rgba(255,107,157,0.3);
            border-radius: 15px;
            font-size: 0.8rem;
        }

        .article-cover {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 2rem;
            max-height: 400px;
            object-fit: cover;
        }

        .article-content {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,107,157,0.2);
            border-radius: 12px;
            padding: 2rem;
            color: rgba(255,255,255,0.9);
            line-height: 1.8;
        }
        .article-content h2 {
            color: #ffb7c5;
            font-size: 1.5rem;
            margin: 1.5rem 0 1rem;
        }
        .article-content h3 {
            color: #ff6b9d;
            font-size: 1.2rem;
            margin: 1.2rem 0 0.8rem;
        }
        .article-content p {
            margin-bottom: 1rem;
        }
        .article-content blockquote {
            border-left: 3px solid rgba(255,107,157,0.5);
            padding-left: 1rem;
            margin: 1rem 0;
            color: rgba(255,183,197,0.8);
            font-style: italic;
        }
        .article-content code {
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        .article-content pre {
            background: rgba(0,0,0,0.4);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .article-content pre code {
            background: transparent;
            padding: 0;
        }

        /* 评论区样式 */
        .comments-section {
            margin-top: 2rem;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,107,157,0.2);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .comments-title {
            font-size: 1.2rem;
            color: var(--sakura-pink);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .comment-form {
            margin-bottom: 1.5rem;
        }
        .comment-input {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,183,197,0.2);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 80px;
        }
        .comment-input:focus {
            outline: none;
            border-color: var(--sakura-pink);
            box-shadow: 0 0 10px rgba(255,183,197,0.2);
        }
        .comment-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.8rem;
        }
        .btn-comment {
            padding: 0.6rem 1.5rem;
            background: rgba(255,107,157,0.2);
            border: 1px solid var(--sakura-pink);
            border-radius: 8px;
            color: var(--sakura-pink);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .btn-comment:hover {
            background: rgba(255,107,157,0.3);
            box-shadow: 0 0 15px rgba(255,183,197,0.3);
        }
        .comment-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .comment-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,183,197,0.1);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .comment-author {
            color: var(--sakura-pink);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .comment-date {
            color: rgba(255,183,197,0.4);
            font-size: 0.7rem;
        }
        .comment-content {
            color: rgba(255,255,255,0.85);
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .login-prompt {
            text-align: center;
            padding: 2rem;
            color: rgba(255,183,197,0.6);
        }
        .login-prompt a {
            color: var(--sakura-pink);
            text-decoration: none;
        }
        .login-prompt a:hover {
            text-decoration: underline;
        }

        .article-content ul, .article-content ol {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }
        .article-content li {
            margin-bottom: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255,183,197,0.6);
            font-size: 1.1rem;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .article-header h1 { font-size: 1.5rem; }
            .article-content { padding: 1.2rem; }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/site-theme.css">
    <script defer src="../assets/js/site-nav.js"></script>
    <script defer src="../assets/js/ambient-fish.js"></script>
</head>
<body>
    <div id="sakuraContainer"></div>

    <nav>
        <a href="hub" class="logo" data-i18n="space_name">月读空间</a>
        <div class="nav-right">
            <a href="hub" data-i18n="nav_hub">中枢大厅</a>
            <a href="stage" data-i18n="nav_stage">主舞台</a>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh'); return false;">中文</button>
                <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja'); return false;">日本語</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="stage" class="back-btn">← 返回列表</a>

        <div id="articleContainer">
            <div class="loading" data-i18n="loading">加载中...</div>
        </div>
    </div>

    <div class="footer" data-i18n="footer">© 超かぐや姫！風</div>

    <script src="i18n.js"></script>
    <script>
        const API_BASE = '/api';
        const articleId = new URLSearchParams(window.location.search).get('id');

        document.addEventListener('DOMContentLoaded', function() {
            initLanguage();
            loadArticle();
            initSakura();
        });

        async function loadArticle() {
            const container = document.getElementById('articleContainer');

            if (!articleId) {
                container.innerHTML = '<div class="loading">文章 ID 不存在</div>';
                return;
            }

            try {
                const response = await fetch(API_BASE + '/articles/' + articleId);
                const result = await response.json();

                if (result.success && result.data) {
                    const article = result.data;
                    container.innerHTML = `
                        <div class="article-header">
                            <h1>${article.title}</h1>
                            <div class="article-meta">
                                <span>📅 ${article.publish_date || article.created_at}</span>
                                <span>👤 ${article.author_username || 'admin'}</span>
                                <span>⏱️ ${article.read_time || '5 min'}</span>
                                <span class="tag">${article.category}</span>
                            </div>
                        </div>
                        ${article.cover_image ? `<img src="${article.cover_image}" alt="封面" class="article-cover">` : ''}
                        <div class="article-content">${formatContent(article.content)}</div>

                        <div class="comments-section">
                            <h2 class="comments-title">💬 评论</h2>
                            <div id="commentFormContainer"></div>
                            <div class="comment-list" id="commentList"></div>
                        </div>
                    `;

                    // 初始化评论表单
                    initCommentForm();
                    loadComments();
                } else {
                    container.innerHTML = '<div class="loading">文章不存在</div>';
                }
            } catch (error) {
                console.error('加载文章失败:', error);
                container.innerHTML = '<div class="loading">加载失败，请稍后重试</div>';
            }
        }

        function formatContent(content) {
            if (!content) return '';

            let html = content;
            html = html.replace(/## (.*?)(\n|$)/g, '<h2>$1</h2>');
            html = html.replace(/### (.*?)(\n|$)/g, '<h3>$1</h3>');
            html = html.replace(/> (.*?)(\n|$)/g, '<blockquote>$1</blockquote>');
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        function initSakura() {
            window.initTsukuyomiAmbientFish({ containerId: 'sakuraContainer' });
        }

        function checkLogin() {
            const token = localStorage.getItem('tsukuyomi_token');
            const user = localStorage.getItem('tsukuyomi_user');
            return !!(token && user);
        }

        function getToken() {
            return localStorage.getItem('tsukuyomi_token');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadComments() {
            const list = document.getElementById('commentList');
            try {
                const res = await fetch('/api/messages?article_id=' + articleId);
                const result = await res.json();
                if (result.success && result.data) {
                    const topLevelComments = result.data.filter(m => !m.parent_id);
                    if (topLevelComments.length === 0) {
                        list.innerHTML = '<div style="text-align:center;padding:2rem;color:rgba(255,183,197,0.5);">暂无评论，快来发布第一条吧！</div>';
                        return;
                    }
                    list.innerHTML = topLevelComments.map(c => renderComment(c, result.data)).join('');
                }
            } catch (error) {
                console.error('加载评论失败:', error);
                list.innerHTML = '<div style="text-align:center;padding:2rem;color:rgba(255,183,197,0.5);">加载失败</div>';
            }
        }

        function renderComment(comment, allComments) {
            const replies = allComments.filter(r => r.parent_id === comment.id);
            const liked = localStorage.getItem('liked_' + comment.id) === '1';
            const date = new Date(comment.created_at).toLocaleString('zh-CN');
            return `
                <div class="comment-item" id="comment-${comment.id}">
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(comment.author)}</span>
                        <span class="comment-date">${date}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    <div style="display:flex;gap:1rem;margin-top:0.8rem;">
                        <button class="btn-comment" style="padding:0.4rem 1rem;font-size:0.8rem;" onclick="likeComment(${comment.id})">
                            🤍 <span class="like-count">${comment.like_count || 0}</span>
                        </button>
                        <button class="btn-comment" style="padding:0.4rem 1rem;font-size:0.8rem;" onclick="toggleReplyForm(${comment.id})">
                            💬 回复
                        </button>
                    </div>
                    <div class="reply-form" id="reply-form-${comment.id}" style="display:none;margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid rgba(255,183,197,0.1);">
                        <textarea class="comment-input" id="reply-input-${comment.id}" style="min-height:60px;font-size:0.85rem;"></textarea>
                        <div class="comment-actions" style="display:flex;gap:0.5rem;margin-top:0.5rem;">
                            <button class="btn-comment" style="padding:0.5rem 1rem;font-size:0.8rem;" onclick="submitReply(${comment.id})">发布回复</button>
                            <button class="btn-comment" style="padding:0.5rem 1rem;font-size:0.8rem;background:transparent;" onclick="toggleReplyForm(${comment.id})">取消</button>
                        </div>
                    </div>
                    ${replies.length > 0 ? `<div style="margin-top:0.8rem;padding-left:1rem;border-left:2px solid rgba(255,183,197,0.15);">${replies.map(r => renderReply(r)).join('')}</div>` : ''}
                </div>
            `;
        }

        function renderReply(reply) {
            const date = new Date(reply.created_at).toLocaleString('zh-CN');
            return `
                <div class="comment-item" style="margin-bottom:0.5rem;">
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(reply.author)}</span>
                        <span class="comment-date">${date}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(reply.content)}</div>
                </div>
            `;
        }

        async function submitComment() {
            if (!checkLogin()) {
                alert('请先登录！');
                window.location.href = 'login';
                return;
            }
            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            if (!content) {
                alert('评论内容不能为空');
                return;
            }
            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                    body: JSON.stringify({ content, article_id: articleId })
                });
                const result = await res.json();
                if (result.success) {
                    input.value = '';
                    loadComments();
                } else {
                    alert(result.message || '发布失败');
                }
            } catch (error) {
                console.error('发布评论失败:', error);
                alert('网络错误');
            }
        }

        function initCommentForm() {
            const container = document.getElementById('commentFormContainer');
            if (checkLogin()) {
                container.innerHTML = `
                    <div class="comment-form">
                        <textarea class="comment-input" id="commentInput" placeholder="写下你的评论..."></textarea>
                        <div class="comment-actions">
                            <button class="btn-comment" onclick="submitComment()">发布评论</button>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="login-prompt">
                        <div style="margin-bottom:1rem;">🔐 登录后才能发表评论</div>
                        <a href="login" class="btn-comment">去登录</a>
                    </div>
                `;
            }
        }

        function toggleReplyForm(commentId) {
            const form = document.getElementById('reply-form-' + commentId);
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function submitReply(commentId) {
            if (!checkLogin()) {
                alert('请先登录！');
                return;
            }
            const input = document.getElementById('reply-input-' + commentId);
            const content = input.value.trim();
            if (!content) {
                alert('回复内容不能为空');
                return;
            }
            try {
                const res = await fetch('/api/messages/' + commentId + '/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                    body: JSON.stringify({ content })
                });
                const result = await res.json();
                if (result.success) {
                    loadComments();
                } else {
                    alert(result.message || '回复失败');
                }
            } catch (error) {
                console.error('回复失败:', error);
                alert('网络错误');
            }
        }

        async function likeComment(commentId) {
            if (!checkLogin()) {
                alert('请先登录！');
                window.location.href = 'login';
                return;
            }
            if (localStorage.getItem('liked_' + commentId) === '1') {
                alert('已点赞');
                return;
            }
            try {
                const res = await fetch('/api/messages/' + commentId + '/like', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const result = await res.json();
                if (result.success) {
                    localStorage.setItem('liked_' + commentId, '1');
                    loadComments();
                } else {
                    alert(result.message || '点赞失败');
                }
            } catch (error) {
                console.error('点赞失败:', error);
                alert('网络错误');
            }
        }
    </script>
</body>
</html>
