<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title data-i18n="stage_title">主舞台 | 月读空间</title>
    <style>
        :root{--sakura-pink:#ffb7c5;--deep-pink:#ff6b9d;--dark-bg:#1a1025}
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;background:linear-gradient(180deg,#2d1f3d 0%,#1a1025 50%,#0f1724 100%);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden;position:relative}
        #sakuraContainer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
        nav{position:fixed;top:0;left:0;width:100%;padding:1rem 2rem;background:rgba(26,16,37,0.95);backdrop-filter:blur(10px);z-index:1000;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,107,157,0.2)}
        nav .logo{font-size:1.3rem;background:linear-gradient(135deg,#fff,#ffb7c5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;font-weight:500}
        nav .nav-right{display:flex;align-items:center;gap:0.8rem}
        nav a{color:rgba(255,183,197,0.8);text-decoration:none;font-size:0.9rem;padding:0.4rem 0.8rem;border-radius:15px;transition:all 0.3s}
        nav a:hover,nav a.active{color:#ffb7c5;background:rgba(255,107,157,0.15)}
        .lang-switcher{display:flex;gap:0.4rem;background:rgba(255,107,157,0.2);padding:0.3rem 0.6rem;border-radius:20px;border:1px solid rgba(255,107,157,0.4);margin-left:0.5rem}
        .lang-btn{padding:0.25rem 0.7rem;background:transparent;border:1px solid rgba(255,183,197,0.3);border-radius:15px;color:rgba(255,183,197,0.8);cursor:pointer;font-size:0.75rem;transition:all 0.3s;white-space:nowrap}
        .lang-btn:hover{background:rgba(255,107,157,0.25);border-color:rgba(255,107,157,0.5)}
        .lang-btn.active{background:rgba(255,107,157,0.3);border-color:rgba(255,107,157,0.6);color:#ffb7c5;font-weight:600}
        .container{position:relative;z-index:10;min-height:100vh;padding:7rem 2rem 2rem;max-width:1000px;margin:0 auto}
        .header{text-align:center;margin-bottom:3rem}
        .title{font-size:2rem;background:linear-gradient(135deg,#fff,#ffb7c5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem}
        .subtitle{color:rgba(255,183,197,0.6);font-size:0.85rem}
        .controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;gap:1rem;flex-wrap:wrap}
        .search-box{flex:1;min-width:200px}
        .search-box input{width:100%;padding:0.7rem 1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,107,157,0.2);border-radius:6px;color:rgba(255,183,197,0.9);font-size:0.9rem}
        .search-box input::placeholder{color:rgba(255,183,197,0.4)}
        .btn{padding:0.7rem 1.5rem;background:rgba(255,107,157,0.2);color:#ffb7c5;border:1px solid rgba(255,107,157,0.3);border-radius:6px;text-decoration:none;font-size:0.9rem;transition:all 0.3s}
        .btn:hover{background:rgba(255,107,157,0.3);transform:translateY(-2px)}
        .filters{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem}
        .filter-btn{padding:0.5rem 1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,107,157,0.2);border-radius:20px;color:rgba(255,183,197,0.7);cursor:pointer;font-size:0.85rem;transition:all 0.3s}
        .filter-btn:hover{background:rgba(255,107,157,0.15);border-color:rgba(255,107,157,0.4)}
        .filter-btn.active{background:rgba(255,107,157,0.25);border-color:rgba(255,107,157,0.5);color:#ffb7c5}
        .articles-list{display:flex;flex-direction:column;gap:1.5rem}
        .article-item{display:flex;gap:1.5rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,107,157,0.15);border-radius:8px;padding:0;text-decoration:none;transition:all 0.3s;align-items:stretch;overflow:hidden;height:160px;position:relative}
        .article-item:hover{transform:translateX(8px);border-color:rgba(255,107,157,0.3);background:rgba(255,107,157,0.08)}
        .article-content{flex:1;padding:1.2rem;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
        .article-meta{display:flex;gap:0.8rem;margin-bottom:0.6rem;flex-wrap:wrap}
        .tag{padding:0.25rem 0.7rem;background:rgba(255,107,157,0.15);border-radius:12px;font-size:0.7rem;color:rgba(255,183,197,0.9);font-weight:500}
        .article-title{font-size:1.1rem;color:rgba(255,183,197,0.95);margin-bottom:0.4rem;font-weight:500;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .article-excerpt{color:rgba(255,183,197,0.6);line-height:1.4;margin-bottom:0.6rem;font-size:0.85rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .article-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:0.5rem}
        .read-time{font-size:0.75rem;color:rgba(255,183,197,0.5)}
        .arrow{color:rgba(255,107,157,0.4);transition:all 0.3s;font-size:1.1rem}
        .article-item:hover .arrow{color:rgba(255,107,157,0.8);transform:translateX(4px)}
        .article-cover-wrapper{width:45%;position:relative;overflow:hidden;flex-shrink:0}
        .article-cover{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;display:block}
        .article-item:hover .article-cover{transform:scale(1.05)}
        .article-cover-wrapper::before{content:'';position:absolute;left:0;top:0;width:100px;height:100%;background:linear-gradient(90deg,rgba(26,16,37,0.9) 0%,rgba(26,16,37,0.6) 30%,rgba(26,16,37,0.3) 50%,rgba(26,16,37,0.1) 70%,transparent 100%);z-index:1;pointer-events:none}
        .article-cover-wrapper::after{content:'';position:absolute;right:0;top:0;width:100px;height:100%;background:linear-gradient(-90deg,rgba(26,16,37,0.9) 0%,rgba(26,16,37,0.6) 30%,rgba(26,16,37,0.3) 50%,rgba(26,16,37,0.1) 70%,transparent 100%);z-index:1;pointer-events:none}
        .arrow-overlay{position:absolute;bottom:1rem;right:1rem;z-index:10;color:rgba(255,107,157,0.6);font-size:1.3rem;transition:all 0.3s;pointer-events:none}
        .article-item:hover .arrow-overlay{color:rgba(255,107,157,0.9);transform:translateX(4px)}
        .footer{position:fixed;bottom:1rem;color:rgba(255,255,255,0.3);font-size:0.65rem;width:100%;text-align:center;letter-spacing:0.1rem}
        @media(max-width:768px){nav{padding:0.8rem 1rem}nav .nav-right{gap:0.5rem}nav a{font-size:0.8rem;padding:0.3rem 0.6rem}.lang-switcher{padding:0.2rem 0.5rem}.lang-btn{font-size:0.7rem;padding:0.2rem 0.5rem}.container{padding:6rem 1rem 1rem}.article-item{flex-direction:column;height:auto}.article-cover-wrapper{width:100%;height:200px}.article-cover-wrapper::before,.article-cover-wrapper::after{display:none}.arrow-overlay{display:none}}
    </style>
    <link rel="stylesheet" href="../assets/css/site-theme.css">
    <script defer src="../assets/js/site-nav.js"></script>
    <script defer src="../assets/js/ambient-fish.js?v=20260501-flickerfix"></script>
</head>
<body>
    <div id="sakuraContainer"></div>
    <nav>
        <a href="hub" class="logo" data-i18n="space_name">月读空间</a>
        <div class="nav-right">
            <a href="hub" data-i18n="nav_hub">中枢大厅</a>
            <a href="stage" class="active" data-i18n="nav_stage">主舞台</a>
            <a href="arena" data-i18n="nav_arena">竞技场</a>
            <span id="userDisplay" style="color:var(--sakura-pink);font-size:0.85rem;display:none;"></span>
            <a href="user-center" id="userCenterLink" style="display:none;color:var(--sakura-pink);">用户中心</a>
            <a href="login" id="loginLink" data-i18n="login">登录</a>
            <button id="logoutBtn" onclick="handleLogout()" style="display:none;background:transparent;border:1px solid rgba(255,183,197,0.3);border-radius:15px;color:rgba(255,183,197,0.8);padding:0.4rem 0.8rem;cursor:pointer;font-size:0.85rem;">退出</button>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh'); return false;">中文</button>
                <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja'); return false;">日本語</button>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="header">
            <h1 class="title" data-i18n="stage_title">主舞台</h1>
            <p class="subtitle" data-i18n="stage_subtitle">演唱会场馆 | 博客文章</p>
        </div>
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" data-i18n="search_placeholder" placeholder="搜索文章...">
            </div>
            <a href="editor" class="btn" data-i18n="new_post" onclick="checkEditorAuth(event)">✏️ 新建投稿</a>
        </div>
        <div class="filters" id="filters">
            <button class="filter-btn active" data-category="all" data-i18n="filter_all">全部</button>
            <button class="filter-btn" data-category="公告" data-i18n="filter_announcement">公告</button>
            <button class="filter-btn" data-category="传说" data-i18n="filter_legend">传说</button>
            <button class="filter-btn" data-category="技术" data-i18n="filter_technology">技术</button>
            <button class="filter-btn" data-category="其他" data-i18n="filter_other">其他</button>
        </div>
        <div class="articles-list" id="articlesList">
            <div class="loading" data-i18n="loading">加载中...</div>
        </div>
    </div>
    <div class="footer" data-i18n="footer">© 超かぐや姫！風</div>
    <script src="i18n.js"></script>
    <script>
        const API_BASE='/api';
        let allArticles=[];
        let currentCategory='all';
        let searchQuery='';
        
        document.addEventListener('DOMContentLoaded', function() {
            initLanguage();
            initStageFish();
            loadArticles();
            checkLoginStatus();
        });

        function initStageFish() {
            window.initTsukuyomiAmbientFish?.({
                containerId: 'sakuraContainer',
                density: 0.78
            });
        }

        function checkLoginStatus() {
            const token = localStorage.getItem('admin_token') || localStorage.getItem('tsukuyomi_token');
            const userStr = localStorage.getItem('admin_user') || localStorage.getItem('tsukuyomi_user');

            const userDisplay = document.getElementById('userDisplay');
            const userCenterLink = document.getElementById('userCenterLink');
            const loginLink = document.getElementById('loginLink');
            const logoutBtn = document.getElementById('logoutBtn');

            if (token && userStr) {
                try {
                    const user = JSON.parse(userStr);
                    userDisplay.textContent = '👤 ' + (user.username || user.email);
                    userDisplay.style.display = 'inline';
                    userCenterLink.style.display = 'inline';
                    loginLink.style.display = 'none';
                    logoutBtn.style.display = 'inline';
                } catch (e) {
                    console.error('解析用户信息失败:', e);
                }
            }
        }

        function handleLogout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            localStorage.removeItem('tsukuyomi_token');
            localStorage.removeItem('tsukuyomi_user');
            location.reload();
        }

        function checkEditorAuth(event) {
            const token = localStorage.getItem('admin_token') || localStorage.getItem('tsukuyomi_token');
            const userStr = localStorage.getItem('admin_user') || localStorage.getItem('tsukuyomi_user');

            if (!token || !userStr) {
                event.preventDefault();
                alert('请先登录后再投稿文章！\n\n请点击导航栏的"登录"按钮进行登录。');
                window.location.href = 'login';
                return false;
            }
        }
        
        async function loadArticles(){
            const list=document.getElementById('articlesList');
            try{
                const response=await fetch(API_BASE+'/articles');
                const result=await response.json();
                if(result.success){
                    allArticles=result.data;
                    renderArticles();
                }else{
                    list.innerHTML='<div style="text-align:center;padding:3rem;color:rgba(255,183,197,0.5);" data-i18n="load_failed">加载失败</div>';
                }
            }catch(error){
                console.error('加载文章失败:', error);
                list.innerHTML='<div style="text-align:center;padding:3rem;color:rgba(255,183,197,0.5);" data-i18n="load_failed">加载失败</div>';
            }
        }
        
        function renderArticles(){
            const list=document.getElementById('articlesList');
            let filtered=allArticles;
            if(currentCategory!=='all')filtered=filtered.filter(a=>a.category===currentCategory);
            if(searchQuery){
                const query=searchQuery.toLowerCase();
                filtered=filtered.filter(a=>a.title.toLowerCase().includes(query)||a.excerpt.toLowerCase().includes(query));
            }
            if(filtered.length===0){
                list.innerHTML='<div style="text-align:center;padding:3rem;color:rgba(255,183,197,0.5);" data-i18n="no_articles">暂无文章</div>';
                return;
            }
            list.innerHTML=filtered.map(article=>`
                <a href="article?id=${article.id}" class="article-item">
                    <div class="article-content">
                        <div class="article-meta">
                            <span class="tag">${article.category}</span>
                            <span class="tag" style="background:rgba(255,255,255,0.1)">👤 ${article.author_username||'admin'}</span>
                        </div>
                        <h3 class="article-title">${article.title}</h3>
                        <p class="article-excerpt">${article.excerpt}</p>
                        <div class="article-footer">
                            <span class="read-time">⏱️ ${article.read_time}</span>
                            ${!article.cover_image ? '<span class="arrow">→</span>' : ''}
                        </div>
                    </div>
                    ${article.cover_image ? `
                        <div class="article-cover-wrapper">
                            <img src="${article.cover_image}" alt="封面" class="article-cover">
                            <span class="arrow-overlay">→</span>
                        </div>
                    ` : ''}
                </a>
            `).join('');
        }
        
        document.getElementById('filters').addEventListener('click',(e)=>{
            if(e.target.classList.contains('filter-btn')){
                document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory=e.target.dataset.category;
                renderArticles();
            }
        });
        
        document.getElementById('searchInput').addEventListener('input',(e)=>{
            searchQuery=e.target.value;
            renderArticles();
        });
    </script>
</body>
</html>
