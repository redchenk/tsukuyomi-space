<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title>月読空間 - Tsukuyomi Space</title>
    <style>
        :root {
            --sakura-pink: #ffb7c5;
            --deep-pink: #ff6b9d;
            --purple: #c44569;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* 视频背景 */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.6;
        }
        
        /* 视频加载失败时的后备背景 */
        body.no-video {
            background: linear-gradient(180deg, #2d1f3d 0%, #1a1025 50%, #0f1724 100%);
        }
        
        /* 渐变遮罩 */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(45,31,61,0.4) 0%, 
                rgba(26,16,37,0.6) 50%, 
                rgba(15,23,36,0.7) 100%);
            z-index: 1;
        }
        
        /* 樱花层 */
        #sakuraContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .sakura {
            position: absolute;
            background: linear-gradient(135deg, #ffb7c5 0%, #ff6b9d 100%);
            border-radius: 50% 0 50% 0;
            will-change: transform, opacity;
        }
        
        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease-out;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-jp {
            font-size: 5rem;
            background: linear-gradient(135deg, #fff 0%, #ffb7c5 50%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 300;
            letter-spacing: 0.5rem;
            text-shadow: 0 0 40px rgba(255,107,157,0.5);
        }
        
        .logo-en {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.8rem;
            margin-top: 0.5rem;
            font-weight: 300;
        }
        
        /* 副标题 */
        .subtitle {
            font-size: 0.95rem;
            color: rgba(255,183,197,0.8);
            text-align: center;
            margin: 2rem 0 4rem;
            line-height: 2;
            font-weight: 300;
            animation: fadeIn 1.5s ease-out;
        }
        .subtitle span {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* 按钮 */
        .access-btn {
            position: relative;
            padding: 1.3rem 5rem;
            font-size: 1.3rem;
            background: rgba(255,107,157,0.15);
            color: #ffb7c5;
            border: 1px solid rgba(255,107,157,0.4);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Noto Sans JP', sans-serif;
            letter-spacing: 0.3rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out 0.5s both;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .access-btn:hover {
            background: rgba(255,107,157,0.25);
            border-color: rgba(255,107,157,0.7);
            box-shadow: 0 0 40px rgba(255,107,157,0.4);
            transform: translateY(-3px);
        }
        
        /* VR 加载层 */
        .vr-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .vr-overlay.active { display: flex; }
        
        .vr-text {
            color: #ffb7c5;
            font-size: 1.3rem;
            margin-bottom: 2rem;
            letter-spacing: 0.3rem;
        }
        
        .loading-bar {
            width: 280px;
            height: 2px;
            background: rgba(255,107,157,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffb7c5, #ff6b9d);
            width: 0;
            box-shadow: 0 0 20px rgba(255,107,157,0.6);
        }
        
        /* 页脚 */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
            letter-spacing: 0.2rem;
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .logo-jp { font-size: 3.5rem; }
            .logo-en { font-size: 1rem; letter-spacing: 0.4rem; }
            .access-btn { padding: 1rem 3rem; font-size: 1.1rem; }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/site-theme.css">
    <script defer src="../assets/js/site-nav.js"></script>
</head>
<body>
    <!-- 视频背景 -->
    <video autoplay muted loop playsinline id="bgVideo">
        <source src="../assets/video/【4K⧸中日双语】超时空辉夜姬「ray 」官方MV.mp4" type="video/mp4">
    </video>
    
    <!-- 渐变遮罩 -->
    <div class="video-overlay"></div>
    
    <!-- 樱花层 -->
    <div id="sakuraContainer"></div>
    
    <!-- 主内容 -->
    <div class="container">
        <div class="logo">
            <div class="logo-jp">月読空間</div>
            <div class="logo-en">TSUKUYOMI SPACE</div>
        </div>
        
        <p class="subtitle">
            夢と希望が交わる場所
            <span>Welcome to the space where dreams and hopes meet</span>
        </p>
        
        <button class="access-btn" onclick="startAccess()">アクセス</button>
    </div>
    
    <!-- 加载层 -->
    <div class="vr-overlay" id="vrOverlay">
        <div class="vr-text" id="vrText">CONNECTING...</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
    </div>
    
    <div class="footer">© 超かぐや姫！風</div>
    
    <script>
        // 视频错误处理
        const video = document.getElementById('bgVideo');
        video.addEventListener('error', function(e) {
            console.log('视频加载失败，使用后备背景');
            document.body.classList.add('no-video');
        });
        
        // 樱花背景
        const sakuraContainer = document.getElementById('sakuraContainer');
        const sakuras = [];
        
        function createSakura() {
            const el = document.createElement('div');
            el.className = 'sakura';
            const size = Math.random() * 6 + 5;
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.left = (Math.random() * 100) + '%';
            sakuraContainer.appendChild(el);
            return {
                el: el, x: 0, y: -Math.random() * window.innerHeight * 0.5 - 50,
                vy: Math.random() * 0.4 + 0.3,
                angle: Math.random() * Math.PI * 2,
                angleSpeed: Math.random() * 0.015 + 0.008,
                swayRadius: Math.random() * 15 + 8,
                rot: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 0.8,
                flip: Math.random() > 0.5 ? 1 : -1,
                opacity: Math.random() * 0.2 + 0.75
            };
        }
        
        for (let i = 0; i < 35; i++) {
            const s = createSakura();
            s.y = Math.random() * window.innerHeight;
            sakuras.push(s);
        }
        
        function animate() {
            sakuras.forEach(s => {
                s.y += s.vy;
                s.angle += s.angleSpeed;
                s.x = Math.sin(s.angle) * s.swayRadius * s.flip;
                s.rot += s.rotSpeed;
                let alpha = s.opacity;
                if (s.y < 50) alpha = s.opacity * (s.y / 50);
                else if (s.y > window.innerHeight - 50) alpha = s.opacity * ((window.innerHeight - s.y) / 50);
                s.el.style.transform = `translate(${s.x}px, ${s.y}px) rotate(${s.rot}deg)`;
                s.el.style.opacity = alpha;
                if (s.y > window.innerHeight + 30) {
                    s.y = -30 - Math.random() * 50;
                    s.x = 0;
                    s.angle = Math.random() * Math.PI * 2;
                    s.flip = Math.random() > 0.5 ? 1 : -1;
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
        
        // 加载进度条
        function startAccess() {
            const overlay = document.getElementById('vrOverlay');
            const progressEl = document.getElementById('loadingProgress');
            const vrText = document.getElementById('vrText');
            
            overlay.classList.add('active');
            
            const msgs = ['CONNECTING...', 'LOADING...', 'SYNCHRONIZING...', 'WELCOME!'];
            let currentValue = 0;
            let msgIndex = 0;
            const speed = 100 / 120;
            
            function update() {
                currentValue += speed;
                progressEl.style.width = Math.min(currentValue, 100) + '%';
                
                const threshold = (msgIndex + 1) * 25;
                if (currentValue >= threshold && msgIndex < msgs.length - 1) {
                    msgIndex++;
                    vrText.textContent = msgs[msgIndex];
                }
                
                if (currentValue >= 100) {
                    window.location.href = 'hub';
                    return;
                }
                
                requestAnimationFrame(update);
            }
            
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
