<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title data-i18n="hub_title">月读空间 - 中枢大厅</title>
    <style>
        :root {
            --sakura-pink: #ffb7c5;
            --deep-pink: #ff6b9d;
            --purple: #c44569;
            --dark-bg: #1a1025;
            --night-blue: #0f1724;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            /* 使用《超かぐや姫！》场景图作为背景 */
            background: linear-gradient(180deg, rgba(45,31,61,0.7) 0%, rgba(26,16,37,0.8) 40%, rgba(15,23,36,0.9) 100%),
                        url('../assets/images/tsukuyomi-bg.png') center center / cover no-repeat fixed;
            font-family: 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
        }
        
        /* 游鱼背景容器 */
        #sakuraContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.2rem 2rem;
            background: rgba(26,16,37,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,107,157,0.2);
        }
        nav .logo {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #fff, #ffb7c5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 500;
            letter-spacing: 0.3rem;
            text-decoration: none;
        }
        nav .nav-right { display: flex; align-items: center; gap: 1rem; }
        
        /* 语言切换器 */
        .lang-switcher {
            display: flex;
            gap: 0.5rem;
            background: rgba(255,107,157,0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: 1px solid rgba(255,107,157,0.3);
        }
        .lang-btn {
            padding: 0.4rem 1rem;
            background: transparent;
            border: 1px solid rgba(255,183,197,0.3);
            border-radius: 20px;
            color: rgba(255,183,197,0.75);
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.3s;
            font-family: 'Noto Sans JP', sans-serif;
            white-space: nowrap;
        }
        .lang-btn:hover {
            background: rgba(255,107,157,0.2);
            border-color: rgba(255,107,157,0.5);
            color: #ffb7c5;
        }
        .lang-btn.active {
            background: rgba(255,107,157,0.25);
            border-color: rgba(255,107,157,0.6);
            color: #ffb7c5;
            font-weight: 600;
        }
        
        nav .user-info {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255,107,157,0.1);
            border: 1px solid rgba(255,107,157,0.2);
            border-radius: 20px;
            color: #ffb7c5;
            font-size: 0.8rem;
        }
        nav .user-info.show { display: flex; }
        nav .user-info a {
            color: var(--sakura-pink);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        nav .user-info a:hover {
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(255,183,197,0.5);
        }
        nav .logout-btn {
            padding: 0.3rem 0.8rem;
            background: rgba(255,107,157,0.15);
            border: 1px solid rgba(255,107,157,0.3);
            border-radius: 15px;
            color: #ff6b9d;
            cursor: pointer;
            font-size: 0.75rem;
        }
        nav .login-btn {
            padding: 0.5rem 1.5rem;
            background: rgba(255,107,157,0.1);
            color: #ffb7c5;
            border: 1px solid rgba(255,107,157,0.25);
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        /* 主容器 */
        .hub-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8rem 2rem 2rem;
        }
        
        /* 标题区域 */
        .title-area {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .hub-title {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff 0%, #ffb7c5 50%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
            letter-spacing: 0.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(255,107,157,0.3);
        }
        
        .hub-subtitle {
            color: rgba(255,183,197,0.5);
            font-size: 0.85rem;
            letter-spacing: 0.3rem;
            font-weight: 300;
        }
        
        /* 场景列表 */
        .scenes-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-width: 480px;
            width: 100%;
        }
        
        .scene-item {
            position: relative;
            padding: 1.2rem 1.5rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,107,157,0.1);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            overflow: hidden;
        }
        
        .scene-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, #ffb7c5, #ff6b9d);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .scene-item:hover {
            background: rgba(255,107,157,0.06);
            border-color: rgba(255,107,157,0.3);
            transform: translateX(6px);
        }
        
        .scene-item:hover::before {
            opacity: 1;
        }
        
        .scene-icon {
            font-size: 1.5rem;
            min-width: 2rem;
            text-align: center;
            opacity: 0.9;
        }
        
        .scene-content { flex: 1; }
        
        .scene-name {
            color: rgba(255,183,197,0.9);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.1rem;
            margin-bottom: 0.2rem;
        }
        
        .scene-desc {
            color: rgba(255,183,197,0.4);
            font-size: 0.75rem;
            font-weight: 300;
            white-space: pre-line;
        }
        
        .scene-arrow {
            color: rgba(255,107,157,0.3);
            font-size: 1rem;
            transition: all 0.4s;
        }
        
        .scene-item:hover .scene-arrow {
            transform: translateX(4px);
            color: rgba(255,107,157,0.7);
        }
        
        /* 分隔线 */
        .scene-divider {
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255,107,157,0.15), 
                transparent);
            margin: 0.3rem 0;
        }
        
        /* 竹枝彩蛋 */
        .bamboo {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            font-size: 1.8rem;
            cursor: pointer;
            opacity: 0.4;
            z-index: 100;
            transition: all 0.3s;
        }
        .bamboo:hover { opacity: 1; transform: scale(1.15); }
        
        /* 页脚 */
        .footer {
            position: fixed;
            bottom: 1rem;
            color: rgba(255,255,255,0.25);
            font-size: 0.65rem;
            letter-spacing: 0.15rem;
            z-index: 10;
            width: 100%;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .scenes-list { max-width: 100%; padding: 0 1rem; }
            .hub-title { font-size: 2rem; letter-spacing: 0.3rem; }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/site-theme.css">
    <script defer src="../assets/js/site-nav.js"></script>
    <script defer src="../assets/js/ambient-fish.js?v=20260501-flickerfix"></script>
</head>
<body>
    <!-- 游鱼背景容器 -->
    <div id="sakuraContainer"></div>
    
    <nav>
        <a href="access" class="logo" data-i18n="space_name">月读空间</a>
        <div class="nav-right">
            <div class="user-info" id="userInfo">
                <a href="user-center" id="usernameDisplay" style="color: var(--sakura-pink); text-decoration: none;"></a>
                <button class="logout-btn" onclick="logout()" data-i18n="logout">退出</button>
            </div>
            <a href="login" class="login-btn" id="loginBtn" data-i18n="login">登录</a>
            <!-- 语言切换器 -->
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh')">中文</button>
                <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja')">日本語</button>
            </div>
        </div>
    </nav>
    
    <div class="hub-container">
        <div class="title-area">
            <h1 class="hub-title" data-i18n="hub_title">中枢大厅</h1>
            <p class="hub-subtitle" data-i18n="hub_subtitle">夢と希望が交わる場所</p>
        </div>
        
        <div class="scenes-list">
            <a href="stage" class="scene-item">
                <div class="scene-icon">🎤</div>
                <div class="scene-content">
                    <div class="scene-name" data-i18n="scene_main_stage">主舞台</div>
                    <div class="scene-desc" data-i18n="scene_main_stage_desc">演唱会场馆
博客文章</div>
                </div>
                <div class="scene-arrow">→</div>
            </a>
            
            <a href="arena" class="scene-item">
                <div class="scene-icon">⚔️</div>
                <div class="scene-content">
                    <div class="scene-name" data-i18n="scene_arena">竞技场</div>
                    <div class="scene-desc" data-i18n="scene_arena_desc">格斗游戏区
项目展示</div>
                </div>
                <div class="scene-arrow">→</div>
            </a>
            
            <a href="room" class="scene-item">
                <div class="scene-icon">🏠</div>
                <div class="scene-content">
                    <div class="scene-name" data-i18n="scene_room">私人居所</div>
                    <div class="scene-desc" data-i18n="scene_room_desc">个人虚拟房间
关于我/技能树</div>
                </div>
                <div class="scene-arrow">→</div>
            </a>
            
            <a href="plaza" class="scene-item">
                <div class="scene-icon">💬</div>
                <div class="scene-content">
                    <div class="scene-name" data-i18n="scene_plaza">月读广场</div>
                    <div class="scene-desc" data-i18n="scene_plaza_desc">公共社交区
留言板/访客互动</div>
                </div>
                <div class="scene-arrow">→</div>
            </a>

            <a href="reality" class="scene-item">
                <div class="scene-icon">🌍</div>
                <div class="scene-content">
                    <div class="scene-name" data-i18n="scene_reality">リアルワールド</div>
                    <div class="scene-desc" data-i18n="scene_reality_desc">連絡先</div>
                </div>
                <div class="scene-arrow">→</div>
            </a>
        </div>
    </div>
    
    <div class="bamboo" id="bamboo">🎋</div>
    <div class="footer" data-i18n="footer">© 超かぐや姫！風</div>
    
    <script src="i18n.js"></script>
    <script>
        // 初始化语言和用户状态
        document.addEventListener('DOMContentLoaded', function() {
            initLanguage();
            checkUserStatus();
            initSakura();
        });
        
        // 检查用户登录状态
        function checkUserStatus() {
            const token = localStorage.getItem('tsukuyomi_token');
            const userStr = localStorage.getItem('tsukuyomi_user');
            
            if (token && userStr) {
                try {
                    const user = JSON.parse(userStr);
                    document.getElementById('usernameDisplay').textContent = user.username || user.email;
                    document.getElementById('userInfo').classList.add('show');
                    document.getElementById('loginBtn').style.display = 'none';
                } catch (e) {
                    console.error('解析用户信息失败:', e);
                }
            }
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('tsukuyomi_token');
            localStorage.removeItem('tsukuyomi_user');
            window.location.reload();
        }
        
        // 游鱼背景动画
        function initSakura() {
            window.initTsukuyomiAmbientFish({ containerId: 'sakuraContainer' });
        }
        
        // 竹枝彩蛋
        document.getElementById('bamboo').addEventListener('click', function() {
            alert('🎋 竹枝彩蛋：ありがとう！');
        });
    </script>
</body>
</html>
