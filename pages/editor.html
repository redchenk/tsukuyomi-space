<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title>文章编辑器 | 月读空间</title>
    <style>
        :root { --pink:#ffb7c5; --accent:#7edbe8; --bg:#101827; --panel:rgba(255,255,255,.04); --line:rgba(126,219,232,.18); --muted:rgba(225,236,246,.62); --text:rgba(255,255,255,.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; overflow-x: hidden; background: radial-gradient(circle at 78% 12%, rgba(244,207,114,.12), transparent 15rem), linear-gradient(135deg,#0b1020,#14102a 48%,#07121e); color: var(--text); font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", Arial, sans-serif; }
        #sakuraContainer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        nav { position: fixed; top: 0; width: 100%; min-height: 68px; padding: 1rem 2rem; background: rgba(10,15,30,.86); backdrop-filter: blur(16px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
        nav .logo { color: #fff; font-size: 1.15rem; font-weight: 700; text-decoration: none; }
        nav .nav-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        nav a { color: var(--muted); text-decoration: none; font-size: .9rem; }
        nav a:hover, nav a.active { color: #fff; }
        .lang-switcher { position: fixed; top: 5.2rem; right: 1.4rem; z-index: 999; display: flex; gap: .25rem; padding: .2rem; border: 1px solid var(--line); border-radius: 8px; background: rgba(8,13,27,.62); backdrop-filter: blur(14px); }
        .lang-btn { min-height: 32px; padding: .35rem .65rem; border-radius: 8px; border: 1px solid rgba(126,219,232,.22); background: rgba(8,13,27,.54); color: var(--muted); cursor: pointer; }
        .lang-btn.active, .lang-btn:hover { color: #fff; border-color: rgba(126,219,232,.5); background: rgba(126,219,232,.12); }
        .container { position: relative; z-index: 10; width: min(100% - 2rem, 940px); margin: 0 auto; padding: 8.4rem 0 3rem; }
        .header { text-align: center; margin-bottom: 1.6rem; }
        .title { font-size: clamp(1.7rem, 4vw, 2.25rem); color: #fff; margin-bottom: .45rem; }
        .subtitle { color: var(--muted); font-size: .9rem; }
        .editor-form { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: clamp(1.2rem,3vw,2rem); backdrop-filter: blur(18px); }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; color: rgba(255,255,255,.86); margin-bottom: .5rem; font-size: .92rem; font-weight: 600; }
        input, select, textarea { width: 100%; padding: .88rem 1rem; background: rgba(6,10,22,.58); border: 1px solid rgba(126,219,232,.18); border-radius: 6px; color: #fff; font: inherit; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: rgba(126,219,232,.55); box-shadow: 0 0 0 3px rgba(126,219,232,.09); }
        input::placeholder, textarea::placeholder { color: rgba(225,236,246,.36); }
        textarea { min-height: 170px; resize: vertical; line-height: 1.75; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .help-text { margin-top: .45rem; color: var(--muted); font-size: .8rem; }
        .cover-upload { position: relative; min-height: 170px; border: 2px dashed rgba(126,219,232,.28); border-radius: 8px; padding: 1.4rem; text-align: center; background: rgba(255,255,255,.025); cursor: pointer; }
        .cover-upload:hover { border-color: rgba(126,219,232,.5); background: rgba(126,219,232,.05); }
        .cover-upload input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .cover-preview { max-width: 100%; max-height: 300px; border-radius: 6px; display: none; margin: .75rem auto 0; box-shadow: 0 10px 28px rgba(0,0,0,.26); }
        .cover-preview.show { display: block; }
        .cover-remove { position: absolute; top: .5rem; right: .5rem; width: 32px; height: 32px; border: 0; border-radius: 50%; background: rgba(255,95,120,.84); color: #fff; cursor: pointer; display: none; }
        .cover-upload.has-image .cover-remove { display: grid; place-items: center; }
        .btn-group { display: flex; gap: .8rem; margin-top: 1.7rem; }
        .btn { min-height: 46px; padding: .85rem 1.35rem; border-radius: 6px; cursor: pointer; font: inherit; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; border: 1px solid rgba(126,219,232,.24); }
        .btn-primary { color: #fff; background: linear-gradient(135deg, rgba(255,95,150,.3), rgba(126,219,232,.18)); }
        .btn-secondary { color: var(--muted); background: rgba(255,255,255,.04); }
        .btn:disabled { opacity: .55; cursor: not-allowed; }
        .message { display: none; padding: .9rem; border-radius: 6px; margin-bottom: 1.2rem; }
        .success { color: #97f2c1; border: 1px solid rgba(100,255,150,.26); background: rgba(100,255,150,.1); }
        .error { color: #ff9bab; border: 1px solid rgba(255,95,120,.3); background: rgba(255,95,120,.1); }
        .login-notice { text-align: center; padding: 4rem 1rem; color: var(--muted); }
        .login-notice a { color: #fff; }
        .footer { position: relative; z-index: 10; padding: 0 1rem 1.2rem; text-align: center; color: rgba(255,255,255,.3); font-size: .72rem; }
        @media (max-width: 760px) { nav { align-items: flex-start; gap: .6rem; flex-direction: column; } .container { padding-top: 10.2rem; } .lang-switcher { top: 7.8rem; right: 1rem; } .form-row, .btn-group { grid-template-columns: 1fr; flex-direction: column; } }
    </style>
    <script defer src="../assets/js/site-nav.js"></script>
    <script defer src="../assets/js/ambient-fish.js"></script>
</head>
<body>
    <div id="sakuraContainer"></div>
    <nav><a href="hub" class="logo" data-i18n="space_name">月读空间</a><div class="nav-right"><a href="stage" data-i18n="nav_stage">主舞台</a><a href="hub" data-i18n="return">返回大厅</a></div></nav>
    <div class="lang-switcher" aria-label="Language"><button type="button" class="lang-btn active" data-lang="zh">中文</button><button type="button" class="lang-btn" data-lang="ja">日本語</button></div>
    <main class="container">
        <div class="header"><h1 class="title" data-i18n="editor_title">文章编辑器</h1><p class="subtitle" data-i18n="editor_subtitle">写下公告、传说或技术记录</p></div>
        <div id="editorContainer"><div class="login-notice" data-i18n="loading">加载中...</div></div>
    </main>
    <div class="footer">月读空间 · Tsukuyomi Space</div>
    <script>
        const API_BASE='/api'; let coverImageBase64=null, coverImageSize=0;
        const i18n={zh:{space_name:'月读空间',nav_stage:'主舞台',return:'返回大厅',editor_title:'文章编辑器',editor_subtitle:'写下公告、传说或技术记录',loading:'加载中...',field_cover:'封面图片（可选）',cover_pick:'点击或拖入图片作为文章封面',cover_hint:'建议 1200 x 630px，支持 JPG / PNG',remove:'×',field_title:'标题',title_ph:'请输入文章标题',field_category:'分类',category_select:'请选择分类',cat_announcement:'公告',cat_legend:'传说',cat_technology:'技术',cat_other:'其他',field_read_time:'阅读时间',read_time_ph:'例如 5 min',field_excerpt:'摘要',excerpt_ph:'用 200 字以内概括文章',excerpt_hint:'摘要会显示在文章列表中',field_content:'正文',content_ph:'开始书写正文...',content_hint:'支持 Markdown：# 标题、- 列表、> 引用、`代码`',submit:'发布文章',update:'保存修改',cancel:'取消',need_login:'请先登录后再使用编辑器。',login:'前往登录',load_failed:'文章加载失败：',network_failed:'网络请求失败',image_only:'请选择图片文件',image_failed:'图片处理失败，请换一张图片重试',required:'请完整填写标题、分类、阅读时间、摘要和正文',publishing:'发布中...',saving:'保存中...',published:'文章发布成功，正在跳转...',saved:'文章已更新，正在跳转...',submit_failed:'提交失败：',unknown:'未知错误'},ja:{space_name:'月読空間',nav_stage:'メインステージ',return:'ホールへ戻る',editor_title:'記事エディター',editor_subtitle:'お知らせ、伝説、技術記録を書く',loading:'読み込み中...',field_cover:'カバー画像（任意）',cover_pick:'クリックして記事カバーを選択',cover_hint:'推奨 1200 x 630px、JPG / PNG 対応',remove:'×',field_title:'タイトル',title_ph:'記事タイトルを入力',field_category:'カテゴリ',category_select:'カテゴリを選択',cat_announcement:'お知らせ',cat_legend:'伝説',cat_technology:'技術',cat_other:'その他',field_read_time:'読了時間',read_time_ph:'例：5 min',field_excerpt:'概要',excerpt_ph:'200字以内で概要を書く',excerpt_hint:'一覧に表示されます',field_content:'本文',content_ph:'本文を書き始める...',content_hint:'Markdown 対応：# 見出し、- リスト、> 引用、`コード`',submit:'記事を公開',update:'変更を保存',cancel:'キャンセル',need_login:'ログインしてからエディターを使用してください。',login:'ログインへ',load_failed:'記事の読み込みに失敗：',network_failed:'ネットワークエラー',image_only:'画像ファイルを選択してください',image_failed:'画像処理に失敗しました',required:'必須項目をすべて入力してください',publishing:'公開中...',saving:'保存中...',published:'公開しました。移動しています...',saved:'保存しました。移動しています...',submit_failed:'送信失敗：',unknown:'不明なエラー'}};
        let currentLang='zh', currentArticle=null, currentUser=null, currentToken=null, currentAdmin=false;
        document.addEventListener('DOMContentLoaded',()=>{window.initTsukuyomiAmbientFish?.({containerId:'sakuraContainer',density:.56}); setLanguage(localStorage.getItem('lang')||'zh'); document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLanguage(b.dataset.lang))); checkAuth();});
        function t(key){return (i18n[currentLang]&&i18n[currentLang][key])||i18n.zh[key]||key;}
        function setLanguage(lang){currentLang=i18n[lang]?lang:'zh'; localStorage.setItem('lang',currentLang); document.documentElement.lang=currentLang==='zh'?'zh-CN':'ja'; document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===currentLang)); document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);}); if(document.getElementById('editorForm')) renderEditorForm(currentArticle);}
        function escapeHtml(value){return String(value||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
        async function parseResponse(res){const text=await res.text(); try{return text?JSON.parse(text):{success:false,message:`HTTP ${res.status}`};}catch{return{success:false,message:text.replace(/<[^>]*>/g,'').trim().slice(0,160)||`HTTP ${res.status}`};}}
        function showMessage(type,msg){const ok=document.getElementById('successMsg'), bad=document.getElementById('errorMsg'); if(!ok||!bad) return; ok.style.display='none'; bad.style.display='none'; const el=type==='success'?ok:bad; el.textContent=msg; el.style.display='block'; window.scrollTo({top:0,behavior:'smooth'});}
        function getSession(){let token=localStorage.getItem('admin_token'), userStr=localStorage.getItem('admin_user'), admin=true; if(!token||!userStr){token=localStorage.getItem('tsukuyomi_token'); userStr=localStorage.getItem('tsukuyomi_user'); admin=false;} if(!token||!userStr) return null; try{return {token,user:JSON.parse(userStr),admin};}catch{return null;}}
        async function checkAuth(){const session=getSession(); if(!session){editorContainer.innerHTML=`<div class="login-notice">${t('need_login')}<br><br><a class="btn btn-primary" href="login?redirect=editor">${t('login')}</a></div>`; return;} currentToken=session.token; currentUser=session.user; currentAdmin=session.admin||session.user.role==='admin'; const id=new URLSearchParams(location.search).get('id'); if(id){try{const url=currentAdmin?`${API_BASE}/admin/articles/${id}`:`${API_BASE}/user/articles/${id}`; const res=await fetch(url,{headers:{Authorization:'Bearer '+currentToken}}); const result=await parseResponse(res); if(!result.success) throw new Error(result.message||t('unknown')); currentArticle=result.data; renderEditorForm(currentArticle);}catch(e){editorContainer.innerHTML=`<div class="login-notice">${t('load_failed')}${escapeHtml(e.message||t('network_failed'))}</div>`;}}else{currentArticle=null; renderEditorForm(null);}}
        function renderEditorForm(article){const isEdit=!!article; const category=article?.category||''; editorContainer.innerHTML=`<form class="editor-form" id="editorForm"><div class="message success" id="successMsg"></div><div class="message error" id="errorMsg"></div><div class="form-group"><label>${t('field_cover')}</label><div class="cover-upload" id="coverUpload"><input type="file" id="coverInput" accept="image/*"><div id="coverPlaceholder"><strong>${t('cover_pick')}</strong><div class="help-text">${t('cover_hint')}</div></div><img class="cover-preview" id="coverPreview" alt="${t('field_cover')}"><button type="button" class="cover-remove" id="coverRemove">${t('remove')}</button></div></div><div class="form-group"><label for="title">${t('field_title')}</label><input type="text" id="title" required placeholder="${t('title_ph')}" value="${escapeHtml(article?.title||'')}"></div><div class="form-row"><div class="form-group"><label for="category">${t('field_category')}</label><select id="category" required><option value="">${t('category_select')}</option><option value="公告">${t('cat_announcement')}</option><option value="传说">${t('cat_legend')}</option><option value="技术">${t('cat_technology')}</option><option value="其他">${t('cat_other')}</option></select></div><div class="form-group"><label for="readTime">${t('field_read_time')}</label><input type="text" id="readTime" required placeholder="${t('read_time_ph')}" value="${escapeHtml(article?.read_time||'5 min')}"></div></div><div class="form-group"><label for="excerpt">${t('field_excerpt')}</label><textarea id="excerpt" maxlength="200" required placeholder="${t('excerpt_ph')}">${escapeHtml(article?.excerpt||'')}</textarea><div class="help-text">${t('excerpt_hint')}</div></div><div class="form-group"><label for="content">${t('field_content')}</label><textarea id="content" required style="min-height:400px" placeholder="${t('content_ph')}">${escapeHtml(article?.content||'')}</textarea><div class="help-text">${t('content_hint')}</div></div><div class="btn-group"><button type="submit" class="btn btn-primary" id="submitBtn">${isEdit?t('update'):t('submit')}</button><a href="javascript:history.back()" class="btn btn-secondary">${t('cancel')}</a></div></form>`; document.getElementById('category').value=['公告','传说','技术','其他'].includes(category)?category:(category||'其他'); document.getElementById('editorForm').addEventListener('submit',handleSubmit); document.getElementById('coverInput').addEventListener('change',handleCoverUpload); document.getElementById('coverRemove').addEventListener('click',removeCover); coverImageBase64=article?.cover_image||null; if(coverImageBase64) showCover(coverImageBase64);}
        function showCover(src){coverPreview.src=src; coverPreview.classList.add('show'); coverPlaceholder.style.display='none'; coverUpload.classList.add('has-image');}
        function compressImage(file,maxWidth=1200,maxHeight=630,quality=.72){return new Promise((resolve,reject)=>{const reader=new FileReader(); reader.onload=e=>{const img=new Image(); img.onload=()=>{let w=img.width,h=img.height; if(w>maxWidth){h*=maxWidth/w; w=maxWidth;} if(h>maxHeight){w*=maxHeight/h; h=maxHeight;} const canvas=document.createElement('canvas'); canvas.width=Math.round(w); canvas.height=Math.round(h); canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height); resolve(canvas.toDataURL('image/jpeg',quality));}; img.onerror=reject; img.src=e.target.result;}; reader.onerror=reject; reader.readAsDataURL(file);});}
        async function handleCoverUpload(e){const file=e.target.files[0]; if(!file) return; if(!file.type.startsWith('image/')) return showMessage('error',t('image_only')); try{coverImageBase64=await compressImage(file); coverImageSize=Math.round(coverImageBase64.length*3/4); showCover(coverImageBase64);}catch{showMessage('error',t('image_failed'));}}
        function removeCover(e){e.preventDefault(); e.stopPropagation(); coverImageBase64=null; coverImageSize=0; coverInput.value=''; coverPreview.src=''; coverPreview.classList.remove('show'); coverPlaceholder.style.display='block'; coverUpload.classList.remove('has-image');}
        async function handleSubmit(e){e.preventDefault(); const title=document.getElementById('title').value.trim(), category=document.getElementById('category').value, readTime=document.getElementById('readTime').value.trim(), excerpt=document.getElementById('excerpt').value.trim(), content=document.getElementById('content').value.trim(); if(!title||!category||!readTime||!excerpt||!content) return showMessage('error',t('required')); const submitBtn=document.getElementById('submitBtn'), id=new URLSearchParams(location.search).get('id'); submitBtn.disabled=true; submitBtn.textContent=id?t('saving'):t('publishing'); try{const body={title,category,read_time:readTime,excerpt,content,cover_image:coverImageBase64}; let url=`${API_BASE}/articles`, method='POST'; if(id){url=currentAdmin?`${API_BASE}/admin/articles/${id}`:`${API_BASE}/user/articles/${id}`; method='PUT';} const res=await fetch(url,{method,headers:{'Content-Type':'application/json',Authorization:'Bearer '+currentToken},body:JSON.stringify(body)}); const result=await parseResponse(res); if(!result.success) throw new Error(result.message||t('unknown')); showMessage('success',id?t('saved'):t('published')); setTimeout(()=>location.href=id?'terminal':'stage',1000);}catch(err){showMessage('error',t('submit_failed')+(err.message||t('network_failed'))); submitBtn.disabled=false; submitBtn.textContent=id?t('update'):t('submit');}}
    </script>
</body>
</html>
