<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title data-i18n="editor_title">鏂板缓鎶曠 | 鏈堣绌洪棿</title>
    <style>
        :root { --sakura-pink: #ffb7c5; --deep-pink: #ff6b9d; --dark-bg: #1a1025; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .lang-switcher {
            position: fixed;
            top: 5.5rem;
            right: 2rem;
            z-index: 999;
            display: flex;
            gap: 0.5rem;
            background: rgba(26,16,37,0.9);
            backdrop-filter: blur(10px);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 1px solid rgba(255,107,157,0.3);
        }
        .lang-btn {
            padding: 0.35rem 0.85rem;
            background: transparent;
            border: 1px solid rgba(255,183,197,0.3);
            border-radius: 15px;
            color: rgba(255,183,197,0.75);
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .lang-btn:hover { background: rgba(255,107,157,0.2); border-color: rgba(255,107,157,0.5); color: #ffb7c5; }
        .lang-btn.active { background: rgba(255,107,157,0.25); border-color: rgba(255,107,157,0.6); color: #ffb7c5; font-weight: 600; }
        
        body { min-height: 100vh; background: linear-gradient(180deg, #2d1f3d 0%, #1a1025 50%, #0f1724 100%); font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }
        #sakuraContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .sakura { position: absolute; background: linear-gradient(135deg, #ffb7c5 0%, #ff6b9d 100%); border-radius: 50% 0 50% 0; will-change: transform, opacity; }
        nav { position: fixed; top: 0; width: 100%; padding: 1.2rem 2rem; background: rgba(26,16,37,0.95); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,107,157,0.2); }
        nav .logo { font-size: 1.3rem; background: linear-gradient(135deg, #fff, #ffb7c5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 500; letter-spacing: 0.2rem; text-decoration: none; }
        nav .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        nav a { color: rgba(255,183,197,0.8); text-decoration: none; transition: color 0.3s; font-size: 0.9rem; }
        nav a:hover { color: #ffb7c5; }
        .container { position: relative; z-index: 10; min-height: 100vh; padding: 8rem 2rem 2rem; max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .title { font-size: 2rem; background: linear-gradient(135deg, #fff 0%, #ffb7c5 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 300; letter-spacing: 0.3rem; margin-bottom: 0.5rem; }
        .subtitle { color: rgba(255,183,197,0.5); font-size: 0.85rem; letter-spacing: 0.2rem; }
        .editor-form { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,107,157,0.1); border-radius: 8px; padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: rgba(255,183,197,0.8); margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.9rem 1.2rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,107,157,0.15); border-radius: 6px; color: rgba(255,183,197,0.9); font-size: 1rem; font-family: 'Noto Sans JP', sans-serif; transition: all 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: rgba(255,107,157,0.4); box-shadow: 0 0 20px rgba(255,107,157,0.1); }
        .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,183,197,0.3); }
        .form-group textarea { min-height: 300px; resize: vertical; line-height: 1.8; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .help-text { font-size: 0.8rem; color: rgba(255,183,197,0.4); margin-top: 0.5rem; }
        .btn-group { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn { padding: 1rem 2rem; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: all 0.3s; text-decoration: none; display: inline-block; }
        .btn-primary { background: rgba(255,107,157,0.25); color: #ffb7c5; border: 1px solid rgba(255,107,157,0.4); }
        .btn-primary:hover { background: rgba(255,107,157,0.35); transform: translateY(-2px); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: rgba(255,183,197,0.7); border: 1px solid rgba(255,183,197,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem; display: none; }
        .message.success { background: rgba(100,255,150,0.1); border: 1px solid rgba(100,255,150,0.3); color: #6bff9e; }
        .message.error { background: rgba(255,100,100,0.1); border: 1px solid rgba(255,100,100,0.3); color: #ff6b6b; }
        .login-notice { text-align: center; padding: 4rem 2rem; color: rgba(255,183,197,0.5); }
        .login-notice a { color: #ffb7c5; text-decoration: none; }
        .footer { position: fixed; bottom: 1rem; color: rgba(255,255,255,0.25); font-size: 0.65rem; letter-spacing: 0.15rem; z-index: 10; width: 100%; text-align: center; }
        
        /* 灏侀潰鍥剧墖涓婁紶 */
        .cover-upload {
            border: 2px dashed rgba(255,107,157,0.3);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        .cover-upload:hover { border-color: rgba(255,107,157,0.6); background: rgba(255,107,157,0.05); }
        .cover-upload.has-image { border-style: solid; border-color: rgba(255,107,157,0.4); }
        .cover-upload input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .cover-preview { max-width: 100%; max-height: 300px; border-radius: 6px; margin-top: 1rem; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .cover-preview.show { display: block; }
        .cover-placeholder { color: rgba(255,183,197,0.5); font-size: 0.9rem; }
        .cover-placeholder .icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
        .cover-remove { position: absolute; top: 0.5rem; right: 0.5rem; background: rgba(255,100,100,0.8); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.3s; }
        .cover-remove:hover { background: rgba(255,100,100,1); transform: scale(1.1); }
        .cover-upload.has-image .cover-remove { display: flex; }
        .cover-info { font-size: 0.8rem; color: rgba(255,183,197,0.6); margin-top: 0.5rem; }
        .compress-notice { font-size: 0.75rem; color: rgba(255,183,197,0.5); margin-top: 0.3rem; }
        
        @media (max-width: 768px) { 
            .form-row { grid-template-columns: 1fr; } 
            .title { font-size: 1.7rem; } 
            .btn-group { flex-direction: column; }
            .lang-switcher { top: 4.5rem; right: 1rem; }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/site-theme.css">
    <script defer src="../assets/js/site-nav.js"></script>
    <script defer src="../assets/js/ambient-fish.js"></script>
</head>
<body>
    <div id="sakuraContainer"></div>
    <nav>
        <a href="hub" class="logo" data-i18n="space_name">鏈堣绌洪枔</a>
        <div class="nav-right">
            <a href="stage" data-i18n="nav_stage">銈广儐銉笺偢</a>
            <a href="hub" data-i18n="return">鎴汇倠</a>
        </div>
    </nav>
    
    <div class="lang-switcher">
        <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh')">涓枃</button>
        <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja')">鏃ユ湰瑾?/button>
    </div>
    
    <div class="container">
        <div class="header">
            <h1 class="title" data-i18n="editor_title">鏂板缓鎶曠</h1>
            <p class="subtitle" data-i18n="editor_subtitle">鍒涘缓鏂版枃绔?/p>
        </div>
        <div id="editorContainer">
            <div class="login-notice" data-i18n="loading">鍔犺浇涓?..</div>
        </div>
    </div>
    <div class="footer">漏 瓒呫亱銇愩倓濮紒棰?/div>
    <script src="i18n.js"></script>
    <script>
        const API_BASE = '/api';
        let coverImageBase64 = null;
        let coverImageSize = 0;
        
        document.addEventListener('DOMContentLoaded', function() {
            initLanguage();
            checkAuth();
        });
        
        // 妯辫姳鑳屾櫙
        const sakuraContainer = document.getElementById('sakuraContainer');

        // 鍔犺浇鏂囩珷杩涜缂栬緫
        // HTML 杞箟
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/"/g, "\&quot;").replace(/\&/g, "\&amp;").replace(/</g, "\&lt;").replace(/>/g, "\&gt;");
        }

        function showError(msg) {
            const el = document.getElementById("errorMsg");
            if (el) { el.textContent = msg; el.style.display = "block";
                const successEl = document.getElementById("successMsg");
                if (successEl) successEl.style.display = "none";
            }
        }

        async function loadArticleForEdit(articleId, token, user) {
            try {
                // 鏍规嵁 token 绫诲瀷鍜岀敤鎴疯鑹查€夋嫨 API
                let url;
                const adminToken = localStorage.getItem('admin_token');
                const adminUserStr = localStorage.getItem('admin_user');

                // 鍙湁 admin token 瀛樺湪涓旂敤鎴疯鑹叉槸 admin 鏃舵墠浣跨敤 admin API
                if (adminToken && adminUserStr) {
                    try {
                        const adminUser = JSON.parse(adminUserStr);
                        if (adminUser.role === 'admin') {
                            url = API_BASE + '/admin/articles/' + articleId;
                        } else {
                            url = API_BASE + '/user/articles/' + articleId;
                        }
                    } catch (e) {
                        url = API_BASE + '/user/articles/' + articleId;
                    }
                } else {
                    url = API_BASE + '/user/articles/' + articleId;
                }

                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await res.json();

                if (result.success && result.data) {
                    const article = result.data;
                    renderEditorForm(article, user);
                } else {
                    showError('鍔犺浇鏂囩珷澶辫触锛? + (result.message || '鏈煡閿欒'));
                }
            } catch (error) {
                console.error('鍔犺浇鏂囩珷澶辫触:', error);
                showError('缃戠粶閿欒');
            }
        }

        function renderEditorForm(article, user) {
            document.getElementById('editorContainer').innerHTML = `
                <form class="editor-form" id="editorForm" onsubmit="handleSubmit(event)">
                    <div class="message success" id="successMsg"></div>
                    <div class="message error" id="errorMsg"></div>

                    <div class="form-group">
                        <label data-i18n="field_cover">鏂囩珷灏侀潰鍥剧墖锛堣嚜鍔ㄥ帇缂╋級</label>
                        <div class="cover-upload" id="coverUpload">
                            <input type="file" id="coverInput" accept="image/*" onchange="handleCoverUpload(event)">
                            <div class="cover-placeholder" id="coverPlaceholder">
                                <span class="icon">馃柤锔?/span>
                                <span>鐐瑰嚮鎴栨嫋鎷戒笂浼犲浘鐗?/span>
                                <div class="help-text">鎺ㄨ崘锛?200x630px锛孞PG 鎴?PNG 鏍煎紡</div>
                            </div>
                            <img class="cover-preview" id="coverPreview" alt="灏侀潰棰勮">
                            <button type="button" class="cover-remove" onclick="removeCover(event)">脳</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label data-i18n="field_title">鏍囬</label>
                        <input type="text" id="title" data-i18n="field_title_placeholder" placeholder="杈撳叆鏂囩珷鏍囬" required value="${escapeHtml(article.title || '')}">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="field_category">鍒嗙被</label>
                            <select id="category" required>
                                <option value="" data-i18n="field_category_select">璇烽€夋嫨鍒嗙被</option>
                                <option value="鍏憡" data-i18n="field_category_announcement">鍏憡锛堜粎绠＄悊鍛橈級</option>
                                <option value="浼犺" data-i18n="field_category_legend">浼犺</option>
                                <option value="鎶€鏈? data-i18n="field_category_technology">鎶€鏈?/option>
                                <option value="鍏朵粬" data-i18n="field_category_other">鍏朵粬</option>
                            </select>
                            <div class="help-text" data-i18n="field_category_hint">鈥?鍏憡浠呯鐞嗗憳鍙彂甯?/div>
                        </div>
                        <div class="form-group">
                            <label data-i18n="field_read_time">闃呰鏃堕棿</label>
                            <input type="text" id="readTime" data-i18n="field_read_time_placeholder" placeholder="渚嬶細5 min" required value="${escapeHtml(article.read_time || '')}">
                        </div>
                    </div>

                    <div class="form-group">
                        <label data-i18n="field_excerpt">鎽樿</label>
                        <textarea id="excerpt" data-i18n="field_excerpt_placeholder" placeholder="鏂囩珷鎽樿锛?00 瀛椾互鍐咃級" maxlength="200" required>${escapeHtml(article.excerpt || '')}</textarea>
                        <div class="help-text" data-i18n="field_excerpt_hint">璇疯緭鍏ユ枃绔犳憳瑕?/div>
                    </div>

                    <div class="form-group">
                        <label data-i18n="field_content">姝ｆ枃</label>
                        <textarea id="content" data-i18n="field_content_placeholder" placeholder="杈撳叆鏂囩珷鍐呭..." style="min-height:400px" required>${escapeHtml(article.content || '')}</textarea>
                        <div class="help-text" data-i18n="field_content_hint">鏍煎紡鏀寔锛?# 鏍囬 1 / ### 鏍囬 2 / - 鍒楄〃椤?/ > 寮曠敤 / \`浠ｇ爜\`</div>
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary" id="submitBtn" data-i18n="btn_update">淇濆瓨淇敼</button>
                        <a href="javascript:history.back()" class="btn btn-secondary" data-i18n="cancel">鍙栨秷</a>
                    </div>
                </form>
            `;

            // 璁剧疆鍒嗙被
            document.getElementById('category').value = article.category || '';

            // 璁剧疆灏侀潰
            if (article.cover_image) {
                const preview = document.getElementById('coverPreview');
                const placeholder = document.getElementById('coverPlaceholder');
                const upload = document.getElementById('coverUpload');
                preview.src = article.cover_image;
                preview.classList.add('show');
                placeholder.style.display = 'none';
                upload.classList.add('has-image');
                coverImageBase64 = article.cover_image;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.initTsukuyomiAmbientFish({ containerId: 'sakuraContainer' });
        });
        
        function checkAuth() {
            // 鏀寔涓ょ token锛歛dmin_token锛堢粓绔級鎴?tsukuyomi_token锛堢敤鎴风锛?
            let token = localStorage.getItem('admin_token');
            let userStr = localStorage.getItem('admin_user');

            if (!token || !userStr) {
                token = localStorage.getItem('tsukuyomi_token');
                userStr = localStorage.getItem('tsukuyomi_user');
            }

            if (!token || !userStr) {
                // 鏈櫥褰曪紝璺宠浆鍒扮櫥褰曢〉闈㈠苟甯︿笂閲嶅畾鍚戝弬鏁?
                window.location.href = 'login?redirect=editor';
                return;
            }

            try {
                const user = JSON.parse(userStr);

                let editingArticleId = null;

                // 妫€鏌ユ槸鍚︽湁鏂囩珷 ID 鍙傛暟锛堢紪杈戞ā寮忥級
                const urlParams = new URLSearchParams(window.location.search);
                const articleId = urlParams.get('id');
                console.log('[editor] 鏂囩珷 ID:', articleId);

                if (articleId) {
                    editingArticleId = articleId;
                    loadArticleForEdit(articleId, token, user);
                    return;
                }
                document.getElementById('editorContainer').innerHTML = `
                    <form class="editor-form" id="editorForm" onsubmit="handleSubmit(event)">
                        <div class="message success" id="successMsg"></div>
                        <div class="message error" id="errorMsg"></div>
                        
                        <div class="form-group">
                            <label data-i18n="field_cover">鏂囩珷灏侀潰鍥剧墖锛堣嚜鍔ㄥ帇缂╋級</label>
                            <div class="cover-upload" id="coverUpload">
                                <input type="file" id="coverInput" accept="image/*" onchange="handleCoverUpload(event)">
                                <div class="cover-placeholder" id="coverPlaceholder">
                                    <span class="icon">馃柤锔?/span>
                                    <span>鐐瑰嚮鎴栨嫋鎷戒笂浼犲浘鐗?/span>
                                    <div class="help-text">鎺ㄨ崘锛?200x630px锛孞PG 鎴?PNG 鏍煎紡</div>
                                </div>
                                <img class="cover-preview" id="coverPreview" alt="灏侀潰棰勮">
                                <button type="button" class="cover-remove" onclick="removeCover(event)">脳</button>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label data-i18n="field_title">鏍囬</label>
                            <input type="text" id="title" data-i18n="field_title_placeholder" placeholder="杈撳叆鏂囩珷鏍囬" required>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label data-i18n="field_category">鍒嗙被</label>
                                <select id="category" required>
                                    <option value="" data-i18n="field_category_select">璇烽€夋嫨鍒嗙被</option>
                                    <option value="鍏憡" data-i18n="field_category_announcement">鍏憡锛堜粎绠＄悊鍛橈級</option>
                                    <option value="浼犺" data-i18n="field_category_legend">浼犺</option>
                                    <option value="鎶€鏈? data-i18n="field_category_technology">鎶€鏈?/option>
                                    <option value="鍏朵粬" data-i18n="field_category_other">鍏朵粬</option>
                                </select>
                                <div class="help-text" data-i18n="field_category_hint">鈥?鍏憡浠呯鐞嗗憳鍙彂甯?/div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="field_read_time">闃呰鏃堕棿</label>
                                <input type="text" id="readTime" data-i18n="field_read_time_placeholder" placeholder="渚嬶細5 min" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label data-i18n="field_excerpt">鎽樿</label>
                            <textarea id="excerpt" data-i18n="field_excerpt_placeholder" placeholder="鏂囩珷鎽樿锛?00 瀛椾互鍐咃級" maxlength="200" required></textarea>
                            <div class="help-text" data-i18n="field_excerpt_hint">璇疯緭鍏ユ枃绔犳憳瑕?/div>
                        </div>
                        
                        <div class="form-group">
                            <label data-i18n="field_content">姝ｆ枃</label>
                            <textarea id="content" data-i18n="field_content_placeholder" placeholder="杈撳叆鏂囩珷鍐呭..." style="min-height:400px" required></textarea>
                            <div class="help-text" data-i18n="field_content_hint">鏍煎紡鏀寔锛?# 鏍囬 1 / ### 鏍囬 2 / - 鍒楄〃椤?/ > 寮曠敤 / \`浠ｇ爜\`</div>
                        </div>
                        
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary" data-i18n="btn_submit">鎶曠</button>
                            <a href="stage" class="btn btn-secondary" data-i18n="cancel">鍙栨秷</a>
                        </div>
                    </form>
                `;
            } catch (e) {
                console.error('瑙ｆ瀽鐢ㄦ埛淇℃伅澶辫触:', e);
                document.getElementById('editorContainer').innerHTML = `
                    <div class="login-notice">
                        銈汇儍銈枫儳銉炽偍銉┿兗銆?br><br>
                        <a href="login" class="btn btn-primary">鍐嶃儹銈般偆銉?/a>
                    </div>
                `;
            }
        }
        
        // 鍘嬬缉鍥剧墖
        function compressImage(file, maxWidth = 1200, maxHeight = 630, quality = 0.7) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        // 璁＄畻缂╂斁姣斾緥
                        if (width > maxWidth) {
                            height = height * (maxWidth / width);
                            width = maxWidth;
                        }
                        if (height > maxHeight) {
                            width = width * (maxHeight / height);
                            height = maxHeight;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 鍘嬬缉涓?JPEG
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedDataUrl);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        // 澶勭悊灏侀潰鍥剧墖涓婁紶
        async function handleCoverUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showError('璇烽€夋嫨鍥剧墖鏂囦欢');
                return;
            }
            
            const upload = document.getElementById('coverUpload');
            
            try {
                // 鍘嬬缉鍥剧墖
                coverImageBase64 = await compressImage(file, 1200, 630, 0.7);
                coverImageSize = Math.round(coverImageBase64.length * 3 / 4);
                
                const preview = document.getElementById('coverPreview');
                const placeholder = document.getElementById('coverPlaceholder');
                
                preview.src = coverImageBase64;
                preview.classList.add('show');
                placeholder.style.display = 'none';
                upload.classList.add('has-image');
            } catch (error) {
                console.error('鍥剧墖鍘嬬缉澶辫触:', error);
                showError('鍥剧墖澶勭悊澶辫触锛岃閲嶈瘯');
            }
        }
        
        function removeCover(event) {
            event.preventDefault();
            event.stopPropagation();
            
            coverImageBase64 = null;
            coverImageSize = 0;
            document.getElementById('coverInput').value = '';
            document.getElementById('coverPreview').src = '';
            document.getElementById('coverPreview').classList.remove('show');
            document.getElementById('coverPlaceholder').style.display = 'block';
            document.getElementById('coverUpload').classList.remove('has-image');
        }
        
        async function handleSubmit(e) {
            e.preventDefault();
            // 鏀寔涓ょ token
            let token = localStorage.getItem('admin_token');
            if (!token) {
                token = localStorage.getItem('tsukuyomi_token');
            }
            const title = document.getElementById('title').value.trim();
            const category = document.getElementById('category').value;
            const readTime = document.getElementById('readTime').value.trim();
            const excerpt = document.getElementById('excerpt').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!title || !category || !readTime || !excerpt || !content) {
                showError('璇峰～鍐欐墍鏈夊繀濉」');
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;

            // 妫€鏌ユ槸鍚︽槸缂栬緫妯″紡
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (articleId) {
                submitBtn.textContent = '淇濆瓨涓?..';
            } else {
                submitBtn.textContent = '鎶曠涓?..';
            }

            try {
                const requestBody = { title, category, read_time: readTime, excerpt, content };

                if (coverImageBase64) {
                    requestBody.cover_image = coverImageBase64;
                    console.log('灏侀潰澶у皬:', (coverImageSize / 1024).toFixed(1), 'KB');
                }

                let url = API_BASE + '/articles';
                let method = 'POST';
                let successMsg = '鎶曠鎴愬姛锛佹鍦ㄨ烦杞?..';

                if (articleId) {
                    // 缂栬緫妯″紡锛氭牴鎹?token 绫诲瀷閫夋嫨 API
                    if (localStorage.getItem('admin_token')) {
                        url = API_BASE + '/admin/articles/' + articleId;
                    } else {
                        url = API_BASE + '/user/articles/' + articleId;
                    }
                    method = 'PUT';
                    successMsg = '淇敼宸蹭繚瀛橈紒姝ｅ湪璺宠浆...';
                }

                console.log('鍙戦€佽姹?..', method, url);
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(requestBody)
                });

                const result = await response.json();
                if (result.success) {
                    showSuccess(successMsg);
                    setTimeout(() => window.location.href = articleId ? 'terminal' : 'stage', 1500);
                } else {
                    showError(result.message || result.error || '鎶曠澶辫触');
                    submitBtn.disabled = false;
                    submitBtn.textContent = articleId ? '淇濆瓨淇敼' : '鎶曠';
                }
            } catch (error) {
                console.error('鎶曠澶辫触:', error);
                showError('缃戠粶閿欒锛岃妫€鏌ヨ繛鎺?);
                submitBtn.disabled = false;
                submitBtn.textContent = articleId ? '淇濆瓨淇敼' : '鎶曠';
            }
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
    </script>
