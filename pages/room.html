<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title>私人居所 | 月读空间</title>
    <link rel="stylesheet" href="../assets/css/site-theme.css">
    <style>
        :root {
            --room-ink: #150f1f;
            --room-panel: rgba(22, 16, 30, 0.82);
            --room-line: rgba(255, 190, 206, 0.24);
            --room-text: #fff4f7;
            --room-muted: rgba(255, 244, 247, 0.66);
            --room-pink: #ff8fb4;
            --room-gold: #ffd98a;
            --room-blue: #8bd8ff;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            color: var(--room-text);
            font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
            background:
                linear-gradient(180deg, rgba(11, 8, 18, 0.42), rgba(14, 11, 22, 0.78)),
                url("../assets/images/room-bg.png") center / cover no-repeat fixed !important;
        }

        .room-shell {
            position: relative;
            min-height: 100vh;
            isolation: isolate;
        }

        .room-nav {
            position: fixed;
            inset: 0 0 auto;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem clamp(1rem, 3vw, 2rem);
            background: rgba(18, 12, 27, 0.78);
            border-bottom: 1px solid var(--room-line);
            backdrop-filter: blur(18px);
        }

        .room-logo {
            color: var(--room-text);
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0;
            text-decoration: none;
        }

        .room-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 0.35rem;
        }

        .room-links a,
        .panel-toggle-btn,
        .panel-btn,
        .icon-btn {
            border: 1px solid var(--room-line);
            background: rgba(255, 255, 255, 0.07);
            color: var(--room-text);
            text-decoration: none;
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .room-links a {
            padding: 0.45rem 0.7rem;
            border-radius: 6px;
            font-size: 0.86rem;
        }

        .room-links a:hover,
        .room-links a.active,
        .panel-toggle-btn:hover,
        .panel-btn:hover,
        .icon-btn:hover {
            border-color: rgba(255, 143, 180, 0.58);
            background: rgba(255, 143, 180, 0.16);
        }

        .live2d-stage {
            position: fixed;
            inset: 4.6rem 0 0;
            z-index: 4;
            pointer-events: none;
        }

        #live2d-container {
            position: absolute;
            left: 50%;
            bottom: -2vh;
            width: min(76vw, 760px);
            height: min(84vh, 820px);
            transform: translateX(-50%);
            pointer-events: auto;
            z-index: 6;
        }

        #live2d-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
            filter: brightness(0.96) contrast(0.98) saturate(0.98);
            touch-action: none;
        }

        .ambient-vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(circle at 50% 18%, rgba(255, 217, 138, 0.15), transparent 26rem),
                linear-gradient(90deg, rgba(5, 8, 18, 0.42), transparent 26%, transparent 74%, rgba(5, 8, 18, 0.42));
        }

        #sakuraContainer {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .sakura {
            position: absolute;
            top: -24px;
            width: 11px;
            height: 8px;
            border-radius: 80% 0 80% 0;
            background: linear-gradient(135deg, #ffd5df, #ff8fb4);
            opacity: 0.58;
            animation: sakura-fall linear forwards;
        }

        @keyframes sakura-fall {
            to { transform: translate3d(var(--drift), 105vh, 0) rotate(680deg); opacity: 0; }
        }

        .panel-controls {
            position: fixed;
            top: 5.6rem;
            right: clamp(0.8rem, 2vw, 1.4rem);
            z-index: 32;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .panel-toggle-btn,
        .panel-btn,
        .icon-btn {
            border-radius: 6px;
            font: inherit;
        }

        .panel-toggle-btn {
            padding: 0.55rem 0.78rem;
            background: rgba(22, 16, 30, 0.76);
            backdrop-filter: blur(14px);
            font-size: 0.82rem;
        }

        .draggable-panel {
            position: absolute;
            z-index: 20;
            width: min(360px, calc(100vw - 2rem));
            min-width: 240px;
            max-width: calc(100vw - 2rem);
            padding: 0.95rem;
            border: 1px solid var(--room-line);
            border-radius: 8px;
            background: var(--room-panel);
            box-shadow: 0 18px 48px rgba(4, 3, 10, 0.34);
            backdrop-filter: blur(18px);
            user-select: none;
        }

        .draggable-panel.dragging { opacity: 0.9; }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding-bottom: 0.65rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--room-line);
            cursor: grab;
        }

        .panel-title {
            min-width: 0;
            color: var(--room-pink);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .panel-close {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: grid;
            place-items: center;
            color: var(--room-muted);
            cursor: pointer;
        }

        .panel-close:hover { color: var(--room-text); background: rgba(255, 255, 255, 0.08); }
        .panel-content {
            color: var(--room-muted);
            font-size: 0.84rem;
            line-height: 1.6;
        }

        .panel-content.scrollable {
            max-height: min(70vh, 560px);
            overflow-y: auto;
            padding-right: 0.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.28rem;
            color: var(--room-text);
            font-size: 0.78rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            min-height: 36px;
            border: 1px solid rgba(255, 190, 206, 0.22);
            border-radius: 6px;
            padding: 0.48rem 0.6rem;
            background: rgba(255, 255, 255, 0.07);
            color: var(--room-text);
            font: inherit;
            font-size: 0.82rem;
            outline: none;
        }

        textarea { min-height: 90px; resize: vertical; }
        input:focus,
        textarea:focus,
        select:focus { border-color: rgba(255, 143, 180, 0.7); }
        input[type="checkbox"] { width: auto; min-height: 0; margin-right: 0.35rem; }
        input[type="range"] { padding: 0; accent-color: var(--room-pink); }
        select option { color: #17111f; }

        .field { margin-bottom: 0.75rem; }
        .split { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 0.7rem; }
        .panel-btn {
            min-height: 34px;
            padding: 0.45rem 0.72rem;
            color: var(--room-text);
            font-size: 0.78rem;
        }

        .panel-section {
            margin-top: 0.85rem;
            padding-top: 0.85rem;
            border-top: 1px solid var(--room-line);
        }

        .panel-section-title {
            margin-bottom: 0.6rem;
            color: var(--room-gold);
            font-weight: 700;
            font-size: 0.8rem;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        #chatPanel { width: min(390px, calc(100vw - 2rem)); }
        .chat-body {
            display: flex;
            flex-direction: column;
            height: min(56vh, 460px);
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 0.55rem;
            margin-bottom: 0.65rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.035);
        }

        .chat-message {
            width: fit-content;
            max-width: 88%;
            margin-bottom: 0.55rem;
            padding: 0.5rem 0.62rem;
            border-radius: 8px;
            color: var(--room-text);
            background: rgba(255, 255, 255, 0.08);
            word-break: break-word;
            white-space: pre-wrap;
        }

        .chat-message.user {
            margin-left: auto;
            background: rgba(139, 216, 255, 0.16);
        }

        .chat-message.assistant { background: rgba(255, 143, 180, 0.14); }
        .chat-message.system {
            margin-inline: auto;
            max-width: 94%;
            color: var(--room-muted);
            background: rgba(255, 217, 138, 0.1);
            font-size: 0.75rem;
        }

        .chat-role {
            display: block;
            margin-bottom: 0.2rem;
            color: var(--room-gold);
            font-weight: 700;
            font-size: 0.72rem;
        }

        .chat-input-row { display: grid; grid-template-columns: 1fr auto; gap: 0.45rem; }
        .status-layer {
            position: fixed;
            inset: 0;
            z-index: 80;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(12, 8, 18, 0.74);
            backdrop-filter: blur(16px);
        }

        .status-layer.active { display: flex; }
        .status-box {
            width: min(480px, 100%);
            padding: 1.4rem;
            border: 1px solid var(--room-line);
            border-radius: 8px;
            background: rgba(22, 16, 30, 0.92);
            text-align: center;
        }

        .status-spinner {
            width: 38px;
            height: 38px;
            margin: 0 auto 1rem;
            border: 3px solid rgba(255, 255, 255, 0.14);
            border-top-color: var(--room-pink);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .status-title { color: var(--room-pink); font-weight: 700; }
        .status-detail { margin-top: 0.45rem; color: var(--room-muted); font-size: 0.86rem; }
        .room-footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0.7rem;
            z-index: 4;
            text-align: center;
            color: rgba(255, 255, 255, 0.38);
            font-size: 0.68rem;
            pointer-events: none;
        }

        @media (max-width: 760px) {
            body { overflow-y: auto; }
            .room-nav { align-items: flex-start; flex-direction: column; }
            .live2d-stage { inset-top: 7.8rem; min-height: 70vh; }
            #live2d-container {
                width: 112vw;
                height: 72vh;
                bottom: 4rem;
            }
            .panel-controls {
                top: auto;
                right: 0.75rem;
                bottom: 0.75rem;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: flex-end;
                max-width: calc(100vw - 1.5rem);
            }
            .draggable-panel {
                position: fixed;
                left: 0.75rem !important;
                right: 0.75rem !important;
                top: 7.2rem !important;
                width: auto;
            }
            .room-footer { display: none; }
        }
    </style>
    <script defer src="../assets/js/site-nav.js"></script>
    <script defer src="../assets/js/ambient-fish.js?v=20260501-flickerfix"></script>
</head>
<body>
    <div class="room-shell">
        <div class="ambient-vignette"></div>
        <div id="sakuraContainer"></div>

        <nav class="room-nav">
            <a class="room-logo" href="hub">月读空间</a>
            <div class="room-links">
                <a href="hub">中枢大厅</a>
                <a href="stage">主舞台</a>
                <a class="active" href="room">私人居所</a>
                <a href="terminal">数据终端</a>
            </div>
        </nav>

        <main class="live2d-stage">
            <div id="live2d-container">
            </div>
        </main>

        <div class="panel-controls">
            <button class="panel-toggle-btn" data-panel-toggle="profilePanel">资料</button>
            <button class="panel-toggle-btn" data-panel-toggle="notePanel">便签</button>
            <button class="panel-toggle-btn" data-panel-toggle="chatPanel">聊天</button>
            <button class="panel-toggle-btn" data-panel-toggle="settingPanel">设置</button>
        </div>

        <section class="draggable-panel" id="profilePanel" style="top: 8.8rem; left: 2rem;">
            <div class="panel-header">
                <span class="panel-title">个人资料</span>
                <span class="panel-close" data-panel-close="profilePanel">×</span>
            </div>
            <div class="panel-content">
                <div class="field">
                    <label for="nicknameInput">昵称</label>
                    <input type="text" id="nicknameInput" placeholder="给自己起一个名字">
                </div>
                <div class="field">
                    <label for="signatureInput">签名</label>
                    <textarea id="signatureInput" placeholder="写一句今天想留下的话"></textarea>
                </div>
                <button class="panel-btn" id="saveProfileBtn">保存资料</button>
                <div id="profileDisplay" class="panel-section"></div>
            </div>
        </section>

        <section class="draggable-panel" id="notePanel" style="top: 19rem; right: 2rem;">
            <div class="panel-header">
                <span class="panel-title">便签</span>
                <span class="panel-close" data-panel-close="notePanel">×</span>
            </div>
            <div class="panel-content">
                <textarea id="noteContent" placeholder="把灵感先放在这里"></textarea>
                <button class="panel-btn" id="saveNoteBtn">保存便签</button>
            </div>
        </section>

        <section class="draggable-panel" id="settingPanel" style="top: 25rem; left: 2rem;">
            <div class="panel-header">
                <span class="panel-title">房间设置</span>
                <span class="panel-close" data-panel-close="settingPanel">×</span>
            </div>
            <div class="panel-content scrollable">
                <div class="field">
                    <label><input type="checkbox" id="sakuraToggle" checked>游鱼特效</label>
                </div>
                <div class="field">
                    <div class="split"><label for="modelScaleInput">模型大小</label><span id="modelScaleValue">100%</span></div>
                    <input type="range" id="modelScaleInput" min="60" max="160" value="100">
                </div>
                <div class="field">
                    <div class="split"><label for="modelXInput">水平位置</label><span id="modelXValue">0</span></div>
                    <input type="range" id="modelXInput" min="-240" max="240" value="0">
                </div>
                <div class="field">
                    <div class="split"><label for="modelYInput">垂直位置</label><span id="modelYValue">0</span></div>
                    <input type="range" id="modelYInput" min="-180" max="180" value="0">
                </div>
                <div class="button-row">
                    <button class="panel-btn" id="resetModelBtn">重置模型</button>
                    <button class="panel-btn" id="resetPanelsBtn">重置面板</button>
                </div>

                <div class="panel-section">
                    <div class="panel-section-title">TTS 语音设置</div>
                    <div class="field">
                        <label><input type="checkbox" id="ttsEnabled">启用语音合成</label>
                    </div>
                    <div class="field">
                        <label for="ttsProvider">TTS Provider</label>
                        <select id="ttsProvider">
                            <option value="mimo">MiMo-V2-TTS</option>
                            <option value="openai">OpenAI TTS</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="ttsApiUrl">TTS API 端点</label>
                        <input type="text" id="ttsApiUrl" placeholder="https://api.xiaomimimo.com/v1/chat/completions">
                    </div>
                    <div class="field">
                        <label for="ttsApiKey">TTS API Key</label>
                        <input type="password" id="ttsApiKey" placeholder="sk-...">
                    </div>
                    <div class="field">
                        <label for="ttsVoice">音色</label>
                        <input type="text" id="ttsVoice" placeholder="mimo_default">
                    </div>
                    <div class="button-row">
                        <button class="panel-btn" id="saveTTSBtn">保存 TTS</button>
                        <button class="panel-btn" id="testTTSBtn">测试语音</button>
                    </div>
                </div>

                <div class="panel-section">
                    <div class="panel-section-title">LLM API 设置</div>
                    <div class="field">
                        <label>快捷预设</label>
                        <div class="button-row">
                            <button class="panel-btn" data-llm-preset="deepseek">DeepSeek</button>
                            <button class="panel-btn" data-llm-preset="moonshot">Kimi</button>
                            <button class="panel-btn" data-llm-preset="openai">OpenAI</button>
                            <button class="panel-btn" data-llm-preset="aliyun">通义</button>
                        </div>
                    </div>
                    <div class="field">
                        <label for="llmApiUrl">API 端点</label>
                        <input type="text" id="llmApiUrl" placeholder="https://api.openai.com/v1/chat/completions">
                    </div>
                    <div class="field">
                        <label for="llmApiKey">API Key</label>
                        <input type="password" id="llmApiKey" placeholder="sk-...">
                    </div>
                    <div class="field">
                        <label for="llmModel">模型名称</label>
                        <input type="text" id="llmModel" placeholder="gpt-4o-mini">
                    </div>
                    <div class="button-row">
                        <button class="panel-btn" id="saveLLMBtn">保存 API</button>
                        <button class="panel-btn" id="testLLMBtn">测试连接</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="draggable-panel" id="chatPanel" style="top: 9rem; right: 7.2rem;">
            <div class="panel-header">
                <span class="panel-title">与辉夜姬聊天</span>
                <span class="panel-close" data-panel-close="chatPanel">×</span>
            </div>
            <div class="panel-content chat-body">
                <div id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="输入消息...">
                    <button class="panel-btn" id="sendChatBtn">发送</button>
                </div>
            </div>
        </section>

        <div class="room-footer">月读空间 | Live2D powered by local Cubism runtime</div>
    </div>

    <div class="status-layer active" id="loadingOverlay">
        <div class="status-box">
            <div class="status-spinner"></div>
            <div class="status-title" id="loadingTitle">正在唤醒辉夜姬</div>
            <div class="status-detail" id="loadingDetail">加载 Cubism Core 与模型资源...</div>
        </div>
    </div>

    <script>
        window.TSUKUYOMI_EXTERNAL_LIVE2D = true;
    </script>
    <script src="/lib/live2dcubismcore-v5.min.js"></script>
    <script src="/lib/bundled/live2d-room.iife.js"></script>
    <script src="/assets/js/room-runtime.js?v=20260501-fish1"></script>
</body>
</html>
