<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人居所 | 月读空间</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --sakura-pink: #ffb7c5; --deep-pink: #ff6b9d; --dark-bg: #1a1025; --night-blue: #0f1724; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: linear-gradient(180deg, rgba(26,16,37,0.7) 0%, rgba(15,23,36,0.5) 100%), url('../assets/images/room-bg.png') center center / cover no-repeat fixed; font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }
        #sakuraContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .sakura { position: absolute; background: linear-gradient(135deg, var(--sakura-pink) 0%, var(--deep-pink) 100%); border-radius: 50% 0 50% 0; opacity: 0.6; }
        nav { position: fixed; top: 0; width: 100%; padding: 1.2rem 2rem; background: rgba(26,16,37,0.95); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,107,157,0.2); }
        nav .logo { font-size: 1.3rem; background: linear-gradient(135deg, #fff, var(--sakura-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 500; letter-spacing: 0.3rem; text-decoration: none; color: var(--sakura-pink); }
        nav .nav-right { display: flex; align-items: center; gap: 1rem; }
        nav a { color: rgba(255,183,197,0.8); text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 15px; transition: all 0.3s; }
        nav a:hover, nav a.active { color: var(--sakura-pink); background: rgba(255,107,157,0.15); }
        .room-container { position: relative; z-index: 10; min-height: 100vh; padding: 6rem 2rem 2rem; display: flex; justify-content: center; align-items: center; }
        #live2d-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 600px; height: 700px; z-index: 1; }
        #live2d-canvas { width: 100%; height: 100%; }
        .draggable-panel { position: absolute; background: rgba(26, 16, 37, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 183, 197, 0.3); border-radius: 12px; padding: 1rem; min-width: 200px; max-width: 300px; box-shadow: 0 4px 20px rgba(255, 107, 157, 0.2); cursor: move; z-index: 100; user-select: none; }
        .draggable-panel.dragging { opacity: 0.8; box-shadow: 0 8px 30px rgba(255, 107, 157, 0.4); }
        .draggable-panel .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255, 183, 197, 0.2); cursor: grab; }
        .draggable-panel .panel-header:active { cursor: grabbing; }
        .draggable-panel .panel-title { color: var(--sakura-pink); font-size: 0.9rem; font-weight: 500; }
        .draggable-panel .panel-close { color: rgba(255, 183, 197, 0.5); cursor: pointer; font-size: 1.2rem; transition: color 0.3s; }
        .draggable-panel .panel-close:hover { color: var(--deep-pink); }
        .draggable-panel .panel-content { color: rgba(255, 183, 197, 0.9); font-size: 0.85rem; line-height: 1.6; }
        .draggable-panel .panel-content.scrollable { max-height: 400px; overflow-y: auto; padding-right: 0.5rem; }
        .draggable-panel .panel-content input, .draggable-panel .panel-content textarea { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 183, 197, 0.2); border-radius: 6px; padding: 0.5rem 0.8rem; color: var(--sakura-pink); font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; margin-top: 0.3rem; }
        .draggable-panel .panel-content input:focus, .draggable-panel .panel-content textarea:focus { outline: none; border-color: var(--sakura-pink); box-shadow: 0 0 10px rgba(255, 183, 197, 0.2); }
        .draggable-panel .panel-content textarea { min-height: 80px; resize: vertical; }
        .draggable-panel .panel-btn { display: inline-block; margin-top: 0.8rem; padding: 0.5rem 1rem; background: rgba(255, 107, 157, 0.2); border: 1px solid rgba(255, 107, 157, 0.3); border-radius: 6px; color: var(--sakura-pink); cursor: pointer; font-size: 0.8rem; transition: all 0.3s; }
        .draggable-panel .panel-btn:hover { background: rgba(255, 107, 157, 0.3); }
        .panel-controls { position: fixed; top: 100px; right: 20px; display: flex; flex-direction: column; gap: 0.5rem; z-index: 200; }
        .panel-toggle-btn { padding: 0.6rem 1rem; background: rgba(26, 16, 37, 0.9); border: 1px solid rgba(255, 183, 197, 0.3); border-radius: 8px; color: var(--sakura-pink); cursor: pointer; font-size: 0.8rem; transition: all 0.3s; backdrop-filter: blur(10px); }
        .panel-toggle-btn:hover { background: rgba(255, 107, 157, 0.2); }
        #chatMessages { max-height: 300px; overflow-y: auto; }
        .chat-message { margin-bottom: 0.8rem; padding: 0.5rem 0.8rem; border-radius: 6px; max-width: 85%; }
        .chat-message.user { background: rgba(255, 107, 157, 0.2); margin-left: auto; text-align: right; }
        .chat-message.assistant { background: rgba(255, 255, 255, 0.05); }
        .chat-message.system { background: rgba(255, 183, 197, 0.1); font-size: 0.75rem; text-align: center; margin: 0.5rem auto; max-width: 90%; }
        .chat-typing { opacity: 0.6; font-style: italic; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 16, 37, 0.95); display: flex; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; gap: 1rem; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid rgba(255, 183, 197, 0.2); border-top-color: var(--sakura-pink); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--sakura-pink); font-size: 1rem; letter-spacing: 0.2rem; }
        .footer { position: fixed; bottom: 1rem; width: 100%; text-align: center; color: rgba(255, 255, 255, 0.3); font-size: 0.65rem; letter-spacing: 0.1rem; z-index: 100; }
    </style>
</head>
<body>
    <div id="sakuraContainer"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载私人居所中...</div>
    </div>
    <nav>
        <a href="hub.html" class="logo">月读空间</a>
        <div class="nav-right">
            <a href="hub.html">中枢大厅</a>
            <a href="stage.html">主舞台</a>
            <a href="room.html" class="active">私人居所</a>
            <a href="terminal.html">数据终端</a>
        </div>
    </nav>
    <div class="room-container">
        <div id="live2d-container">
            <canvas id="live2d-canvas"></canvas>
        </div>
    </div>
    <div class="panel-controls">
        <button class="panel-toggle-btn" onclick="togglePanel('profilePanel')">个人资料</button>
        <button class="panel-toggle-btn" onclick="togglePanel('notePanel')">便签</button>
        <button class="panel-toggle-btn" onclick="togglePanel('chatPanel')">💬 聊天</button>
        <button class="panel-toggle-btn" onclick="togglePanel('settingPanel')">设置</button>
    </div>
    <div class="draggable-panel" id="profilePanel" style="top: 150px; left: 50px;">
        <div class="panel-header"><span class="panel-title">个人资料</span><span class="panel-close" onclick="hidePanel('profilePanel')">&times;</span></div>
        <div class="panel-content">
            <div style="margin-bottom: 0.8rem;"><label>昵称</label><input type="text" id="nicknameInput" placeholder="点击修改昵称" onchange="saveProfile()"></div>
            <div style="margin-bottom: 0.8rem;"><label>签名</label><textarea id="signatureInput" placeholder="编辑个性签名" onchange="saveProfile()"></textarea></div>
            <div id="profileDisplay"></div>
        </div>
    </div>
    <div class="draggable-panel" id="notePanel" style="top: 300px; right: 50px; left: auto;">
        <div class="panel-header"><span class="panel-title">便签</span><span class="panel-close" onclick="hidePanel('notePanel')">&times;</span></div>
        <div class="panel-content">
            <textarea id="noteContent" placeholder="写点什么吧..." style="min-height: 120px;"></textarea>
            <button class="panel-btn" onclick="saveNote()">保存便签</button>
        </div>
    </div>
    <div class="draggable-panel" id="settingPanel" style="top: 450px; left: 50px;">
        <div class="panel-header"><span class="panel-title">设置</span><span class="panel-close" onclick="hidePanel('settingPanel')">&times;</span></div>
        <div class="panel-content scrollable">
            <div style="margin-bottom: 0.8rem;"><label><input type="checkbox" id="sakuraToggle" checked onchange="toggleSakura()"> 樱花特效</label></div>
            <div style="margin-bottom: 0.8rem;">
                <label>模型大小</label>
                <input type="range" id="modelScaleInput" min="5" max="200" value="13" onchange="updateModelSettings()">
                <span id="modelScaleValue">13%</span>
            </div>
            <div style="margin-bottom: 0.8rem;">
                <label>水平位置</label>
                <input type="range" id="modelXInput" min="-300" max="300" value="0" onchange="updateModelSettings()">
                <span id="modelXValue">0</span>
            </div>
            <div style="margin-bottom: 0.8rem;">
                <label>垂直位置</label>
                <input type="range" id="modelYInput" min="-200" max="200" value="0" onchange="updateModelSettings()">
                <span id="modelYValue">0</span>
            </div>
            <button class="panel-btn" onclick="resetModelSettings()">重置模型设置</button>
            <div style="margin-top: 0.8rem; border-top: 1px solid rgba(255,183,197,0.2); padding-top: 0.8rem;">
                <button class="panel-btn" onclick="resetPanels()">重置面板位置</button>
            </div>
            <div style="margin-top: 0.8rem; border-top: 1px solid rgba(255,183,197,0.2); padding-top: 0.8rem;">
                <div style="margin-bottom: 0.5rem; font-weight: 500; color: var(--deep-pink);">💬 LLM API 设置</div>
                <div style="margin-bottom: 0.5rem;">
                    <label style="font-size: 0.75rem;">快捷预设</label>
                    <div style="display: flex; gap: 0.3rem; margin-top: 0.3rem; flex-wrap: wrap;">
                        <button class="panel-btn" onclick="setLLMPreset('deepseek')" style="margin: 0; padding: 0.3rem 0.6rem; font-size: 0.7rem;">DeepSeek</button>
                        <button class="panel-btn" onclick="setLLMPreset('moonshot')" style="margin: 0; padding: 0.3rem 0.6rem; font-size: 0.7rem;">Kimi 月之暗</button>
                        <button class="panel-btn" onclick="setLLMPreset('openai')" style="margin: 0; padding: 0.3rem 0.6rem; font-size: 0.7rem;">OpenAI</button>
                        <button class="panel-btn" onclick="setLLMPreset('aliyun')" style="margin: 0; padding: 0.3rem 0.6rem; font-size: 0.7rem;">阿里百炼</button>
                    </div>
                </div>
                <div style="margin-bottom: 0.5rem;">
                    <label style="font-size: 0.75rem;">API 端点</label>
                    <input type="text" id="llmApiUrl" placeholder="https://api.openai.com/v1/chat/completions" style="font-size: 0.75rem;">
                </div>
                <div style="margin-bottom: 0.5rem;">
                    <label style="font-size: 0.75rem;">API Key</label>
                    <input type="password" id="llmApiKey" placeholder="sk-..." style="font-size: 0.75rem;">
                </div>
                <div style="margin-bottom: 0.5rem;">
                    <label style="font-size: 0.75rem;">模型名称</label>
                    <input type="text" id="llmModel" placeholder="gpt-3.5-turbo" style="font-size: 0.75rem;">
                </div>
                <button class="panel-btn" onclick="saveLLMSettings()" style="margin-top: 0.3rem;">保存 API 设置</button>
                <button class="panel-btn" onclick="testLLMConnection()" style="margin-top: 0.3rem;">测试连接</button>
            </div>
        </div>
    </div>
    <div class="draggable-panel" id="chatPanel" style="top: 200px; right: 300px; left: auto; width: 350px;">
        <div class="panel-header"><span class="panel-title">💬 与辉夜姬聊天</span><span class="panel-close" onclick="hidePanel('chatPanel')">&times;</span></div>
        <div class="panel-content" style="display: flex; flex-direction: column; height: 400px;">
            <div id="chatMessages" style="flex: 1; overflow-y: auto; margin-bottom: 0.8rem; padding: 0.5rem; background: rgba(255,255,255,0.03); border-radius: 6px;"></div>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="chatInput" placeholder="输入消息..." style="flex: 1; margin: 0;" onkeypress="if(event.keyCode===13) sendChat()">
                <button class="panel-btn" onclick="sendChat()" style="margin: 0; padding: 0.5rem 1rem;">发送</button>
            </div>
        </div>
    </div>
    <div class="footer">© 月读空间 | Live2D by AIRI Project | Model by 雪熊企划</div>

    <!-- Cubism 5 库 -->
    <script src="/lib/live2dcubismcore.js"></script>
    <script src="/lib/bundled/live2d-room.iife.js"></script>
    <script src="/lib/naari-cubism5.js"></script>
    <script>
        // 验证加载
        console.log('PIXI.live2d keys:', Object.keys(PIXI.live2d || {}));
        console.log('PIXI.live2d.Live2DModel:', typeof (PIXI.live2d && PIXI.live2d.Live2DModel));
        console.log('PIXI.live2d.Live2DFactory:', typeof (PIXI.live2d && PIXI.live2d.Live2DFactory));
    </script>

    <script>
        // ==================== 樱花效果 ====================
        function createSakura() {
            const container = document.getElementById('sakuraContainer');
            const sakura = document.createElement('div');
            sakura.className = 'sakura';
            sakura.style.left = Math.random() * 100 + '%';
            sakura.style.width = Math.random() * 10 + 5 + 'px';
            sakura.style.height = sakura.style.width;
            sakura.style.animation = `fall ${Math.random() * 3 + 4}s linear forwards`;
            container.appendChild(sakura);
            setTimeout(() => sakura.remove(), 7000);
        }
        const style = document.createElement('style');
        style.textContent = `@keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }`;
        document.head.appendChild(style);
        setInterval(createSakura, 300);
        function toggleSakura() {
            document.getElementById('sakuraContainer').style.display = document.getElementById('sakuraToggle').checked ? 'block' : 'none';
        }

        // ==================== 可拖拽面板 ====================
        let draggedPanel = null, dragOffset = { x: 0, y: 0 }, zIndexCounter = 100;
        const panelPositions = JSON.parse(localStorage.getItem('roomPanelPositions')) || {};

        function initPanelPositions() {
            document.querySelectorAll('.draggable-panel').forEach(panel => {
                const id = panel.id;
                if (panelPositions[id]) {
                    panel.style.top = panelPositions[id].top;
                    panel.style.left = panelPositions[id].left;
                    if (panelPositions[id].right) { panel.style.right = panelPositions[id].right; panel.style.left = 'auto'; }
                }
                makeDraggable(panel);
            });
        }

        function makeDraggable(panel) {
            const header = panel.querySelector('.panel-header');
            header.addEventListener('mousedown', (e) => {
                draggedPanel = panel;
                dragOffset.x = e.clientX - panel.offsetLeft;
                dragOffset.y = e.clientY - panel.offsetTop;
                panel.classList.add('dragging');
                panel.style.zIndex = ++zIndexCounter;
            });
            document.addEventListener('mousemove', (e) => {
                if (!draggedPanel) return;
                e.preventDefault();
                draggedPanel.style.left = (e.clientX - dragOffset.x) + 'px';
                draggedPanel.style.top = (e.clientY - dragOffset.y) + 'px';
                draggedPanel.style.right = 'auto';
            });
            document.addEventListener('mouseup', () => {
                if (draggedPanel) { savePanelPosition(draggedPanel); draggedPanel.classList.remove('dragging'); draggedPanel = null; }
            });
            panel.addEventListener('mousedown', () => { panel.style.zIndex = ++zIndexCounter; });
        }

        function savePanelPosition(panel) {
            const positions = JSON.parse(localStorage.getItem('roomPanelPositions')) || {};
            positions[panel.id] = { top: panel.style.top, left: panel.style.left, right: panel.style.right };
            localStorage.setItem('roomPanelPositions', JSON.stringify(positions));
        }

        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            if (panel.style.display === 'block') panel.style.zIndex = ++zIndexCounter;
        }
        function hidePanel(panelId) { document.getElementById(panelId).style.display = 'none'; }
        function resetPanels() { localStorage.removeItem('roomPanelPositions'); location.reload(); }

        // ==================== 个人资料 ====================
        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('roomProfile')) || {};
            if (profile.nickname) document.getElementById('nicknameInput').value = profile.nickname;
            if (profile.signature) document.getElementById('signatureInput').value = profile.signature;
            updateProfileDisplay();
        }
        function saveProfile() {
            const profile = { nickname: document.getElementById('nicknameInput').value, signature: document.getElementById('signatureInput').value };
            localStorage.setItem('roomProfile', JSON.stringify(profile));
            updateProfileDisplay();
        }
        function updateProfileDisplay() {
            const profile = JSON.parse(localStorage.getItem('roomProfile')) || {};
            const display = document.getElementById('profileDisplay');
            if (profile.nickname || profile.signature) {
                display.innerHTML = `<div style="margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid rgba(255,183,197,0.2)">${profile.nickname ? `<div style="color: var(--deep-pink); font-weight: 500;">${profile.nickname}</div>` : ''}${profile.signature ? `<div style="opacity: 0.7; margin-top: 0.3rem;">${profile.signature}</div>` : ''}</div>`;
            }
        }

        // ==================== 便签 ====================
        function loadNote() { document.getElementById('noteContent').value = localStorage.getItem('roomNote') || ''; }
        function saveNote() { localStorage.setItem('roomNote', document.getElementById('noteContent').value); alert('便签已保存'); }

        // ==================== Live2D 模型加载 (使用 airi 项目方案 - Cubism4) ====================
        let app = null;
        let live2dModel = null;

        async function loadLive2DModel() {
            try {
                console.log('=== Live2D 模型加载开始 ===');
                console.log('Live2DCubismCore:', typeof Live2DCubismCore !== 'undefined' ? 'loaded' : 'not loaded');
                console.log('PIXI:', typeof PIXI !== 'undefined' ? 'loaded' : 'not loaded');
                console.log('PIXI.live2d:', PIXI && PIXI.live2d ? 'loaded' : 'not loaded');
                console.log('PIXI.live2d.Live2DModel:', PIXI && PIXI.live2d && typeof PIXI.live2d.Live2DModel);

                const modelPath = '../models/【雪熊企划】八千代辉夜姬/八千代辉夜姬.model3.json';
                console.log('模型路径:', modelPath);

                if (typeof PIXI === 'undefined') {
                    throw new Error('PIXI.js 未加载');
                }
                if (!PIXI.live2d) {
                    throw new Error('PIXI.live2d 未加载');
                }

                // 创建 PIXI 应用
                const canvas = document.getElementById('live2d-canvas');
                const container = document.getElementById('live2d-container');

                app = new PIXI.Application({
                    view: canvas,
                    autoStart: true,
                    width: container.clientWidth || 600,
                    height: container.clientHeight || 700,
                    transparent: true,
                    backgroundAlpha: 0
                });

                // 使用 Live2DModel.from() 直接加载
                console.log('开始加载 Live2DModel...');
                const model = await PIXI.live2d.Live2DModel.from(modelPath, {
                    autoInteract: false
                });
                console.log('模型加载成功:', model);

                // 设置模型
                app.stage.addChild(model);

                // Live2DModel 使用 pivot 而不是 anchor，或者直接使用 position 调整
                // model.anchor.set(0.5, 0.5);
                model.pivot.set(model.width / 2, model.height / 2);

                // 加载保存的模型设置
                const modelSettings = JSON.parse(localStorage.getItem('roomModelSettings')) || { scale: 0.1, xOffset: 0, yOffset: 0 };
                model.position.set(app.screen.width / 2 + modelSettings.xOffset, app.screen.height * 0.8 + modelSettings.yOffset);
                model.scale.set(modelSettings.scale);

                // 更新 UI 显示
                document.getElementById('modelScaleInput').value = modelSettings.scale * 100;
                document.getElementById('modelScaleValue').textContent = Math.round(modelSettings.scale * 100) + '%';
                document.getElementById('modelXInput').value = modelSettings.xOffset;
                document.getElementById('modelXValue').textContent = modelSettings.xOffset;
                document.getElementById('modelYInput').value = modelSettings.yOffset;
                document.getElementById('modelYValue').textContent = modelSettings.yOffset;

                // 保存模型引用以便后续更新
                window.live2dModel = model;
                window.live2dApp = app;

                console.log('模型已添加到舞台');
                console.log('internalModel:', model.internalModel ? 'exists' : 'not exists');
                console.log('coreModel:', model.internalModel?.coreModel ? 'exists' : 'not exists');

                // 鼠标跟随
                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
                    const y = ((e.clientY - rect.top) / rect.height - 0.5) * 2;

                    if (model.internalModel && model.internalModel.coreModel) {
                        model.internalModel.coreModel.setParameterValueById('ParamAngleX', x * 30);
                        model.internalModel.coreModel.setParameterValueById('ParamAngleY', y * 30);
                    }
                });

                // 隐藏加载遮罩
                document.getElementById('loadingOverlay').style.display = 'none';
                console.log('=== 模型加载完成 ===');

            } catch (error) {
                console.error('Live2D error:', error);
                document.getElementById('loadingOverlay').innerHTML = `
                    <div style="color: var(--sakura-pink); text-align: center; max-width: 500px; padding: 2rem;">
                        <div style="font-size: 1.2rem; margin-bottom: 1rem;">⚠️ Live2D 加载失败</div>
                        <div style="font-size: 0.85rem; opacity: 0.7; margin-bottom: 1rem;">${error.message}</div>
                        <div style="font-size: 0.8rem; opacity: 0.5;">请检查控制台日志或联系管理员</div>
                        <button class="panel-btn" onclick="location.reload()" style="margin-top: 1rem;">重试</button>
                    </div>`;
            }
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initPanelPositions();
            loadProfile();
            loadNote();
            // loadLive2DModel(); // Disabled: TsukimiYachiyo Live2D handles initialization
            loadChatHistory();
        });

        // ==================== 模型设置 ====================
        function updateModelSettings() {
            const scale = parseInt(document.getElementById('modelScaleInput').value) / 100;
            const xOffset = parseInt(document.getElementById('modelXInput').value);
            const yOffset = parseInt(document.getElementById('modelYInput').value);

            document.getElementById('modelScaleValue').textContent = Math.round(scale * 100) + '%';
            document.getElementById('modelXValue').textContent = xOffset;
            document.getElementById('modelYValue').textContent = yOffset;

            localStorage.setItem('roomModelSettings', JSON.stringify({ scale, xOffset, yOffset }));

            // Apply settings to Live2D model
            if (typeof setLive2DModelSettings === 'function') {
                setLive2DModelSettings(scale, xOffset, yOffset);
            }
        }

        function resetModelSettings() {
            localStorage.removeItem('roomModelSettings');
            document.getElementById('modelScaleInput').value = 13;
            document.getElementById('modelScaleValue').textContent = '13%';
            document.getElementById('modelXInput').value = 0;
            document.getElementById('modelXValue').textContent = '0';
            document.getElementById('modelYInput').value = 0;
            document.getElementById('modelYValue').textContent = '0';
            if (window.live2dModel && window.live2dApp) {
                window.live2dModel.position.set(window.live2dApp.screen.width / 2, window.live2dApp.screen.height * 0.8);
                window.live2dModel.scale.set(0.13);
            }
        }

        // ==================== LLM 聊天功能 ====================
        let chatConversation = [];

        function loadChatHistory() {
            chatConversation = JSON.parse(localStorage.getItem('roomChatHistory')) || [];
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '<div class="chat-message system">💫 与辉夜姬的聊天开始</div>';
            chatConversation.forEach(msg => {
                appendChatMessage(msg.role, msg.content);
            });
            // 加载 LLM 设置
            const llmSettings = JSON.parse(localStorage.getItem('roomLLMSettings')) || {};
            if (llmSettings.apiUrl) document.getElementById('llmApiUrl').value = llmSettings.apiUrl;
            if (llmSettings.apiKey) document.getElementById('llmApiKey').value = llmSettings.apiKey;
            if (llmSettings.model) document.getElementById('llmModel').value = llmSettings.model;
        }

        function appendChatMessage(role, content) {
            const chatMessages = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${role}`;
            const roleNames = { user: '你', assistant: '辉夜姬', system: '系统' };
            msgDiv.innerHTML = `<strong>${roleNames[role] || role}:</strong><br>${escapeHtml(content)}`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveLLMSettings() {
            const settings = {
                apiUrl: document.getElementById('llmApiUrl').value.trim(),
                apiKey: document.getElementById('llmApiKey').value.trim(),
                model: document.getElementById('llmModel').value.trim()
            };
            localStorage.setItem('roomLLMSettings', JSON.stringify(settings));
            appendChatMessage('system', '✅ API 设置已保存');
        }

        function setLLMPreset(provider) {
            const presets = {
                deepseek: {
                    apiUrl: 'https://api.deepseek.com/v1',
                    model: 'deepseek-chat'
                },
                moonshot: {
                    apiUrl: 'https://api.moonshot.cn/v1/chat/completions',
                    model: 'moonshot-v1-8k'
                },
                openai: {
                    apiUrl: 'https://api.openai.com/v1/chat/completions',
                    model: 'gpt-3.5-turbo'
                },
                aliyun: {
                    apiUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',
                    model: 'qwen-turbo'
                }
            };
            const preset = presets[provider];
            if (preset) {
                document.getElementById('llmApiUrl').value = preset.apiUrl;
                document.getElementById('llmModel').value = preset.model;
                appendChatMessage('system', `✅ 已选择 ${provider === 'deepseek' ? 'DeepSeek' : provider === 'moonshot' ? 'Kimi 月之暗面' : provider === 'openai' ? 'OpenAI' : '阿里百炼'} 预设，请填写 API Key 后保存`);
            }
        }

        async function testLLMConnection() {
            const settings = {
                apiUrl: document.getElementById('llmApiUrl').value.trim(),
                apiKey: document.getElementById('llmApiKey').value.trim(),
                model: document.getElementById('llmModel').value.trim()
            };
            if (!settings.apiKey) {
                appendChatMessage('system', '❌ 请填写 API Key');
                return;
            }
            appendChatMessage('system', '🔄 正在测试连接...');
            try {
                const response = await fetch('http://47.97.0.122:3000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: '你好',
                        conversation: [],
                        apiKey: settings.apiKey,
                        apiUrl: settings.apiUrl || 'https://api.openai.com/v1/chat/completions',
                        model: settings.model || 'gpt-3.5-turbo'
                    })
                });
                const result = await response.json();
                if (result.success) {
                    appendChatMessage('system', `✅ 连接成功！模型：${result.data.model}`);
                    appendChatMessage('assistant', result.data.reply);
                } else {
                    appendChatMessage('system', '❌ ' + (result.message || '测试失败'));
                }
            } catch (error) {
                appendChatMessage('system', '❌ 连接失败：' + error.message);
            }
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            appendChatMessage('user', message);
            input.value = '';

            // 添加打字提示
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'chat-message assistant chat-typing';
            typingDiv.textContent = '辉夜姬正在输入...';
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // 获取用户配置的 LLM 设置
            const llmSettings = JSON.parse(localStorage.getItem('roomLLMSettings')) || {};

            try {
                const response = await fetch('http://47.97.0.122:3000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        conversation: chatConversation.slice(-10),
                        apiKey: llmSettings.apiKey,
                        apiUrl: llmSettings.apiUrl,
                        model: llmSettings.model
                    })
                });

                typingDiv.remove();

                const result = await response.json();
                if (result.success) {
                    const reply = result.data.reply;
                    appendChatMessage('assistant', reply);
                    chatConversation.push({ role: 'user', content: message });
                    chatConversation.push({ role: 'assistant', content: reply });
                    if (chatConversation.length > 20) {
                        chatConversation = chatConversation.slice(-20);
                    }
                    localStorage.setItem('roomChatHistory', JSON.stringify(chatConversation));
                } else {
                    appendChatMessage('system', '❌ ' + (result.message || '发送失败'));
                }
            } catch (error) {
                console.error('聊天失败:', error);
                appendChatMessage('system', '❌ 网络错误，请稍后再试');
            }
        }
    </script>
</body>
</html>
