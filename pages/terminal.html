<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title>数据终端 | 月读空间</title>
    <style>
        :root {
            --terminal-bg: rgba(11, 12, 18, 0.88);
            --terminal-panel: rgba(20, 18, 30, 0.84);
            --terminal-line: rgba(126, 219, 232, 0.24);
            --terminal-line-hot: rgba(255, 183, 197, 0.42);
            --terminal-text: rgba(245, 250, 255, 0.92);
            --terminal-muted: rgba(220, 235, 244, 0.62);
            --terminal-cyan: #7edbe8;
            --terminal-pink: #ffb7c5;
            --terminal-danger: #ff6b7a;
            --terminal-ok: #8ff0b1;
            --terminal-warn: #f5d76e;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--terminal-text);
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background:
                linear-gradient(180deg, rgba(5, 9, 18, 0.74), rgba(13, 10, 24, 0.96)),
                url("../assets/images/tsukuyomi-bg.png") center / cover fixed;
        }

        button, input, textarea {
            font: inherit;
        }

        .shell {
            min-height: 100vh;
            padding: 24px;
            background:
                linear-gradient(rgba(126, 219, 232, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(126, 219, 232, 0.025) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .auth-screen {
            min-height: calc(100vh - 48px);
            display: grid;
            place-items: center;
        }

        .auth-card {
            width: min(440px, 100%);
            padding: 28px;
            border: 1px solid var(--terminal-line-hot);
            border-radius: 8px;
            background: var(--terminal-bg);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(14px);
        }

        .auth-title {
            margin: 0 0 6px;
            font-size: 1.45rem;
            color: var(--terminal-cyan);
        }

        .auth-subtitle {
            margin: 0 0 24px;
            color: var(--terminal-muted);
            font-size: 0.92rem;
        }

        .field {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            color: var(--terminal-muted);
            font-size: 0.88rem;
        }

        input, textarea {
            width: 100%;
            border: 1px solid var(--terminal-line);
            border-radius: 6px;
            padding: 11px 12px;
            color: var(--terminal-text);
            background: rgba(255, 255, 255, 0.055);
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--terminal-cyan);
            box-shadow: 0 0 0 3px rgba(126, 219, 232, 0.12);
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .app {
            display: none;
            max-width: 1440px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
            padding: 16px 18px;
            border: 1px solid var(--terminal-line);
            border-radius: 8px;
            background: var(--terminal-bg);
            backdrop-filter: blur(12px);
        }

        .brand {
            display: grid;
            gap: 4px;
        }

        .brand strong {
            color: var(--terminal-cyan);
            font-size: 1.1rem;
        }

        .brand span, .session {
            color: var(--terminal-muted);
            font-size: 0.85rem;
        }

        .layout {
            display: grid;
            grid-template-columns: 230px minmax(0, 1fr);
            gap: 18px;
        }

        .sidebar, .panel {
            border: 1px solid var(--terminal-line);
            border-radius: 8px;
            background: var(--terminal-bg);
            backdrop-filter: blur(12px);
        }

        .sidebar {
            padding: 12px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .nav-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 11px 12px;
            border: 1px solid transparent;
            border-radius: 6px;
            color: var(--terminal-text);
            background: transparent;
            cursor: pointer;
            text-align: left;
        }

        .nav-btn:hover, .nav-btn.active {
            border-color: var(--terminal-line-hot);
            background: rgba(255, 183, 197, 0.09);
        }

        .panel {
            display: none;
            min-height: 640px;
            padding: 18px;
        }

        .panel.active {
            display: block;
        }

        .panel-head, .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .panel-title {
            margin: 0;
            color: var(--terminal-pink);
            font-size: 1.25rem;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .card {
            padding: 18px;
            border: 1px solid var(--terminal-line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.045);
        }

        .card strong {
            display: block;
            margin-bottom: 8px;
            color: var(--terminal-muted);
            font-size: 0.88rem;
            font-weight: 500;
        }

        .card span {
            color: var(--terminal-cyan);
            font-size: 2rem;
            font-weight: 700;
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--terminal-line);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 780px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid rgba(126, 219, 232, 0.12);
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--terminal-cyan);
            font-size: 0.86rem;
            font-weight: 600;
            background: rgba(126, 219, 232, 0.055);
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .muted {
            color: var(--terminal-muted);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 2px 8px;
            border: 1px solid var(--terminal-line);
            border-radius: 999px;
            color: var(--terminal-muted);
            font-size: 0.78rem;
        }

        .badge.ok { color: var(--terminal-ok); border-color: rgba(143, 240, 177, 0.42); }
        .badge.warn { color: var(--terminal-warn); border-color: rgba(245, 215, 110, 0.42); }
        .badge.hot { color: var(--terminal-pink); border-color: var(--terminal-line-hot); }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn {
            border: 1px solid var(--terminal-line);
            border-radius: 6px;
            padding: 9px 12px;
            color: var(--terminal-text);
            background: rgba(255, 255, 255, 0.055);
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            border-color: var(--terminal-cyan);
            background: rgba(126, 219, 232, 0.12);
        }

        .btn.primary {
            border-color: rgba(126, 219, 232, 0.52);
            color: var(--terminal-cyan);
        }

        .btn.danger {
            border-color: rgba(255, 107, 122, 0.52);
            color: var(--terminal-danger);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .message {
            display: none;
            margin-bottom: 14px;
            padding: 11px 12px;
            border-radius: 6px;
            border: 1px solid var(--terminal-line);
            background: rgba(255, 255, 255, 0.055);
        }

        .message.show { display: block; }
        .message.error { color: var(--terminal-danger); border-color: rgba(255, 107, 122, 0.46); }
        .message.success { color: var(--terminal-ok); border-color: rgba(143, 240, 177, 0.46); }

        .empty {
            padding: 32px;
            color: var(--terminal-muted);
            text-align: center;
        }

        .settings-grid {
            display: grid;
            gap: 16px;
            max-width: 760px;
        }

        .check-row {
            display: flex;
            gap: 10px;
            align-items: center;
            color: var(--terminal-muted);
        }

        .check-row input {
            width: 18px;
            height: 18px;
            accent-color: var(--terminal-cyan);
        }

        @media (max-width: 1000px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { position: static; }
            .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 640px) {
            .shell { padding: 12px; }
            .topbar, .panel-head, .toolbar { align-items: flex-start; flex-direction: column; }
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="auth-screen" id="authScreen">
            <form class="auth-card" id="loginForm" autocomplete="off">
                <h1 class="auth-title">数据终端</h1>
                <p class="auth-subtitle">仅管理员可访问。所有操作都会通过服务端权限校验。</p>
                <div class="message" id="loginMessage"></div>
                <div class="field">
                    <label for="username">管理员账号</label>
                    <input id="username" name="username" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="password">管理员密码</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button class="btn primary" type="submit" id="loginButton">连接终端</button>
            </form>
        </section>

        <section class="app" id="app">
            <header class="topbar">
                <div class="brand">
                    <strong>月读空间管理系统</strong>
                    <span id="clock">--</span>
                </div>
                <div class="btn-row">
                    <span class="session" id="sessionInfo">未连接</span>
                    <a class="btn" href="hub">返回大厅</a>
                    <button class="btn danger" type="button" id="logoutButton">断开连接</button>
                </div>
            </header>

            <div class="layout">
                <aside class="sidebar" aria-label="管理导航">
                    <button class="nav-btn active" type="button" data-panel="dashboard">概览 <span>01</span></button>
                    <button class="nav-btn" type="button" data-panel="articles">文章 <span>02</span></button>
                    <button class="nav-btn" type="button" data-panel="messages">留言 <span>03</span></button>
                    <button class="nav-btn" type="button" data-panel="users">用户 <span>04</span></button>
                    <button class="nav-btn" type="button" data-panel="links">友链 <span>05</span></button>
                    <button class="nav-btn" type="button" data-panel="analytics">统计 <span>06</span></button>
                    <button class="nav-btn" type="button" data-panel="settings">配置 <span>07</span></button>
                </aside>

                <div>
                    <section class="panel active" id="dashboard">
                        <div class="panel-head">
                            <h2 class="panel-title">系统概览</h2>
                            <button class="btn" type="button" data-refresh="dashboard">刷新</button>
                        </div>
                        <div class="cards">
                            <div class="card"><strong>文章总数</strong><span id="statArticles">0</span></div>
                            <div class="card"><strong>待审留言</strong><span id="statMessages">0</span></div>
                            <div class="card"><strong>今日访问</strong><span id="statToday">0</span></div>
                            <div class="card"><strong>用户总数</strong><span id="statUsers">0</span></div>
                        </div>
                    </section>

                    <section class="panel" id="articles">
                        <div class="panel-head">
                            <h2 class="panel-title">文章管理</h2>
                            <div class="btn-row">
                                <a class="btn primary" href="editor">新建文章</a>
                                <button class="btn" type="button" data-refresh="articles">刷新</button>
                            </div>
                        </div>
                        <div class="message" id="articleMessage"></div>
                        <div class="table-wrap"><table><thead><tr><th>ID</th><th>标题</th><th>分类</th><th>阅读</th><th>状态</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="articlesBody"></tbody></table></div>
                    </section>

                    <section class="panel" id="messages">
                        <div class="panel-head">
                            <h2 class="panel-title">留言审核</h2>
                            <button class="btn" type="button" data-refresh="messages">刷新</button>
                        </div>
                        <div class="message" id="messageMessage"></div>
                        <div class="table-wrap"><table><thead><tr><th>作者</th><th>内容</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="messagesBody"></tbody></table></div>
                    </section>

                    <section class="panel" id="users">
                        <div class="panel-head">
                            <h2 class="panel-title">用户管理</h2>
                            <button class="btn" type="button" data-refresh="users">刷新</button>
                        </div>
                        <div class="message" id="userMessage"></div>
                        <div class="table-wrap"><table><thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>角色</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="usersBody"></tbody></table></div>
                    </section>

                    <section class="panel" id="links">
                        <div class="panel-head">
                            <h2 class="panel-title">友链管理</h2>
                            <button class="btn" type="button" data-refresh="links">刷新</button>
                        </div>
                        <div class="message" id="linkMessage"></div>
                        <form class="toolbar" id="linkForm">
                            <input id="linkName" placeholder="站点名称" required>
                            <input id="linkUrl" placeholder="https://example.com" required>
                            <button class="btn primary" type="submit">添加友链</button>
                        </form>
                        <div class="table-wrap"><table><thead><tr><th>名称</th><th>URL</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="linksBody"></tbody></table></div>
                    </section>

                    <section class="panel" id="analytics">
                        <div class="panel-head">
                            <h2 class="panel-title">访问统计</h2>
                            <button class="btn" type="button" data-refresh="analytics">刷新</button>
                        </div>
                        <div class="cards">
                            <div class="card"><strong>今日访问</strong><span id="analyticsToday">0</span></div>
                            <div class="card"><strong>7 日访问</strong><span id="analyticsWeek">0</span></div>
                            <div class="card"><strong>30 日访问</strong><span id="analyticsMonth">0</span></div>
                            <div class="card"><strong>总访问</strong><span id="analyticsTotal">0</span></div>
                        </div>
                    </section>

                    <section class="panel" id="settings">
                        <div class="panel-head">
                            <h2 class="panel-title">系统配置</h2>
                            <button class="btn" type="button" data-refresh="settings">刷新</button>
                        </div>
                        <div class="message" id="settingsMessage"></div>
                        <form class="settings-grid" id="settingsForm">
                            <div class="field">
                                <label for="siteTitle">站点标题</label>
                                <input id="siteTitle" name="siteTitle">
                            </div>
                            <div class="field">
                                <label for="siteAnnouncement">公告内容</label>
                                <textarea id="siteAnnouncement" name="siteAnnouncement"></textarea>
                            </div>
                            <label class="check-row"><input id="sakuraEffect" name="sakuraEffect" type="checkbox"> 启用游鱼效果</label>
                            <label class="check-row"><input id="scanlineEffect" name="scanlineEffect" type="checkbox"> 启用扫描线效果</label>
                            <div><button class="btn primary" type="submit">保存配置</button></div>
                        </form>
                    </section>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = '/api/admin';
        const state = {
            token: localStorage.getItem('admin_token') || '',
            admin: null,
            activePanel: 'dashboard'
        };

        const loaders = {
            dashboard: loadDashboard,
            articles: loadArticles,
            messages: loadMessages,
            users: loadUsers,
            links: loadLinks,
            analytics: loadAnalytics,
            settings: loadSettings
        };

        const $ = id => document.getElementById(id);

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value == null ? '' : String(value);
            return div.innerHTML;
        }

        function formatDate(value) {
            if (!value) return '未记录';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString('zh-CN');
        }

        function showMessage(id, text, type = 'success') {
            const el = $(id);
            if (!el) return;
            el.textContent = text;
            el.className = `message show ${type}`;
            if (type === 'success') setTimeout(() => el.classList.remove('show'), 2600);
        }

        function setAuthView(authed) {
            $('authScreen').style.display = authed ? 'none' : 'grid';
            $('app').style.display = authed ? 'block' : 'none';
        }

        async function api(path, options = {}) {
            const headers = new Headers(options.headers || {});
            if (!(options.body instanceof FormData) && options.body !== undefined) {
                headers.set('Content-Type', 'application/json');
            }
            if (state.token) headers.set('Authorization', `Bearer ${state.token}`);

            const response = await fetch(API_BASE + path, { ...options, headers });
            const contentType = response.headers.get('content-type') || '';
            const raw = await response.text();
            const result = contentType.includes('application/json') && raw
                ? JSON.parse(raw)
                : { success: false, message: raw || `HTTP ${response.status}` };

            if (response.status === 401 || response.status === 403) {
                logout(false);
                throw new Error(result.message || '管理员会话已失效');
            }
            if (!response.ok || !result.success) {
                throw new Error(result.message || `HTTP ${response.status}`);
            }
            return result.data;
        }

        async function verifySession() {
            if (!state.token) {
                setAuthView(false);
                return;
            }
            try {
                state.admin = await api('/me');
                $('sessionInfo').textContent = `${state.admin.username} · ${state.admin.role}`;
                setAuthView(true);
                await loadDashboard();
            } catch (error) {
                setAuthView(false);
                showMessage('loginMessage', error.message, 'error');
            }
        }

        async function login(event) {
            event.preventDefault();
            const button = $('loginButton');
            button.disabled = true;
            try {
                const response = await fetch(API_BASE + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: $('username').value.trim(),
                        password: $('password').value
                    })
                });
                const result = await response.json();
                if (!response.ok || !result.success) throw new Error(result.message || '登录失败');
                state.token = result.data.token;
                state.admin = result.data.admin;
                localStorage.setItem('admin_token', state.token);
                localStorage.setItem('admin_user', JSON.stringify(state.admin));
                $('password').value = '';
                $('sessionInfo').textContent = `${state.admin.username} · ${state.admin.role}`;
                setAuthView(true);
                await loadDashboard();
            } catch (error) {
                showMessage('loginMessage', error.message, 'error');
            } finally {
                button.disabled = false;
            }
        }

        function logout(reload = true) {
            state.token = '';
            state.admin = null;
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            setAuthView(false);
            if (reload) location.reload();
        }

        function switchPanel(panel) {
            state.activePanel = panel;
            document.querySelectorAll('.panel').forEach(node => node.classList.toggle('active', node.id === panel));
            document.querySelectorAll('.nav-btn').forEach(node => node.classList.toggle('active', node.dataset.panel === panel));
            loaders[panel]?.();
        }

        function renderRows(tbodyId, rows, emptyText) {
            const tbody = $(tbodyId);
            tbody.innerHTML = rows.length ? rows.join('') : `<tr><td colspan="8"><div class="empty">${emptyText}</div></td></tr>`;
        }

        async function loadDashboard() {
            const data = await api('/stats');
            $('statArticles').textContent = data.articles || 0;
            $('statMessages').textContent = data.pendingMessages || 0;
            $('statToday').textContent = data.todayViews || 0;
            $('statUsers').textContent = data.users || 0;
        }

        async function loadArticles() {
            try {
                const articles = await api('/articles');
                renderRows('articlesBody', articles.map(article => `
                    <tr>
                        <td>${article.id}</td>
                        <td><a class="muted" href="article?id=${article.id}" target="_blank">${escapeHtml(article.title)}</a></td>
                        <td>${escapeHtml(article.category || '未分类')}</td>
                        <td>${article.view_count || 0}</td>
                        <td><span class="badge ${article.status === 'published' ? 'ok' : 'warn'}">${article.status === 'published' ? '已发布' : '草稿'}</span></td>
                        <td>${formatDate(article.updated_at || article.created_at)}</td>
                        <td><div class="btn-row">
                            <a class="btn" href="editor?id=${article.id}">编辑</a>
                            <button class="btn" type="button" data-action="toggle-article" data-id="${article.id}">切换状态</button>
                            <button class="btn danger" type="button" data-action="delete-article" data-id="${article.id}">删除</button>
                        </div></td>
                    </tr>
                `), '暂无文章');
            } catch (error) {
                showMessage('articleMessage', error.message, 'error');
            }
        }

        async function loadMessages() {
            try {
                const messages = await api('/messages');
                renderRows('messagesBody', messages.map(message => `
                    <tr>
                        <td>${escapeHtml(message.username)}</td>
                        <td>${escapeHtml(message.content)}</td>
                        <td><span class="badge ${message.status === 'approved' ? 'ok' : 'warn'}">${message.status === 'approved' ? '已通过' : '待审核'}</span></td>
                        <td>${formatDate(message.created_at)}</td>
                        <td><div class="btn-row">
                            ${message.status !== 'approved' ? `<button class="btn primary" type="button" data-action="approve-message" data-id="${message.id}">通过</button>` : ''}
                            <button class="btn danger" type="button" data-action="delete-message" data-id="${message.id}">删除</button>
                        </div></td>
                    </tr>
                `), '暂无留言');
            } catch (error) {
                showMessage('messageMessage', error.message, 'error');
            }
        }

        async function loadUsers() {
            try {
                const users = await api('/users');
                renderRows('usersBody', users.map(user => `
                    <tr>
                        <td><span class="muted">${escapeHtml(String(user.id).slice(0, 8))}</span></td>
                        <td>${escapeHtml(user.username)}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td><span class="badge ${user.role === 'admin' ? 'hot' : ''}">${escapeHtml(user.role || 'user')}</span></td>
                        <td>${formatDate(user.created_at)}</td>
                        <td><button class="btn danger" type="button" data-action="delete-user" data-id="${escapeHtml(user.id)}" ${user.role === 'admin' ? 'disabled' : ''}>删除</button></td>
                    </tr>
                `), '暂无用户');
            } catch (error) {
                showMessage('userMessage', error.message, 'error');
            }
        }

        async function loadLinks() {
            try {
                const links = await api('/links');
                renderRows('linksBody', links.map(link => `
                    <tr>
                        <td>${escapeHtml(link.name)}</td>
                        <td><a class="muted" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.url)}</a></td>
                        <td><span class="badge ok">${escapeHtml(link.status || 'active')}</span></td>
                        <td>${formatDate(link.created_at)}</td>
                        <td><button class="btn danger" type="button" data-action="delete-link" data-id="${link.id}">删除</button></td>
                    </tr>
                `), '暂无友链');
            } catch (error) {
                showMessage('linkMessage', error.message, 'error');
            }
        }

        async function loadAnalytics() {
            const data = await api('/analytics');
            $('analyticsToday').textContent = data.todayViews || 0;
            $('analyticsWeek').textContent = data.weekViews || 0;
            $('analyticsMonth').textContent = data.monthViews || 0;
            $('analyticsTotal').textContent = data.totalViews || 0;
        }

        async function loadSettings() {
            try {
                const settings = await api('/settings');
                $('siteTitle').value = settings.siteTitle || '';
                $('siteAnnouncement').value = settings.siteAnnouncement || '';
                $('sakuraEffect').checked = settings.sakuraEffect !== false;
                $('scanlineEffect').checked = settings.scanlineEffect !== false;
            } catch (error) {
                showMessage('settingsMessage', error.message, 'error');
            }
        }

        async function handleTableAction(event) {
            const button = event.target.closest('[data-action]');
            if (!button || button.disabled) return;
            const { action, id } = button.dataset;
            try {
                if (action === 'toggle-article') {
                    await api(`/articles/${id}/toggle-status`, { method: 'POST' });
                    showMessage('articleMessage', '文章状态已更新');
                    await loadArticles();
                }
                if (action === 'delete-article' && confirm('确定删除这篇文章吗？')) {
                    await api(`/articles/${id}`, { method: 'DELETE' });
                    showMessage('articleMessage', '文章已删除');
                    await loadArticles();
                    await loadDashboard();
                }
                if (action === 'approve-message') {
                    await api(`/messages/${id}/approve`, { method: 'POST' });
                    showMessage('messageMessage', '留言已通过');
                    await loadMessages();
                    await loadDashboard();
                }
                if (action === 'delete-message' && confirm('确定删除这条留言吗？')) {
                    await api(`/messages/${id}`, { method: 'DELETE' });
                    showMessage('messageMessage', '留言已删除');
                    await loadMessages();
                    await loadDashboard();
                }
                if (action === 'delete-user' && confirm('确定删除这个用户吗？')) {
                    await api(`/users/${encodeURIComponent(id)}`, { method: 'DELETE' });
                    showMessage('userMessage', '用户已删除');
                    await loadUsers();
                    await loadDashboard();
                }
                if (action === 'delete-link' && confirm('确定删除这条友链吗？')) {
                    await api(`/links/${id}`, { method: 'DELETE' });
                    showMessage('linkMessage', '友链已删除');
                    await loadLinks();
                }
            } catch (error) {
                const messageMap = {
                    'toggle-article': 'articleMessage',
                    'delete-article': 'articleMessage',
                    'approve-message': 'messageMessage',
                    'delete-message': 'messageMessage',
                    'delete-user': 'userMessage',
                    'delete-link': 'linkMessage'
                };
                showMessage(messageMap[action] || 'loginMessage', error.message, 'error');
            }
        }

        async function createLink(event) {
            event.preventDefault();
            try {
                await api('/links', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: $('linkName').value.trim(),
                        url: $('linkUrl').value.trim()
                    })
                });
                event.target.reset();
                showMessage('linkMessage', '友链已添加');
                await loadLinks();
            } catch (error) {
                showMessage('linkMessage', error.message, 'error');
            }
        }

        async function saveSettings(event) {
            event.preventDefault();
            try {
                await api('/settings', {
                    method: 'POST',
                    body: JSON.stringify({
                        siteTitle: $('siteTitle').value.trim(),
                        siteAnnouncement: $('siteAnnouncement').value.trim(),
                        sakuraEffect: $('sakuraEffect').checked,
                        scanlineEffect: $('scanlineEffect').checked
                    })
                });
                showMessage('settingsMessage', '配置已保存');
            } catch (error) {
                showMessage('settingsMessage', error.message, 'error');
            }
        }

        function updateClock() {
            $('clock').textContent = new Date().toLocaleString('zh-CN');
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            $('loginForm').addEventListener('submit', login);
            $('logoutButton').addEventListener('click', () => logout(true));
            $('linkForm').addEventListener('submit', createLink);
            $('settingsForm').addEventListener('submit', saveSettings);
            document.querySelectorAll('.nav-btn').forEach(button => {
                button.addEventListener('click', () => switchPanel(button.dataset.panel));
            });
            document.querySelectorAll('[data-refresh]').forEach(button => {
                button.addEventListener('click', () => loaders[button.dataset.refresh]?.());
            });
            document.addEventListener('click', handleTableAction);
            verifySession();
        });
    </script>
</body>
</html>
