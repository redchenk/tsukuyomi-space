<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人居所 | 月读空间</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: #1a1025; overflow: hidden; }
        #canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script src="/lib/live2dcubismcore-v5.min.js"></script>
    <script>
    (async function() {
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (!gl) { alert('WebGL not supported'); return; }

        // Resize canvas to window
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Compile shaders
        const VS = `attribute vec2 aPos;attribute vec2 aUV;uniform mat4 uMVP;varying vec2 vUV;void main(){gl_Position=uMVP*vec4(aPos,0.,1.);vUV=aUV;}`;
        const FS = `precision mediump float;varying vec2 vUV;uniform sampler2D uTex;uniform float uAlpha;void main(){vec4 c=texture2D(uTex,vUV);if(c.a<.01)discard;gl_FragColor=vec4(c.rgb,c.a*uAlpha);}`;

        function compileShader(type, src) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
            return s;
        }

        const prog = gl.createProgram();
        gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, VS));
        gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const aPos = gl.getAttribLocation(prog, 'aPos');
        const aUV = gl.getAttribLocation(prog, 'aUV');
        const uMVP = gl.getUniformLocation(prog, 'uMVP');
        const uTex = gl.getUniformLocation(prog, 'uTex');

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        // Matrix utility
        function ortho(l, r, b, t, n, f) {
            const m = new Float32Array(16);
            m[0] = 2/(r-l); m[5] = 2/(t-b); m[10] = -2/(f-n); m[12] = -(r+l)/(r-l); m[13] = -(t+b)/(t-b); m[14] = -(f+n)/(f-n); m[15] = 1;
            return m;
        }

        // Load model
        const core = window.Live2DCubismCore;
        const modelDir = '/models/tsukimi-yachiyo/';

        console.log('Loading model JSON...');
        const json = await (await fetch(modelDir + 'tsukimi-yachiyo.model3.json')).json();

        console.log('Loading moc3...');
        const mocBuffer = await (await fetch(modelDir + json.FileReferences.Moc)).arrayBuffer();
        const moc = core.Moc.fromArrayBuffer(mocBuffer);
        const model = core.Model.fromMoc(moc);
        console.log('Model loaded, canvas:', model.canvasinfo.CanvasWidth, 'x', model.canvasinfo.CanvasHeight);

        // Load textures
        const textures = [];
        for (const path of json.FileReferences.Textures) {
            console.log('Loading texture:', path);
            const img = new Image();
            img.crossOrigin = 'anonymous';
            await new Promise(r => { img.onload = r; img.onerror = r; img.src = modelDir + path; });
            const tex = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, tex);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            textures.push(tex);
        }

        console.log('All loaded, starting render...');
        document.title = 'Live2D Working!';

        // Render loop
        let last = 0, frame = 0;
        function render(t) {
            frame++;
            const dt = (t - last) / 1000;
            last = t;

            model.update();

            // Animate breath
            const params = model.parameters;
            for (let i = 0; i < params.count; i++) {
                if (params.ids[i] === 'ParamBreath') {
                    params.values[i] = 0.5 + Math.sin(t * 0.002) * 0.1;
                }
            }

            // Draw
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0, 0, 0, 0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            const mvp = ortho(-1, 1, -1, 1, -1, 1);
            gl.uniformMatrix4fv(uMVP, false, mvp);

            const d = model.drawables;

            // Sort by render order
            const order = [];
            for (let i = 0; i < d.count; i++) order.push(i);
            order.sort((a, b) => d.renderOrders[a] - d.renderOrders[b]);

            if (frame === 1) {
                console.log('Drawables:', d.count);
                // Find min/max of all vertices
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (let i = 0; i < d.count; i++) {
                    const v = d.vertexPositions[i];
                    if (!v) continue;
                    for (let j = 0; j < v.length; j += 2) {
                        minX = Math.min(minX, v[j]);
                        maxX = Math.max(maxX, v[j]);
                        minY = Math.min(minY, v[j+1]);
                        maxY = Math.max(maxY, v[j+1]);
                    }
                }
                console.log('All verts X range:', minX, 'to', maxX);
                console.log('All verts Y range:', minY, 'to', maxY);
            }

            // Draw all textures at their correct positions
            for (const i of order) {
                const ti = d.textureIndices[i];
                if (ti < 0 || ti >= textures.length) continue;
                const op = d.opacities[i];
                if (op <= 0) continue;
                const v = d.vertexPositions[i];
                const u = d.vertexUvs[i];
                const idx = d.indices[i];
                if (!v || !u || !idx) continue;

                const n = v.length / 2;
                const pos = new Float32Array(n * 2);
                const uv = new Float32Array(n * 2);

                // Cubism coords: X centered (negative=left, positive=right), Y positive=up
                // Map to NDC: X * 2 (to get -1 to 1 range), Y * 2 (Cubism Y is already in similar scale)
                for (let j = 0; j < n; j++) {
                    pos[j*2] = v[j*2] * 2;  // Scale X to NDC
                    pos[j*2+1] = v[j*2+1] * 2;  // Scale Y to NDC
                    uv[j*2] = u[j*2];
                    uv[j*2+1] = 1 - u[j*2+1];
                }

                gl.activeTexture(gl.TEXTURE0 + ti);
                gl.bindTexture(gl.TEXTURE_2D, textures[ti]);
                gl.uniform1i(uTex, ti);
                gl.uniform1f(gl.getUniformLocation(prog, 'uAlpha'), op);

                const vb = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, vb);
                gl.bufferData(gl.ARRAY_BUFFER, pos, gl.DYNAMIC_DRAW);
                gl.enableVertexAttribArray(aPos);
                gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

                const ub = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, ub);
                gl.bufferData(gl.ARRAY_BUFFER, uv, gl.STATIC_DRAW);
                gl.enableVertexAttribArray(aUV);
                gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 0, 0);

                const ib = gl.createBuffer();
                gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ib);
                gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(idx), gl.STATIC_DRAW);

                gl.drawElements(gl.TRIANGLES, idx.length, gl.UNSIGNED_SHORT, 0);

                gl.deleteBuffer(vb);
                gl.deleteBuffer(ub);
                gl.deleteBuffer(ib);
            }

                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, textures[ti]);
                gl.uniform1i(uTex, 0);

                const vb = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, vb);
                gl.bufferData(gl.ARRAY_BUFFER, v, gl.DYNAMIC_DRAW);
                gl.enableVertexAttribArray(aPos);
                gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

                const ub = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, ub);
                gl.bufferData(gl.ARRAY_BUFFER, u, gl.STATIC_DRAW);
                gl.enableVertexAttribArray(aUV);
                gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 0, 0);

                const ib = gl.createBuffer();
                gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ib);
                gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, idx, gl.STATIC_DRAW);

                gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);
            }

            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);
    })();
    </script>
</body>
</html>
