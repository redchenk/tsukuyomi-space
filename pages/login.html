<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title>登录 | 月读空间</title>
    <style>
        :root { --panel: rgba(12,17,34,.74); --line: rgba(126,219,232,.22); --text: rgba(255,255,255,.92); --muted: rgba(225,236,246,.68); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 5.5rem 1.2rem 2rem; overflow: hidden; background: radial-gradient(circle at 78% 16%, rgba(244,207,114,.16), transparent 16rem), linear-gradient(135deg,#0b1020,#14102a 46%,#07121e); color: var(--text); font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", Arial, sans-serif; }
        #sakuraContainer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .moon { position: fixed; top: 10%; right: 14%; width: clamp(64px,9vw,116px); aspect-ratio: 1; border-radius: 50%; z-index: 1; background: radial-gradient(circle at 36% 34%, rgba(255,255,255,.96), rgba(244,207,114,.74) 58%, rgba(126,219,232,.22)); box-shadow: 0 0 46px rgba(244,207,114,.36); animation: float 6s ease-in-out infinite; }
        @keyframes float { 50% { transform: translateY(-14px); } }
        .back-btn, .lang-switcher, .panel { position: relative; z-index: 5; }
        .back-btn { position: fixed; top: 1.2rem; left: 1.2rem; color: var(--muted); text-decoration: none; padding: .55rem .75rem; border: 1px solid var(--line); border-radius: 8px; background: rgba(8,13,27,.52); backdrop-filter: blur(14px); }
        .back-btn:hover, .links a:hover { color: #fff; }
        .lang-switcher { position: fixed; top: 1.2rem; right: 1.2rem; display: flex; gap: .25rem; padding: .2rem; border: 1px solid var(--line); border-radius: 8px; background: rgba(8,13,27,.52); backdrop-filter: blur(14px); }
        button { font: inherit; }
        .lang-btn, .mode-btn, .code-btn, .submit-btn { border-radius: 8px; border: 1px solid rgba(126,219,232,.22); background: rgba(8,13,27,.54); color: var(--muted); cursor: pointer; transition: .2s ease; }
        .lang-btn { min-height: 34px; padding: .42rem .68rem; font-size: .82rem; }
        .mode-btn { min-height: 42px; padding: .72rem; }
        .lang-btn.active, .lang-btn:hover, .mode-btn.active, .mode-btn:hover, .code-btn:hover { color: #fff; border-color: rgba(126,219,232,.52); background: linear-gradient(135deg, rgba(255,95,150,.28), rgba(126,219,232,.18)); }
        .panel { width: min(100%, 420px); padding: clamp(2rem,5vw,3rem); border: 1px solid var(--line); border-radius: 10px; background: var(--panel); box-shadow: 0 24px 60px rgba(0,0,0,.36); backdrop-filter: blur(20px) saturate(1.16); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-size: 2rem; margin-bottom: .5rem; color: #fff; }
        .logo p, .links { color: var(--muted); font-size: .92rem; }
        .login-mode { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1.2rem; }
        .form-group { margin-bottom: 1.15rem; }
        label { display: block; margin-bottom: .45rem; color: var(--text); font-size: .9rem; font-weight: 600; }
        input { width: 100%; min-height: 46px; padding: .82rem 1rem; border: 1px solid rgba(255,183,197,.22); border-radius: 8px; background: rgba(6,10,22,.56); color: #fff; font: inherit; outline: none; }
        input::placeholder { color: rgba(225,236,246,.42); }
        input:focus { border-color: rgba(126,219,232,.54); box-shadow: 0 0 0 3px rgba(126,219,232,.1); }
        .code-row { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: .6rem; }
        .code-btn { min-height: 46px; padding: 0 .9rem; white-space: nowrap; }
        .submit-btn { width: 100%; min-height: 48px; margin-top: .2rem; color: #fff; font-weight: 700; background: linear-gradient(135deg, rgba(255,95,150,.3), rgba(126,219,232,.18)); border-color: rgba(255,173,193,.34); }
        .submit-btn:hover { transform: translateY(-1px); border-color: rgba(126,219,232,.5); }
        button:disabled { opacity: .58; cursor: not-allowed; transform: none; }
        .links { margin-top: 1.5rem; text-align: center; }
        .links a { color: rgba(126,219,232,.86); text-decoration: none; }
        .message { display: none; margin-bottom: 1rem; padding: .82rem; border-radius: 8px; text-align: center; font-size: .9rem; }
        .error { color: #ff9bab; border: 1px solid rgba(255,95,120,.3); background: rgba(255,95,120,.1); }
        .success { color: #97f2c1; border: 1px solid rgba(100,255,150,.26); background: rgba(100,255,150,.1); }
        @media (max-width: 640px) { body { align-items: flex-start; } .code-row { grid-template-columns: 1fr; } }
    </style>
    <script defer src="../assets/js/ambient-fish.js?v=20260501-flickerfix"></script>
</head>
<body>
    <div id="sakuraContainer"></div><div class="moon"></div>
    <a href="hub" class="back-btn"><span data-i18n="back">返回</span></a>
    <div class="lang-switcher" aria-label="Language"><button type="button" class="lang-btn active" data-lang="zh">中文</button><button type="button" class="lang-btn" data-lang="ja">日本語</button></div>
    <main class="panel">
        <div class="logo"><h1>月读空间</h1><p data-i18n="subtitle">欢迎回来，请登录你的账号</p></div>
        <div id="errorMessage" class="message error"></div><div id="successMessage" class="message success"></div>
        <form id="loginForm">
            <div class="login-mode"><button type="button" class="mode-btn active" id="passwordModeBtn" data-i18n="password_mode">密码登录</button><button type="button" class="mode-btn" id="codeModeBtn" data-i18n="code_mode">验证码登录</button></div>
            <div class="form-group"><label for="username" data-i18n="account">用户名或邮箱</label><input type="text" id="username" required data-i18n-placeholder="account_ph" placeholder="请输入用户名或邮箱"></div>
            <div class="form-group" id="passwordGroup"><label for="password" data-i18n="password">密码</label><input type="password" id="password" required data-i18n-placeholder="password_ph" placeholder="请输入密码"></div>
            <div class="form-group" id="codeGroup" style="display:none"><label for="emailCode" data-i18n="email_code">邮箱验证码</label><div class="code-row"><input type="text" id="emailCode" inputmode="numeric" maxlength="6" data-i18n-placeholder="code_ph" placeholder="请输入 6 位验证码"><button type="button" id="sendLoginCodeBtn" class="code-btn" data-i18n="send_code">发送验证码</button></div></div>
            <button type="submit" class="submit-btn" data-i18n="login_btn">登录</button>
        </form>
        <div class="links"><span data-i18n="no_account">还没有账号？</span> <a href="register" data-i18n="register_link">立即注册</a></div>
    </main>
    <script>
        const i18n={zh:{back:'返回',subtitle:'欢迎回来，请登录你的账号',password_mode:'密码登录',code_mode:'验证码登录',account:'用户名或邮箱',account_ph:'请输入用户名或邮箱',email_ph:'请输入已注册邮箱',password:'密码',password_ph:'请输入密码',email_code:'邮箱验证码',code_ph:'请输入 6 位验证码',send_code:'发送验证码',code_sent:'验证码已发送，请查看邮箱',code_failed:'验证码发送失败：',login_btn:'登录',no_account:'还没有账号？',register_link:'立即注册',login_success:'登录成功，正在跳转...',login_failed:'登录失败：',unknown:'未知错误'},ja:{back:'戻る',subtitle:'おかえりなさい。アカウントにログインしてください',password_mode:'パスワード',code_mode:'認証コード',account:'ユーザー名またはメール',account_ph:'ユーザー名またはメールを入力',email_ph:'登録済みメールを入力',password:'パスワード',password_ph:'パスワードを入力',email_code:'メール認証コード',code_ph:'6桁のコードを入力',send_code:'コード送信',code_sent:'認証コードを送信しました',code_failed:'コード送信失敗：',login_btn:'ログイン',no_account:'アカウントをお持ちでないですか？',register_link:'新規登録',login_success:'ログイン成功。移動しています...',login_failed:'ログイン失敗：',unknown:'不明なエラー'}};
        let currentLang='zh', loginMethod='password';
        document.addEventListener('DOMContentLoaded',()=>{window.initTsukuyomiAmbientFish?.({containerId:'sakuraContainer',density:.58}); setLanguage(localStorage.getItem('lang')||'zh'); document.getElementById('loginForm').addEventListener('submit',handleLogin); passwordModeBtn.addEventListener('click',()=>setLoginMode('password')); codeModeBtn.addEventListener('click',()=>setLoginMode('code')); sendLoginCodeBtn.addEventListener('click',sendLoginCode); document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLanguage(b.dataset.lang)));});
        function setLanguage(lang){currentLang=i18n[lang]?lang:'zh'; localStorage.setItem('lang',currentLang); document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===currentLang)); document.querySelectorAll('[data-i18n]').forEach(el=>{const v=i18n[currentLang][el.dataset.i18n]; if(v) el.textContent=v;}); document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const v=i18n[currentLang][el.dataset.i18nPlaceholder]; if(v) el.placeholder=v;}); document.documentElement.lang=currentLang==='zh'?'zh-CN':'ja'; updateLoginMode(false);}
        function msg(type,text){errorMessage.style.display='none'; successMessage.style.display='none'; const el=type==='success'?successMessage:errorMessage; el.textContent=text; el.style.display='block';}
        function clearMsg(){errorMessage.style.display='none'; successMessage.style.display='none';}
        function setLoginMode(method){loginMethod=method; updateLoginMode(true);}
        function updateLoginMode(clear){const isCode=loginMethod==='code'; passwordModeBtn.classList.toggle('active',!isCode); codeModeBtn.classList.toggle('active',isCode); passwordGroup.style.display=isCode?'none':'block'; codeGroup.style.display=isCode?'block':'none'; password.required=!isCode; emailCode.required=isCode; username.placeholder=isCode?i18n[currentLang].email_ph:i18n[currentLang].account_ph; if(clear) clearMsg();}
        async function parseResponse(res){const text=await res.text(); try{return text?JSON.parse(text):{success:false,message:`HTTP ${res.status}`};}catch{return{success:false,message:text.replace(/<[^>]*>/g,'').trim().slice(0,120)||`HTTP ${res.status}`};}}
        function countdown(button){let s=60,label=i18n[currentLang].send_code; button.textContent=`${s}s`; const t=setInterval(()=>{s-=1; button.textContent=s>0?`${s}s`:label; if(s<=0){clearInterval(t); button.disabled=false;}},1000);}
        async function sendLoginCode(){const email=username.value.trim(); if(!email) return msg('error',i18n[currentLang].code_failed+i18n[currentLang].email_ph); sendLoginCodeBtn.disabled=true; try{const res=await fetch('/api/auth/email-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,purpose:'login'})}); const result=await parseResponse(res); if(!result.success) throw new Error(result.message||i18n[currentLang].unknown); msg('success',i18n[currentLang].code_sent); countdown(sendLoginCodeBtn);}catch(e){sendLoginCodeBtn.disabled=false; msg('error',i18n[currentLang].code_failed+e.message);}}
        async function handleLogin(e){e.preventDefault(); clearMsg(); try{const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value.trim(),password:password.value,emailCode:emailCode.value.trim(),loginMethod})}); const result=await parseResponse(res); if(!result.success) throw new Error(result.message||i18n[currentLang].unknown); localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); localStorage.setItem('tsukuyomi_token',result.data.token); localStorage.setItem('tsukuyomi_user',JSON.stringify(result.data.user)); msg('success',i18n[currentLang].login_success); const redirect=new URLSearchParams(location.search).get('redirect')||'hub'; setTimeout(()=>location.href=redirect,800);}catch(e){msg('error',i18n[currentLang].login_failed+e.message);}}
    </script>
</body>
</html>
