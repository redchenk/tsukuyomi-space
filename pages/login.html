<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/icon-180.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#7edbe8">
    <title>登录 | 月读空间</title>
    <style>
        :root {
            --login-panel: rgba(12, 17, 34, 0.72);
            --login-line: rgba(126, 219, 232, 0.2);
            --login-text: rgba(255, 255, 255, 0.9);
            --login-muted: rgba(225, 236, 246, 0.66);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 6rem 1.2rem 2rem;
            background:
                radial-gradient(circle at 78% 16%, rgba(244, 207, 114, 0.16), transparent 16rem),
                linear-gradient(135deg, #0b1020 0%, #14102a 46%, #07121e 100%);
            font-family: "Microsoft YaHei", "Noto Sans SC", "Segoe UI", Arial, sans-serif;
        }

        #sakuraContainer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .moon {
            position: fixed;
            top: 10%;
            right: 14%;
            width: clamp(64px, 9vw, 116px);
            aspect-ratio: 1;
            border-radius: 50%;
            z-index: 1;
            background: radial-gradient(circle at 36% 34%, rgba(255,255,255,0.96), rgba(244,207,114,0.74) 58%, rgba(126,219,232,0.22));
            box-shadow: 0 0 46px rgba(244, 207, 114, 0.36);
            animation: moonFloat 6s ease-in-out infinite;
        }

        @keyframes moonFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }

        .back-btn,
        .lang-switcher,
        .login-container {
            position: relative;
            z-index: 10;
        }

        .back-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            color: var(--login-muted);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.55rem 0.75rem;
            border: 1px solid var(--login-line);
            border-radius: 8px;
            background: rgba(8, 13, 27, 0.52);
            backdrop-filter: blur(14px);
        }

        .back-btn:hover {
            color: #fff;
            border-color: rgba(126, 219, 232, 0.46);
            background: rgba(126, 219, 232, 0.13);
        }

        .lang-switcher {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 0.25rem;
            padding: 0.2rem;
            border: 1px solid var(--login-line);
            border-radius: 8px;
            background: rgba(8, 13, 27, 0.52);
            backdrop-filter: blur(14px);
        }

        .lang-btn,
        .mode-btn,
        .code-btn,
        .submit-btn {
            border-radius: 8px;
            border: 1px solid rgba(126, 219, 232, 0.2);
            background: rgba(8, 13, 27, 0.54);
            color: var(--login-muted);
            cursor: pointer;
            font: inherit;
            transition: background 0.22s ease, border-color 0.22s ease, color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
        }

        .lang-btn {
            min-height: 34px;
            padding: 0.42rem 0.68rem;
            font-size: 0.82rem;
        }

        .lang-btn:hover,
        .lang-btn.active,
        .mode-btn:hover,
        .mode-btn.active,
        .code-btn:hover {
            color: #fff;
            border-color: rgba(126, 219, 232, 0.5);
            background: linear-gradient(135deg, rgba(255, 95, 150, 0.28), rgba(126, 219, 232, 0.18));
        }

        .login-container {
            width: min(100%, 420px);
            padding: clamp(2rem, 5vw, 3rem);
            border: 1px solid var(--login-line);
            border-radius: 10px;
            background: var(--login-panel);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.36);
            backdrop-filter: blur(20px) saturate(1.16);
            animation: slideUp 0.52s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #fff;
            font-weight: 700;
        }

        .logo p {
            color: var(--login-muted);
            font-size: 0.92rem;
        }

        .login-mode {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }

        .mode-btn {
            min-height: 42px;
            padding: 0.72rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.45rem;
            color: var(--login-text);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            min-height: 46px;
            padding: 0.82rem 1rem;
            border: 1px solid rgba(255, 183, 197, 0.2);
            border-radius: 8px;
            background: rgba(6, 10, 22, 0.56);
            color: #fff;
            font: inherit;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(225, 236, 246, 0.42);
        }

        .form-group input:focus {
            border-color: rgba(126, 219, 232, 0.52);
            box-shadow: 0 0 0 3px rgba(126, 219, 232, 0.1);
        }

        .code-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.6rem;
        }

        .code-btn {
            min-height: 46px;
            padding: 0 0.9rem;
            white-space: nowrap;
        }

        .code-btn:disabled,
        .submit-btn:disabled {
            opacity: 0.58;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn {
            width: 100%;
            min-height: 48px;
            margin-top: 0.2rem;
            color: #fff;
            font-weight: 700;
            background: linear-gradient(135deg, rgba(255, 95, 150, 0.3), rgba(126, 219, 232, 0.18));
            border-color: rgba(255, 173, 193, 0.34);
            box-shadow: 0 10px 28px rgba(5, 8, 18, 0.22);
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(126, 219, 232, 0.5);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.26), 0 0 18px rgba(126, 219, 232, 0.08);
        }

        .links {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--login-muted);
            font-size: 0.9rem;
        }

        .links a {
            color: rgba(126, 219, 232, 0.86);
            text-decoration: none;
        }

        .links a:hover {
            color: #fff;
        }

        .error-message,
        .success-message {
            display: none;
            margin-bottom: 1rem;
            padding: 0.82rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
        }

        .error-message {
            color: #ff9bab;
            border: 1px solid rgba(255, 95, 120, 0.3);
            background: rgba(255, 95, 120, 0.1);
        }

        .success-message {
            color: #97f2c1;
            border: 1px solid rgba(100, 255, 150, 0.26);
            background: rgba(100, 255, 150, 0.1);
        }

        @media (max-width: 640px) {
            body {
                align-items: flex-start;
                padding-top: 6rem;
            }

            .back-btn {
                left: 1rem;
                top: 1rem;
            }

            .lang-switcher {
                right: 1rem;
                top: 1rem;
            }

            .code-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/site-theme.css">
    <script defer src="../assets/js/site-nav.js"></script>
    <script defer src="../assets/js/ambient-fish.js"></script>
</head>
<body>
    <div id="sakuraContainer"></div>
    <div class="moon"></div>

    <a href="hub" class="back-btn">← <span data-i18n="back">返回</span></a>

    <div class="lang-switcher" aria-label="Language">
        <button type="button" class="lang-btn active" data-lang="zh">中文</button>
        <button type="button" class="lang-btn" data-lang="ja">日本語</button>
    </div>

    <main class="login-container">
        <div class="logo">
            <h1>月读空间</h1>
            <p data-i18n="login_subtitle">欢迎回来，请登录你的账号</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm">
            <div class="login-mode">
                <button type="button" class="mode-btn active" id="passwordModeBtn" data-i18n="password_mode">密码登录</button>
                <button type="button" class="mode-btn" id="codeModeBtn" data-i18n="code_mode">验证码登录</button>
            </div>

            <div class="form-group">
                <label for="username" data-i18n="username">用户名</label>
                <input type="text" id="username" required data-i18n-placeholder="username_placeholder" placeholder="请输入用户名或邮箱">
            </div>

            <div class="form-group" id="passwordGroup">
                <label for="password" data-i18n="password">密码</label>
                <input type="password" id="password" required data-i18n-placeholder="password_placeholder" placeholder="请输入密码">
            </div>

            <div class="form-group" id="codeGroup" style="display:none;">
                <label for="emailCode" data-i18n="email_code">邮箱验证码</label>
                <div class="code-row">
                    <input type="text" id="emailCode" inputmode="numeric" maxlength="6" data-i18n-placeholder="email_code_placeholder" placeholder="请输入 6 位验证码">
                    <button type="button" id="sendLoginCodeBtn" class="code-btn" data-i18n="send_code">发送验证码</button>
                </div>
            </div>

            <button type="submit" class="submit-btn" data-i18n="login_btn">登录</button>
        </form>

        <div class="links">
            <span data-i18n="no_account">还没有账号？</span>
            <a href="register" data-i18n="register_link">立即注册</a>
        </div>
    </main>

    <script>
        const i18n = {
            zh: {
                back: '返回',
                login_subtitle: '欢迎回来，请登录你的账号',
                username: '用户名',
                username_placeholder: '请输入用户名或邮箱',
                username_placeholder_code: '请输入已注册邮箱',
                password: '密码',
                password_placeholder: '请输入密码',
                password_mode: '密码登录',
                code_mode: '验证码登录',
                email_code: '邮箱验证码',
                email_code_placeholder: '请输入 6 位验证码',
                send_code: '发送验证码',
                code_sent: '验证码已发送，请查看邮箱',
                code_failed: '验证码发送失败：',
                login_btn: '登录',
                no_account: '还没有账号？',
                register_link: '立即注册',
                login_success: '登录成功，正在跳转...',
                login_failed: '登录失败：',
                unknown_error: '未知错误'
            },
            ja: {
                back: '戻る',
                login_subtitle: 'おかえりなさい。アカウントにログインしてください',
                username: 'ユーザー名',
                username_placeholder: 'ユーザー名またはメールアドレスを入力',
                username_placeholder_code: '登録済みメールアドレスを入力',
                password: 'パスワード',
                password_placeholder: 'パスワードを入力',
                password_mode: 'パスワード',
                code_mode: '認証コード',
                email_code: 'メール認証コード',
                email_code_placeholder: '6桁の認証コードを入力',
                send_code: 'コード送信',
                code_sent: '認証コードを送信しました。メールをご確認ください',
                code_failed: 'コード送信に失敗しました：',
                login_btn: 'ログイン',
                no_account: 'アカウントをお持ちでないですか？',
                register_link: '今すぐ登録',
                login_success: 'ログイン成功。移動しています...',
                login_failed: 'ログイン失敗：',
                unknown_error: '不明なエラー'
            }
        };

        let currentLang = 'zh';
        let loginMethod = 'password';

        document.addEventListener('DOMContentLoaded', () => {
            initFish();
            initLanguage();
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('passwordModeBtn').addEventListener('click', () => setLoginMode('password'));
            document.getElementById('codeModeBtn').addEventListener('click', () => setLoginMode('code'));
            document.getElementById('sendLoginCodeBtn').addEventListener('click', sendLoginCode);
            document.querySelectorAll('.lang-btn').forEach((button) => {
                button.addEventListener('click', () => setLanguage(button.dataset.lang));
            });
        });

        function initFish() {
            window.initTsukuyomiAmbientFish?.({
                containerId: 'sakuraContainer',
                density: 0.58
            });
        }

        function initLanguage() {
            const savedLang = localStorage.getItem('lang') || 'zh';
            setLanguage(savedLang);
        }

        function setLanguage(lang) {
            currentLang = i18n[lang] ? lang : 'zh';
            localStorage.setItem('lang', currentLang);

            document.querySelectorAll('.lang-btn').forEach((button) => {
                button.classList.toggle('active', button.dataset.lang === currentLang);
            });

            document.querySelectorAll('[data-i18n]').forEach((element) => {
                const key = element.dataset.i18n;
                if (i18n[currentLang][key]) element.textContent = i18n[currentLang][key];
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach((element) => {
                const key = element.dataset.i18nPlaceholder;
                if (i18n[currentLang][key]) element.placeholder = i18n[currentLang][key];
            });

            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'ja';
            updateLoginMode(false);
        }

        function setMessage(type, text) {
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            const target = type === 'success' ? successMessage : errorMessage;
            target.textContent = text;
            target.style.display = 'block';
        }

        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function setLoginMode(method) {
            loginMethod = method;
            updateLoginMode(true);
        }

        function updateLoginMode(clear) {
            const isCode = loginMethod === 'code';
            document.getElementById('passwordModeBtn').classList.toggle('active', !isCode);
            document.getElementById('codeModeBtn').classList.toggle('active', isCode);
            document.getElementById('passwordGroup').style.display = isCode ? 'none' : 'block';
            document.getElementById('codeGroup').style.display = isCode ? 'block' : 'none';
            document.getElementById('password').required = !isCode;
            document.getElementById('emailCode').required = isCode;
            document.getElementById('username').placeholder = isCode
                ? i18n[currentLang].username_placeholder_code
                : i18n[currentLang].username_placeholder;
            if (clear) clearMessages();
        }

        async function parseResponse(response) {
            const contentType = response.headers.get('content-type') || '';
            const raw = await response.text();
            if (contentType.includes('application/json') && raw) return JSON.parse(raw);
            return {
                success: false,
                message: raw ? raw.replace(/<[^>]*>/g, '').trim().slice(0, 120) : `HTTP ${response.status}`
            };
        }

        async function sendLoginCode() {
            const email = document.getElementById('username').value.trim();
            const button = document.getElementById('sendLoginCodeBtn');
            if (!email) {
                setMessage('error', i18n[currentLang].code_failed + i18n[currentLang].username_placeholder_code);
                return;
            }

            button.disabled = true;
            try {
                const response = await fetch('/api/auth/email-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, purpose: 'login' })
                });
                const result = await parseResponse(response);
                if (!result.success) throw new Error(result.message || i18n[currentLang].unknown_error);
                setMessage('success', i18n[currentLang].code_sent);
                startCodeCountdown(button);
            } catch (error) {
                button.disabled = false;
                setMessage('error', i18n[currentLang].code_failed + error.message);
            }
        }

        function startCodeCountdown(button) {
            let seconds = 60;
            const label = i18n[currentLang].send_code;
            button.textContent = `${seconds}s`;
            const timer = setInterval(() => {
                seconds -= 1;
                button.textContent = seconds > 0 ? `${seconds}s` : label;
                if (seconds <= 0) {
                    clearInterval(timer);
                    button.disabled = false;
                }
            }, 1000);
        }

        async function handleLogin(event) {
            event.preventDefault();
            clearMessages();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const emailCode = document.getElementById('emailCode').value.trim();

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, emailCode, loginMethod })
                });
                const result = await parseResponse(response);

                if (!result.success) {
                    throw new Error(result.message || i18n[currentLang].unknown_error);
                }

                localStorage.removeItem('admin_token');
                localStorage.removeItem('admin_user');
                localStorage.setItem('tsukuyomi_token', result.data.token);
                localStorage.setItem('tsukuyomi_user', JSON.stringify(result.data.user));
                setMessage('success', i18n[currentLang].login_success);

                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || 'hub';
                setTimeout(() => {
                    window.location.href = redirect;
                }, 900);
            } catch (error) {
                setMessage('error', i18n[currentLang].login_failed + error.message);
            }
        }
    </script>
</body>
</html>
