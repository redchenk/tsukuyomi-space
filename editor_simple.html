<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新建投稿</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#1a1025;font-family:sans-serif}
nav{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(26,16,37,0.95);display:flex;justify-content:space-between;align-items:center;padding:0 2rem;z-index:1000}
.logo{color:#ffb7c5;text-decoration:none;font-size:1.3rem;font-weight:500}
.nav-right{display:flex;align-items:center;gap:0.5rem}
.nav-right a{color:#b8a8e8;text-decoration:none;padding:0.4rem 0.8rem;border-radius:15px}
.nav-right a:hover{color:#ffb7c5;background:rgba(255,107,157,0.15)}
.lang-switcher{display:inline-flex;gap:0.4rem;background:rgba(255,107,157,0.15);padding:0.25rem 0.6rem;border-radius:20px}
.lang-btn{padding:0.2rem 0.6rem;background:transparent;border:1px solid rgba(255,183,197,0.25);border-radius:15px;color:rgba(255,183,197,0.75);cursor:pointer;font-size:0.72rem}
.lang-btn.active{background:rgba(255,107,157,0.25);color:#ffb7c5;font-weight:600}
.container{padding-top:80px;max-width:800px;margin:0 auto;padding-left:2rem;padding-right:2rem}
h1{color:#ffb7c5;text-align:center;margin-bottom:2rem}
form{background:rgba(255,255,255,0.03);border:1px solid rgba(255,107,157,0.15);border-radius:8px;padding:2rem}
.form-group{margin-bottom:1.5rem}
label{display:block;color:#b8a8e8;margin-bottom:0.5rem}
input,select,textarea{width:100%;padding:0.9rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,107,157,0.2);border-radius:6px;color:#b8a8e8}
textarea{min-height:300px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.btn-group{display:flex;gap:1rem;margin-top:2rem}
button,a.btn{padding:1rem 2rem;border:none;border-radius:6px;cursor:pointer;text-decoration:none;text-align:center}
.btn-primary{background:rgba(255,107,157,0.2);color:#ffb7c5;border:1px solid rgba(255,107,157,0.3)}
.btn-secondary{background:rgba(255,255,255,0.05);color:#b8a8e8}
.message{padding:1rem;border-radius:6px;margin-bottom:1.5rem;text-align:center;display:none}
.success{background:rgba(100,255,150,0.1);color:#6bff9e}
.error{background:rgba(255,100,100,0.1);color:#ff6b6b}
</style>
</head>
<body>
<nav>
<a href="hub.html" class="logo">月读空间</a>
<div class="nav-right">
<a href="hub.html">中枢大厅</a>
<a href="stage.html">主舞台</a>
<div class="lang-switcher">
<button class="lang-btn active" onclick="setLang('zh')">中文</button>
<button class="lang-btn" onclick="setLang('ja')">日本語</button>
</div>
</div>
</nav>
<div class="container">
<h1>新建投稿</h1>
<form id="editorForm">
<div class="message" id="message"></div>
<div class="form-group"><label>标题 *</label><input type="text" id="title" required></div>
<div class="form-row">
<div class="form-group"><label>分类 *</label><select id="category" required><option value="">请选择</option><option value="公告">公告</option><option value="传说">传说</option><option value="技术">技术</option><option value="其他">其他</option></select></div>
<div class="form-group"><label>阅读时间</label><input type="text" id="read_time" value="5 min"></div>
</div>
<div class="form-group"><label>摘要 *</label><textarea id="excerpt" required></textarea></div>
<div class="form-group"><label>正文 *</label><textarea id="content" required></textarea></div>
<div class="btn-group"><button type="submit" class="btn-primary">投稿</button><a href="stage.html" class="btn-secondary">取消</a></div>
</form>
</div>
<script>
function setLang(lang){
localStorage.setItem('tsukuyomi_lang',lang);
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
location.reload();
}
document.getElementById('editorForm').addEventListener('submit',async(e)=>{
e.preventDefault();
const title=document.getElementById('title').value;
const category=document.getElementById('category').value;
const excerpt=document.getElementById('excerpt').value;
const content=document.getElementById('content').value;
const readTime=document.getElementById('read_time').value;
const msg=document.getElementById('message');
try{
const token=localStorage.getItem('tsukuyomi_token');
const res=await fetch('http://47.97.0.122:3000/api/articles',{
method:'POST',
headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
body:JSON.stringify({title,category,excerpt,content,read_time:readTime||'5 min',tags:[]})
});
const data=await res.json();
if(data.success){msg.className='message success';msg.textContent='投稿成功！';setTimeout(()=>location.href='stage.html',1500);}
else{msg.className='message error';msg.textContent=data.message||'失败';}
}catch(err){msg.className='message error';msg.textContent=err.message;}
});
</script>
</body>
</html>
