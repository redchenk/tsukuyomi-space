    <script>
        // ==================== 濞撴悂濂旈懗灞炬珯 ====================
        let roomAmbientFish = null;
        function initAmbientFish() {
            roomAmbientFish = window.initTsukuyomiAmbientFish({
                containerId: 'sakuraContainer',
                toggleId: 'sakuraToggle',
                density: 0.72
            });
        }
        function toggleSakura() {
            roomAmbientFish?.setEnabled(document.getElementById('sakuraToggle').checked);
        }

        // ==================== 閸欘垱瀚嬮幏浠嬫桨閺?====================
        let draggedPanel = null, dragOffset = { x: 0, y: 0 }, zIndexCounter = 100;
        const panelPositions = JSON.parse(localStorage.getItem('roomPanelPositions')) || {};

        function initPanelPositions() {
            document.querySelectorAll('.draggable-panel').forEach(panel => {
                const id = panel.id;
                if (panelPositions[id]) {
                    panel.style.top = panelPositions[id].top;
                    panel.style.left = panelPositions[id].left;
                    if (panelPositions[id].right) { panel.style.right = panelPositions[id].right; panel.style.left = 'auto'; }
                }
                makeDraggable(panel);
            });
        }

        function makeDraggable(panel) {
            const header = panel.querySelector('.panel-header');
            header.addEventListener('mousedown', (e) => {
                draggedPanel = panel;
                dragOffset.x = e.clientX - panel.offsetLeft;
                dragOffset.y = e.clientY - panel.offsetTop;
                panel.classList.add('dragging');
                panel.style.zIndex = ++zIndexCounter;
            });
            document.addEventListener('mousemove', (e) => {
                if (!draggedPanel) return;
                e.preventDefault();
                draggedPanel.style.left = (e.clientX - dragOffset.x) + 'px';
                draggedPanel.style.top = (e.clientY - dragOffset.y) + 'px';
                draggedPanel.style.right = 'auto';
            });
            document.addEventListener('mouseup', () => {
                if (draggedPanel) { savePanelPosition(draggedPanel); draggedPanel.classList.remove('dragging'); draggedPanel = null; }
            });
            panel.addEventListener('mousedown', () => { panel.style.zIndex = ++zIndexCounter; });
        }

        function savePanelPosition(panel) {
            const positions = JSON.parse(localStorage.getItem('roomPanelPositions')) || {};
            positions[panel.id] = { top: panel.style.top, left: panel.style.left, right: panel.style.right };
            localStorage.setItem('roomPanelPositions', JSON.stringify(positions));
        }

        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            if (panel.style.display === 'block') panel.style.zIndex = ++zIndexCounter;
        }
        function hidePanel(panelId) { document.getElementById(panelId).style.display = 'none'; }
        function resetPanels() { localStorage.removeItem('roomPanelPositions'); location.reload(); }

        // ==================== 娑擃亙姹夌挧鍕灐 ====================
        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('roomProfile')) || {};
            if (profile.nickname) document.getElementById('nicknameInput').value = profile.nickname;
            if (profile.signature) document.getElementById('signatureInput').value = profile.signature;
            updateProfileDisplay();
        }
        function saveProfile() {
            const profile = { nickname: document.getElementById('nicknameInput').value, signature: document.getElementById('signatureInput').value };
            localStorage.setItem('roomProfile', JSON.stringify(profile));
            updateProfileDisplay();
        }
        function updateProfileDisplay() {
            const profile = JSON.parse(localStorage.getItem('roomProfile')) || {};
            const display = document.getElementById('profileDisplay');
            if (profile.nickname || profile.signature) {
                display.innerHTML = `<div style="margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid rgba(255,183,197,0.2)">${profile.nickname ? `<div style="color: var(--deep-pink); font-weight: 500;">${profile.nickname}</div>` : ''}${profile.signature ? `<div style="opacity: 0.7; margin-top: 0.3rem;">${profile.signature}</div>` : ''}</div>`;
            }
        }

        // ==================== 娓氳法顒?====================
        function loadNote() { document.getElementById('noteContent').value = localStorage.getItem('roomNote') || ''; }
        function saveNote() { localStorage.setItem('roomNote', document.getElementById('noteContent').value); alert('娓氳法顒峰韫箽鐎?); }

        // ==================== Live2D 濡€崇€烽崝鐘烘祰 (娴ｈ法鏁?live2d-bundle.js) ====================
        let live2dModel = null;

        async function loadLive2DModel() {
            try {
                console.log('=== Live2D 濡€崇€烽崝鐘烘祰瀵偓婵?===');
                console.log('Live2DCubismCore:', typeof Live2DCubismCore !== 'undefined' ? 'loaded' : 'not loaded');
                console.log('LAppModel:', typeof LAppModel !== 'undefined' ? 'loaded' : 'not loaded');

                const modelDir = '/models/tsukimi-yachiyo/';
                const modelFile = 'tsukimi-yachiyo.model3.json';

                if (typeof Live2DCubismCore === 'undefined') {
                    throw new Error('Live2DCubismCore 閺堫亜濮炴潪?);
                }
                if (typeof LAppModel === 'undefined') {
                    throw new Error('LAppModel 閺堫亜濮炴潪?);
                }

                // 閼惧嘲褰?canvas
                const canvas = document.getElementById('live2d-canvas');
                const container = document.getElementById('live2d-container');

                // 鐠佸墽鐤?canvas 鐏忓搫顕?
                canvas.width = container.clientWidth || 600;
                canvas.height = container.clientHeight || 700;
                console.log('Canvas size:', canvas.width, 'x', canvas.height);

                // 閼惧嘲褰?WebGL context
                const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
                if (!gl) {

        async function generateTTS(text, settings) {
            const useProvider = settings.provider || 'mimo';
            const useApiKey = settings.apiKey;
            const useApiUrl = settings.apiUrl || (useProvider === 'mimo' ? 'https://api.xiaomimimo.com/v1/chat/completions' : 'https://api.openai.com/v1/audio/speech');
            const useVoice = settings.voice || (useProvider === 'mimo' ? 'mimo_default' : 'alloy');
            const useModel = useProvider === 'mimo' ? 'mimo-v2-tts' : 'tts-1';

            // 濡偓閺屻儳绱︾€?
            const cacheKey = `${useProvider}:${useVoice}:${text}`;
            if (ttsAudioCache.has(cacheKey)) {
                console.log('TTS 缂傛挸鐡ㄩ崨鎴掕厬');
                return ttsAudioCache.get(cacheKey);
            }

            try {
                const requestBody = {};

                if (useProvider === 'mimo') {
                    // MiMo-V2-TTS API 閺嶇厧绱?
                    const messages = [
                        { role: 'user', content: '娴ｇ姴銈? },
                        { role: 'assistant', content: text }
                    ];

                    requestBody.body = JSON.stringify({
                        model: useModel,
                        messages: messages,
                        modalities: ['audio'],
                        audio: {
                            format: 'wav',
                            voice: useVoice
                        }
                    });

                    // 婵″倹鐏夐張澶婂棘閼板啴鐓舵０鎴礉濞ｈ濮為崚鎷岊嚞濮瑰倷鑵?
                    if (referenceAudioData) {
                        const bodyObj = JSON.parse(requestBody.body);
                        bodyObj.audio.prompt_audio = referenceAudioData;
                        requestBody.body = JSON.stringify(bodyObj);
                    }

                    requestBody.headers = {
                        'Content-Type': 'application/json',
                        'api-key': useApiKey
                    };
                } else {
                    // OpenAI TTS API 閺嶇厧绱?
                    requestBody.body = JSON.stringify({
                        model: useModel,
                        input: text,
                        voice: useVoice,
                        response_format: 'wav'
                    });
                    requestBody.headers = {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${useApiKey}`
                    };
                }

                const response = await fetch(getApiBaseUrl() + '/api/tts', {
                    method: 'POST',
                    headers: requestBody.headers,
                    body: requestBody.body
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const audioBuffer = await response.arrayBuffer();
                ttsAudioCache.set(cacheKey, audioBuffer);
                return audioBuffer;

            } catch (error) {
                console.error('TTS 閻㈢喐鍨氭径杈Е:', error);
                throw error;
            }
        }

        function playAudio(audioBuffer) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            audioContext.decodeAudioData(audioBuffer, (decodedData) => {
                const source = audioContext.createBufferSource();
                source.buffer = decodedData;
                source.connect(audioContext.destination);
                source.start(0);
            }, (error) => {
                console.error('闂婃娊顣剁憴锝囩垳婢惰精瑙?', error);
            });
        }

        async function playTTS(text) {
            const ttsEnabled = document.getElementById('ttsEnabled').checked;
            if (!ttsEnabled) return;

            const settings = {
                enabled: true,
                provider: document.getElementById('ttsProvider').value,
                apiUrl: document.getElementById('ttsApiUrl').value.trim(),
                apiKey: document.getElementById('ttsApiKey').value.trim(),
                voice: document.getElementById('ttsVoice').value.trim()
            };

            if (!settings.apiKey || !settings.apiUrl) {
                console.log('TTS 鐠佸墽鐤嗘稉宥呯暚閺佽揪绱濈捄瀹犵箖鐠囶參鐓堕崥鍫熷灇');
                return;
            }

            try {
                const audioBuffer = await generateTTS(text, settings);
                if (audioBuffer) {
                    playAudio(audioBuffer);
                }
            } catch (error) {
                console.error('TTS 閹绢厽鏂佹径杈Е:', error);
            }
        }
