server {
    listen 3280 default_server;
    server_name _;

    root /var/www/tsukuyomi-space;
    index index.html;

    client_max_body_size 10m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/css
        text/plain
        application/javascript
        application/json
        application/octet-stream
        image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /pages {
        return 404;
    }

    location ^~ /pages/ {
        return 404;
    }

    location ~* \.html$ {
        return 404;
    }

    location = /room {
        try_files /dist/frontend/index.html =404;
    }

    location = /room/ {
        return 301 /room;
    }

    location = /arena {
        return 302 /arena/;
    }

    location ^~ /arena/ {
        try_files /dist/frontend$uri /dist/frontend/arena/index.html =404;
    }

    location = / {
        try_files /dist/frontend/index.html =404;
    }

    location /assets/ {
        try_files /dist/frontend$uri $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location /models/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location /lib/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location / {
        try_files $uri /dist/frontend/index.html =404;
    }

    location ~* \.(?:db|sqlite|sqlite3|env|log)$ {
        deny all;
    }
}
