server {
    listen 3280 default_server;
    server_name _;

    root /var/www/tsukuyomi-space;
    index index.html;

    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /pages/room {
        return 301 /room;
    }

    location = /pages/room.html {
        return 301 /room;
    }

    location = /room.html {
        return 301 /room;
    }

    location = /pages/index { return 301 /; }
    location = /pages/index.html { return 301 /; }
    location = /pages/access { return 301 /; }
    location = /pages/access.html { return 301 /; }
    location = /pages/hub { return 301 /hub; }
    location = /pages/hub.html { return 301 /hub; }
    location = /pages/login { return 301 /login; }
    location = /pages/login.html { return 301 /login; }
    location = /pages/register { return 301 /register; }
    location = /pages/register.html { return 301 /register; }
    location = /pages/stage { return 301 /stage; }
    location = /pages/stage.html { return 301 /stage; }
    location = /pages/plaza { return 301 /plaza; }
    location = /pages/plaza.html { return 301 /plaza; }
    location = /pages/reality { return 301 /reality; }
    location = /pages/reality.html { return 301 /reality; }
    location = /pages/editor { return 301 /editor$is_args$args; }
    location = /pages/editor.html { return 301 /editor$is_args$args; }
    location = /pages/user-center { return 301 /user-center; }
    location = /pages/user-center.html { return 301 /user-center; }
    location = /pages/arena { return 301 /arena; }
    location = /pages/arena.html { return 301 /arena; }
    location = /arena.html { return 301 /arena; }

    location = /pages/article {
        return 301 /article$is_args$args;
    }

    location = /pages/article.html {
        return 301 /article$is_args$args;
    }

    location = /article.html {
        return 301 /article$is_args$args;
    }

    location = /pages/terminal {
        return 301 /terminal;
    }

    location = /pages/terminal.html {
        return 301 /terminal;
    }

    location = /terminal.html {
        return 301 /terminal;
    }

    location = /room {
        try_files /dist/frontend/index.html =404;
    }

    location = /room/ {
        return 301 /room;
    }

    location /assets/ {
        try_files /dist/frontend$uri $uri =404;
    }

    location /models/ {
        try_files $uri =404;
    }

    location /lib/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri /dist/frontend/index.html;
    }

    location ~* \.(?:db|sqlite|sqlite3|env|log)$ {
        deny all;
    }
}
