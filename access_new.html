<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月読空間 - 接入</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;font-family:'Noto Sans JP',sans-serif;overflow:hidden}
        
        /* 月读空间背景 */
        .tsukuyomi-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(ellipse at top,#1a1a3a 0%,#0a0a1a 100%)}
        .moon{position:absolute;top:15%;left:50%;transform:translateX(-50%);width:80px;height:80px;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.95),rgba(200,220,255,0.8),rgba(100,150,255,0.6));border-radius:50%;box-shadow:0 0 60px rgba(255,255,255,0.6),0 0 120px rgba(255,255,255,0.4),0 0 180px rgba(138,118,255,0.3);animation:moonGlow 4s ease-in-out infinite}
        @keyframes moonGlow{0%,100%{box-shadow:0 0 60px rgba(255,255,255,0.6),0 0 120px rgba(255,255,255,0.4),0 0 180px rgba(138,118,255,0.3)}50%{box-shadow:0 0 80px rgba(255,255,255,0.8),0 0 160px rgba(255,255,255,0.6),0 0 240px rgba(138,118,255,0.5)}}
        .stars{position:absolute;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(2px 2px at 20% 30%,white,transparent),radial-gradient(2px 2px at 60% 70%,white,transparent),radial-gradient(1px 1px at 50% 50%,white,transparent);background-size:200% 200%;animation:starsTwinkle 3s ease-in-out infinite;opacity:0.8}
        @keyframes starsTwinkle{0%,100%{opacity:0.8}50%{opacity:1}}
        .floating-island{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120%;height:60%;background:linear-gradient(180deg,transparent 0%,rgba(26,16,37,0.8) 40%,rgba(10,10,26,0.95) 100%);clip-path:ellipse(70% 100% at 50% 100%)}
        .waterfall{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80%;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.1) 0%,rgba(255,255,255,0.05) 50%,transparent 100%);clip-path:polygon(20% 0%,80% 0%,75% 100%,25% 100%);animation:waterfallFlow 2s linear infinite}
        @keyframes waterfallFlow{0%{background-position:0 0}100%{background-position:0 100%}}
        .clouds{position:absolute;bottom:20%;left:0;width:100%;height:30%;background:radial-gradient(ellipse at 30% 50%,rgba(255,255,255,0.1) 0%,transparent 50%),radial-gradient(ellipse at 70% 50%,rgba(255,255,255,0.08) 0%,transparent 50%);animation:cloudsMove 20s linear infinite}
        @keyframes cloudsMove{0%{transform:translateX(-10%)}100%{transform:translateX(10%)}}
        
        /* 主内容 */
        .container{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem}
        .logo{text-align:center;margin-bottom:3rem}
        .logo h1{font-size:4rem;background:linear-gradient(135deg,#fff 0%,#ffb7c5 50%,#ff6b9d 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem;letter-spacing:0.5rem;text-shadow:0 0 40px rgba(255,107,157,0.5)}
        .logo p{color:rgba(255,183,197,0.8);font-size:1.2rem;letter-spacing:0.3rem}
        .access-btn{padding:1.5rem 5rem;font-size:1.5rem;background:rgba(255,107,157,0.15);color:#ffb7c5;border:2px solid rgba(255,107,157,0.4);border-radius:50px;cursor:pointer;transition:all 0.4s;backdrop-filter:blur(10px);letter-spacing:0.3rem}
        .access-btn:hover{background:rgba(255,107,157,0.25);border-color:rgba(255,107,157,0.6);box-shadow:0 0 40px rgba(255,107,157,0.4);transform:translateY(-3px)}
        
        /* VR 加载动画 */
        .vr-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;display:none;justify-content:center;align-items:center;flex-direction:column}
        .vr-overlay.active{display:flex}
        .vr-text{color:#ffb7c5;font-size:1.5rem;margin-bottom:2rem;letter-spacing:0.3rem}
        .loading-bar{width:300px;height:3px;background:rgba(255,107,157,0.2);border-radius:2px;overflow:hidden}
        .loading-progress{height:100%;background:linear-gradient(90deg,#ffb7c5,#ff6b9d);width:0;box-shadow:0 0 20px rgba(255,107,157,0.6)}
        
        /* 樱花 */
        .sakura{position:absolute;background:linear-gradient(135deg,#ffb7c5,#ff6b9d);border-radius:50% 0 50% 0;pointer-events:none}
        @keyframes sakuraFall{0%{transform:translateY(-10vh) translateX(0) rotate(0deg);opacity:0}10%{opacity:0.8}100%{transform:translateY(110vh) translateX(100px) rotate(720deg);opacity:0}}
        
        .footer{position:fixed;bottom:1rem;color:rgba(255,255,255,0.3);font-size:0.7rem;letter-spacing:0.2rem}
    </style>
</head>
<body>
    <div class="tsukuyomi-bg">
        <div class="moon"></div>
        <div class="stars"></div>
        <div class="floating-island"></div>
        <div class="waterfall"></div>
        <div class="clouds"></div>
    </div>
    <div id="sakuraContainer"></div>
    
    <div class="container">
        <div class="logo">
            <h1>月読空間</h1>
            <p>夢と希望が交わる場所</p>
        </div>
        <button class="access-btn" onclick="startAccess()">アクセス 接入</button>
    </div>
    
    <div class="vr-overlay" id="vrOverlay">
        <div class="vr-text" id="vrText">CONNECTING...</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
    </div>
    
    <div class="footer">© 超かぐや姫！風</div>
    
    <script>
        // 樱花背景
        const sakuraContainer=document.getElementById('sakuraContainer');
        for(let i=0;i<30;i++){
            const el=document.createElement('div');
            el.className='sakura';
            const size=Math.random()*8+6;
            el.style.width=size+'px';
            el.style.height=size+'px';
            el.style.left=(Math.random()*100)+'%';
            el.style.top=(-Math.random()*100)+'px';
            el.style.animation=`sakuraFall ${Math.random()*5+10}s linear ${Math.random()*5}s infinite`;
            el.style.opacity=Math.random()*0.5+0.3;
            sakuraContainer.appendChild(el);
        }
        
        // 接入动画
        function startAccess(){
            const overlay=document.getElementById('vrOverlay');
            const progress=document.getElementById('loadingProgress');
            const vrText=document.getElementById('vrText');
            overlay.classList.add('active');
            const msgs=['CONNECTING...','LOADING TSUKUYOMI...','SYNCHRONIZING...','WELCOME!'];
            let p=0,mi=0;
            function update(){
                p+=(100-p)*0.04;
                if(p>99){
                    progress.style.width='100%';
                    setTimeout(()=>{overlay.style.opacity='0';setTimeout(()=>location.href='hub.html',1000);},500);
                    return;
                }
                progress.style.width=p+'%';
                if(p>=(mi+1)*25&&mi<3){mi++;vrText.textContent=msgs[mi];}
                requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
