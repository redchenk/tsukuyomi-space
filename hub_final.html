<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中枢大厅 | 月读空间</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;font-family:sans-serif;overflow:hidden}
        
        /* 背景 - 浮空大陆 */
        .bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:linear-gradient(180deg,#1a1a3a 0%,#0a0a1a 100%)}
        .moon{position:absolute;top:15%;left:50%;transform:translateX(-50%);width:80px;height:80px;background:radial-gradient(circle at 35% 35%,#fff,#c8dcff,#6496ff);border-radius:50%;box-shadow:0 0 60px rgba(255,255,255,0.6),0 0 120px rgba(255,255,255,0.4),0 0 180px rgba(138,118,255,0.3);animation:glow 4s ease-in-out infinite}
        @keyframes glow{0%,100%{box-shadow:0 0 60px rgba(255,255,255,0.6),0 0 120px rgba(255,255,255,0.4),0 0 180px rgba(138,118,255,0.3)}50%{box-shadow:0 0 80px rgba(255,255,255,0.8),0 0 160px rgba(255,255,255,0.6),0 0 240px rgba(138,118,255,0.5)}}
        .stars{position:absolute;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(2px 2px at 20% 30%,#fff,transparent),radial-gradient(2px 2px at 60% 70%,#fff,transparent),radial-gradient(1px 1px at 50% 50%,#fff,transparent);background-size:200% 200%;animation:twinkle 3s ease-in-out infinite;opacity:0.8}
        @keyframes twinkle{0%,100%{opacity:0.8}50%{opacity:1}}
        .island{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120%;height:60%;background:linear-gradient(180deg,transparent 0%,rgba(26,16,37,0.8) 40%,rgba(10,10,26,0.95) 100%);clip-path:ellipse(70% 100% at 50% 100%)}
        .waterfall{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80%;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.1) 0%,rgba(255,255,255,0.05) 50%,transparent 100%);clip-path:polygon(20% 0%,80% 0%,75% 100%,25% 100%);animation:flow 2s linear infinite}
        @keyframes flow{0%{background-position:0 0}100%{background-position:0 100%}}
        .clouds{position:absolute;bottom:20%;left:0;width:100%;height:30%;background:radial-gradient(ellipse at 30% 50%,rgba(255,255,255,0.1) 0%,transparent 50%),radial-gradient(ellipse at 70% 50%,rgba(255,255,255,0.08) 0%,transparent 50%);animation:move 20s linear infinite}
        @keyframes move{0%{transform:translateX(-10%)}100%{transform:translateX(10%)}}
        
        /* 导航栏 */
        nav{position:fixed;top:0;left:0;width:100%;height:60px;background:rgba(26,16,37,0.95);backdrop-filter:blur(10px);z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:0 2rem;border-bottom:1px solid rgba(255,107,157,0.2)}
        .logo{color:#ffb7c5;text-decoration:none;font-size:1.3rem;font-weight:500}
        .nav-right{display:flex;align-items:center;gap:0.5rem}
        .nav-right a{color:#b8a8e8;text-decoration:none;padding:0.4rem 0.8rem;border-radius:15px;transition:all 0.3s}
        .nav-right a:hover{color:#ffb7c5;background:rgba(255,107,157,0.15)}
        .lang-switcher{display:inline-flex;gap:0.4rem;background:rgba(255,107,157,0.15);padding:0.25rem 0.6rem;border-radius:20px;border:1px solid rgba(255,107,157,0.3)}
        .lang-btn{padding:0.2rem 0.6rem;background:transparent;border:1px solid rgba(255,183,197,0.25);border-radius:15px;color:#b8a8e8;cursor:pointer;font-size:0.72rem}
        .lang-btn.active{background:rgba(255,107,157,0.25);color:#ffb7c5;font-weight:600}
        
        /* 主内容 */
        .container{min-height:100vh;padding-top:80px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding-left:2rem;padding-right:2rem}
        h1{color:#ffb7c5;font-size:2.5rem;margin-bottom:0.5rem;text-align:center}
        .subtitle{color:#b8a8e8;font-size:0.9rem;margin-bottom:3rem;text-align:center}
        
        /* 场景列表 */
        .scenes{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;max-width:1000px;width:100%}
        .scene{background:rgba(255,255,255,0.03);border:1px solid rgba(255,107,157,0.15);border-radius:8px;padding:1.5rem;text-decoration:none;transition:all 0.3s;display:flex;align-items:center;gap:1rem}
        .scene:hover{transform:translateX(8px);border-color:rgba(255,107,157,0.3);background:rgba(255,107,157,0.08)}
        .icon{font-size:2.5rem;min-width:60px;text-align:center}
        .content{flex:1}
        .name{color:#ffb7c5;font-size:1.1rem;margin-bottom:0.3rem}
        .desc{color:#b8a8e8;font-size:0.85rem;line-height:1.5}
        .arrow{color:rgba(255,107,157,0.4);font-size:1.2rem;transition:all 0.3s}
        .scene:hover .arrow{color:#ffb7c5;transform:translateX(4px)}
        
        /* 樱花 */
        .sakura{position:absolute;background:linear-gradient(135deg,#ffb7c5,#ff6b9d);border-radius:50% 0 50% 0;pointer-events:none;opacity:0.6}
        @keyframes fall{0%{transform:translateY(-10vh) translateX(0) rotate(0deg);opacity:0}10%{opacity:0.6}100%{transform:translateY(110vh) translateX(100px) rotate(720deg);opacity:0}}
        
        .footer{position:fixed;bottom:1rem;color:rgba(255,255,255,0.3);font-size:0.65rem;width:100%;text-align:center}
        
        @media(max-width:768px){
            nav{padding:0 1rem;height:50px}
            .nav-right{gap:0.3rem}
            .nav-right a{font-size:0.8rem;padding:0.3rem 0.5rem}
            .lang-switcher{padding:0.2rem 0.5rem}
            .lang-btn{font-size:0.68rem;padding:0.15rem 0.5rem}
            .container{padding-top:70px;padding-left:1rem;padding-right:1rem}
            .scenes{grid-template-columns:1fr}
            h1{font-size:2rem}
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="moon"></div>
        <div class="stars"></div>
        <div class="island"></div>
        <div class="waterfall"></div>
        <div class="clouds"></div>
    </div>
    <div id="sakuraContainer"></div>
    
    <nav>
        <a href="access.html" class="logo">月读空间</a>
        <div class="nav-right">
            <a href="access.html">接入</a>
            <a href="stage.html">主舞台</a>
            <a href="arena.html">竞技场</a>
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLang('zh')">中文</button>
                <button class="lang-btn" onclick="setLang('ja')">日本語</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <h1>中枢大厅</h1>
        <p class="subtitle">梦想与希望交汇之地</p>
        
        <div class="scenes">
            <a href="stage.html" class="scene">
                <div class="icon">🎤</div>
                <div class="content">
                    <div class="name">主舞台</div>
                    <div class="desc">演唱会场馆<br>博客文章</div>
                </div>
                <div class="arrow">→</div>
            </a>
            
            <a href="arena.html" class="scene">
                <div class="icon">⚔️</div>
                <div class="content">
                    <div class="name">竞技场</div>
                    <div class="desc">格斗游戏区<br>项目展示</div>
                </div>
                <div class="arrow">→</div>
            </a>
            
            <a href="room.html" class="scene">
                <div class="icon">🏠</div>
                <div class="content">
                    <div class="name">私人居所</div>
                    <div class="desc">个人虚拟房间<br>关于我/技能树</div>
                </div>
                <div class="arrow">→</div>
            </a>
            
            <a href="plaza.html" class="scene">
                <div class="icon">💬</div>
                <div class="content">
                    <div class="name">月读广场</div>
                    <div class="desc">公共社交区<br>留言板/访客互动</div>
                </div>
                <div class="arrow">→</div>
            </a>
            
            <a href="terminal.html" class="scene">
                <div class="icon">⚙️</div>
                <div class="content">
                    <div class="name">数据终端</div>
                    <div class="desc">后台管理系统<br>仅管理员可见</div>
                </div>
                <div class="arrow">→</div>
            </a>
            
            <a href="reality.html" class="scene">
                <div class="icon">🌍</div>
                <div class="content">
                    <div class="name">现实锚点</div>
                    <div class="desc">返回现实世界<br>联系方式</div>
                </div>
                <div class="arrow">→</div>
            </a>
        </div>
    </div>
    
    <div class="footer">© 超かぐや姫！風</div>
    
    <script>
        // 樱花
        const sc=document.getElementById('sakuraContainer');
        for(let i=0;i<30;i++){
            const el=document.createElement('div');
            el.className='sakura';
            const s=Math.random()*8+6;
            el.style.width=s+'px';el.style.height=s+'px';
            el.style.left=(Math.random()*100)+'%';
            el.style.top=(-Math.random()*100)+'px';
            el.style.animation=`fall ${Math.random()*5+10}s linear ${Math.random()*5}s infinite`;
            sc.appendChild(el);
        }
        
        // 语言切换
        function setLang(lang){
            localStorage.setItem('tsukuyomi_lang',lang);
            document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
            event.target.classList.add('active');
            location.reload();
        }
        
        // 初始化语言
        const savedLang=localStorage.getItem('tsukuyomi_lang')||'zh';
        if(savedLang==='ja'){
            document.querySelector('.lang-btn[onclick*="ja"]').classList.add('active');
            document.querySelector('.lang-btn[onclick*="zh"]').classList.remove('active');
        }
    </script>
</body>
</html>
